    // Glowing star orb on top
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffee44 });
    const star = new THREE.Mesh(new THREE.SphereGeometry(5, 12, 12), starMat);
    star.position.set(x, gy + 53, z);
    scene.add(star);
    parts.push(star);

    // Rotating ring
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(new THREE.TorusGeometry(8, 0.8, 8, 32), ringMat);
    ring.position.set(x, gy + 45, z);
    scene.add(ring);
    parts.push(ring);
    stationLabels.push({ type: 'ring', mesh: ring, x, z }); // animate the ring each frame

    // Bright light
    const light = new THREE.PointLight(0xffdd44, 4, 600);
    light.position.set(x, gy + 53, z);
    scene.add(light);
    parts.push(light);
  }

  // 現実モード: 最寄りの線路に沿ってプラットホーム(両側)+上屋を置く
  if (IS_REAL && bestRail) {
    const ddx = bestRail.x2 - bestRail.x1, ddz = bestRail.z2 - bestRail.z1;
    const dl = Math.hypot(ddx, ddz) || 1;
    const rx = ddx / dl, rz = ddz / dl;
    const ryr = Math.atan2(-rz, rx);
    const pxp = -rz, pzp = rx;
    const mx = (bestRail.x1 + bestRail.x2) / 2, mz = (bestRail.z1 + bestRail.z2) / 2;
    for (const sd of [-1, 1]) {
      const hx = mx + pxp * sd * 4.6, hz = mz + pzp * sd * 4.6;
      const hgy = getGroundY(hx, hz);
      dm(UNIT_BOX, lambertMat(0x9c9c96), hx, hgy + 0.6, hz, 46, 1.2, 3.2, ryr); // ホーム
      dm(UNIT_BOX, lambertMat(0x50545a), hx, hgy + 3.6, hz, 42, 0.2, 3.0, ryr); // 上屋
      for (const po of [-14, 14]) { // 上屋の支柱
        dm(UNIT_CYL, lambertMat(0x8a8d90), hx + rx * po, hgy + 2.4, hz + rz * po, 0.24, 2.4, 0.24);
      }
    }
  }

  // Name label (canvas texture billboard)
  const cvs = document.createElement('canvas');
  cvs.width = 512; cvs.height = 96;
  const ctx2d = cvs.getContext('2d');
  ctx2d.fillStyle = 'rgba(20,10,0,0.85)';
  ctx2d.fillRect(0, 0, 512, 96);
  ctx2d.strokeStyle = '#ffcc00';
  ctx2d.lineWidth = 4;
  ctx2d.strokeRect(2, 2, 508, 92);
  ctx2d.fillStyle = '#ffee44';
  ctx2d.font = 'bold 52px sans-serif';
  ctx2d.textAlign = 'center';
  ctx2d.textBaseline = 'middle';
  ctx2d.fillText(name, 256, 48);
  const tex = new THREE.CanvasTexture(cvs);
  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 8),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthTest: false })
  );
  labelMesh.position.set(x, labelY, z);
  scene.add(labelMesh);
  parts.push(labelMesh);
  stationLabels.push({ type: 'label', mesh: labelMesh, x, z });

  // NEAR高解像度地形が後から届いた時にY方向へまとめて追従できるよう記録しておく
  // (道路・建物と同じ仕組み。以前は駅だけこれが無く、FAR基準で建った駅が浮いたまま残った)
  stationRecords.push({ refX, refZ, gy: getGroundY(refX, refZ), parts });
}

// 1駅ぶんを現在の地形に合わせてY方向へ平行移動する(rebuildBuildingHeightと同じ考え方)
function rebuildStationHeight(rec) {
  const newGy = getGroundY(rec.refX, rec.refZ);
  const delta = newGy - rec.gy;
  if (Math.abs(delta) < 0.05) return; // 誤差レベルは無視
  for (const p of rec.parts) { if (p) p.position.y += delta; }
  rec.gy = newGy;
}
// 矩形範囲(ワールド座標)にかかる駅を、現在の地形に合わせてまとめて追従させる。
// rebuildBuildingsInBoundsと同じタイミング(NEAR再取得時・チャンク生成時)で呼ぶ。
// 駅は数が少ないため建物のような空間グリッドは使わず線形走査で十分。
function rebuildStationsInBounds(x0, x1, z0, z1) {
  for (const rec of stationRecords) {
    if (rec.refX < x0 || rec.refX > x1 || rec.refZ < z0 || rec.refZ > z1) continue;
    rebuildStationHeight(rec);
  }
}

// ======= OSM DATA LOADER =======
const statusEl = document.getElementById('status');
// トースト化: sticky=true の間は自動で消えない(次の呼び出しか手動再表示まで保持)
let _toastTimer = null;
function showToast(msg, opts) {
  opts = opts || {};
  statusEl.textContent = msg;
  statusEl.style.display = 'block';
  statusEl.style.opacity = '1';
  clearTimeout(_toastTimer);
  if (!opts.sticky) {
    _toastTimer = setTimeout(() => {
      statusEl.style.opacity = '0';
      setTimeout(() => { statusEl.style.display = 'none'; }, 400);
    }, opts.duration || 3000);
  }
}
// 初期スポーン: 神奈川県伊勢原市東成瀬2-2-11
// (国土地理院ジオコーディング「東成瀬2番地」= 35.409103, 139.342331)
const SPAWN_LAT = 35.409103, SPAWN_LON = 139.342331;
// 初期OSM取得範囲と詳細地形はスポーン位置が中心になるよう定義(スパンは従来と同じ0.04°×0.03°)。
// ワールド原点(0,0)=この範囲の中心=スポーン地点となり、以降の全計算が自動で整合する
const OSM_BOUNDS = {
  minLat: SPAWN_LAT - 0.02, minLon: SPAWN_LON - 0.015,
  maxLat: SPAWN_LAT + 0.02, maxLon: SPAWN_LON + 0.015
};
const SCALE = 111000; // 1 game unit = 1 meter
const MID_LAT = (OSM_BOUNDS.minLat + OSM_BOUNDS.maxLat) / 2;
const MID_LON = (OSM_BOUNDS.minLon + OSM_BOUNDS.maxLon) / 2;
const COS_LAT = Math.cos(OSM_BOUNDS.minLat * Math.PI / 180);

function latLonToXZ(lat, lon) {
  const x = (lon - MID_LON) * SCALE * COS_LAT;
  const z = -((lat - MID_LAT) * SCALE);
  return { x, z };
}

// ======= 面フィーチャ(公園・水域・田畑・森) =======
const avoidPolygons = []; // 手続き生成の建物を建ててはいけない領域
const avoidGrid = new Map(); // polyGridAdd/queryPolyGridで使う空間ハッシュ(全件走査を避ける)
const areaPolyBudget = { park: 80, water: 80, farm: 250, campus: 60 }; // 面メッシュのドローコール予算
const lawnMat  = new THREE.MeshLambertMaterial({ color: MODE_CONF.lawn, side: THREE.DoubleSide });
// リボン(ROAD_MAT.water)と同じMeshBasicにして、重なっても境目が見えないようにする
const waterAreaMat = new THREE.MeshBasicMaterial({ color: MODE_CONF.water, side: THREE.DoubleSide });
const minimapWaterPolys = []; // ミニマップに描く実形状水面 {pts,minX,maxX,minZ,maxZ}
const minimapWaterGrid = new Map(); // polyGridAdd/queryPolyGridで使う空間ハッシュ(全件走査を避ける)
// 田畑: あぜ縞のcanvasテクスチャ(uv=世界座標なので repeat で約9m周期の縞になる)
const farmMat = (() => {
  const c = document.createElement('canvas'); c.width = 32; c.height = 32;
  const g = c.getContext('2d');
  const fc = MODE === 'space' ? ['#2a3240', '#3a4756'] // 無機質グリッド
           : MODE === 'marchen' ? ['#7bd06a', '#e8c87a']
           : ['#6a8a3a', '#8a7a4a'];
  g.fillStyle = fc[0]; g.fillRect(0, 0, 32, 32);
  g.fillStyle = fc[1]; g.fillRect(0, 12, 32, 8);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1 / 9, 1 / 9);
  return new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
})();

// 校庭(学校の敷地全体): 土の粒状テクスチャ+陸上トラックの白線を1枚のcanvasに焼き込む。
// buildAreaPoly(ShapeGeometry)は敷地の外接矩形基準で自動的にUV0..1を割り振るため、
// このテクスチャはrepeatさせず、敷地の外接矩形にちょうど1つ収まるように描けばよい。
const campusGroundMat = (() => {
  const c = document.createElement('canvas'); c.width = 512; c.height = 384;
  const g = c.getContext('2d');
  const W = c.width, H = c.height;
  g.fillStyle = '#b89868'; // 土
  g.fillRect(0, 0, W, H);
  for (let i = 0; i < 3500; i++) { // 粒状ノイズ
    const rgb = [100 + Math.random()*50|0, 80 + Math.random()*40|0, 50 + Math.random()*30|0];
    g.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.35)`;
    g.fillRect(Math.random()*W, Math.random()*H, 2, 2);
  }
  // 陸上トラック(白線、スタジアム形=直線+半円のレーンを6本)
  const cx = W/2, cy = H/2;
  g.strokeStyle = 'rgba(255,255,255,0.85)';
  for (let lane = 0; lane < 6; lane++) {
    const rx = W*0.42 - lane*15, ry = H*0.36 - lane*11;
    if (rx < 30 || ry < 18) break;
    const straight = Math.max(0.1, rx - ry);
    g.lineWidth = 2;
    g.beginPath();
    g.moveTo(cx - straight, cy - ry);
    g.lineTo(cx + straight, cy - ry);
    g.arc(cx + straight, cy, ry, -Math.PI/2, Math.PI/2, false);
    g.lineTo(cx - straight, cy + ry);
    g.arc(cx - straight, cy, ry, Math.PI/2, -Math.PI/2, false);
    g.closePath();
    g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  return new THREE.MeshLambertMaterial({ map: tex, side: THREE.DoubleSide });
})();

// ポリゴンから地形に沿った面メッシュを1枚生成(三角形分割はShapeGeometry=earcut)
// holes: 内周リング(中州など)の配列(省略可)
// 水域・公園・田畑ポリゴンのメッシュ一覧。NEAR高解像度地形が更新されたとき、
// 範囲にかかるものだけ高さを再スナップする(浮き/埋まり対策。道路と同じ考え方)。
const areaPolyMeshes = [];
const areaPolyGrid = new Map(); // polyGridAdd/queryPolyGridで使う空間ハッシュ(全件走査を避ける)
function rebuildAreaPolyMesh(entry) {
  const pos = entry.mesh.geometry.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i); // Y(高さ)だけ書き換えるのでX/Zはそのまま読める
    pos.setY(i, getGroundY(x, z) + entry.yOff);
  }
  pos.needsUpdate = true;
  entry.mesh.geometry.computeVertexNormals();
  entry.mesh.geometry.computeBoundingSphere();
}
// 【重要】以前はareaPolyMeshes(取得済み全件。増え続けて減らない)を毎回全件走査していた。
// NEAR地形の再取得・チャンク生成のたびに呼ばれる頻出パスなので、探索が進むほど
// コストが際限なく悪化していた(長時間プレイでの重量化の主因の一つ)。空間ハッシュで近傍だけ拾う。
function rebuildAreaPolysInBounds(x0, x1, z0, z1) {
  for (const e of queryPolyGrid(areaPolyGrid, x0, x1, z0, z1)) {
    // グリッドはセル単位(粗い)なので、無駄な再構築を避けるため最後に正確なbboxで絞る
    if (e.maxX < x0 || e.minX > x1 || e.maxZ < z0 || e.minZ > z1) continue;
    rebuildAreaPolyMesh(e);
  }
}

function buildAreaPoly(pts, mat, yOff, holes) {
  const shape = new THREE.Shape();
  shape.moveTo(pts[0].x, pts[0].z);
  for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i].x, pts[i].z);
  if (holes) for (const hp of holes) {
    if (hp.length < 4) continue;
    const hpath = new THREE.Path();
    hpath.moveTo(hp[0].x, hp[0].z);
    for (let i = 1; i < hp.length; i++) hpath.lineTo(hp[i].x, hp[i].z);
    shape.holes.push(hpath);
  }
  const geo = new THREE.ShapeGeometry(shape);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getY(i); // ShapeのXY平面 → XZ平面へ
    pos.setXYZ(i, x, getGroundY(x, z) + yOff, z);
  }
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 1;
  scene.add(mesh);
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const p of pts) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); }
  const entry = { mesh, yOff, minX, maxX, minZ, maxZ };
  areaPolyMeshes.push(entry);
  polyGridAdd(areaPolyGrid, entry);
}

// buildAreaPolyは元のOSM way頂点(数個)だけで平らな三角形を張るため、起伏のある地形では
// 頂点間で地面から浮いたり埋まったりする(校庭・田畑など、実際に上を歩く地物で顕著)。
// この版はポリゴンの外接矩形をcellSize間隔の格子に分割し、格子点ごとにgetGroundYを
// サンプルするので、地形の起伏に追従する。境界セルはポリゴン外の頂点を含む場合スキップする
// (輪郭がわずかに内側へ痩せるが、実用上は問題ない簡易対応)。
// worldUV=true: UVを世界座標(m)にする(repeatラップの田畑テクスチャ用)。
// worldUV=false: UVをポリゴン外接矩形基準の0..1にする(校庭のトラック等、1枚だけ収めたいテクスチャ用)。
function buildTerrainFollowingAreaPoly(pts, mat, yOff, cellSize, worldUV) {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  pts.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); });
  const nx = Math.max(1, Math.min(80, Math.ceil((maxX - minX) / cellSize)));
  const nz = Math.max(1, Math.min(80, Math.ceil((maxZ - minZ) / cellSize)));
  const verts = [], uvs = [], idx = [];
  const grid = [];
  for (let j = 0; j <= nz; j++) {
    const row = [];
    for (let i = 0; i <= nx; i++) {
      const x = minX + (maxX - minX) * i / nx;
      const z = minZ + (maxZ - minZ) * j / nz;
      if (!pointInPolygon(x, z, pts)) { row.push(-1); continue; }
      row.push(verts.length / 3);
      verts.push(x, getGroundY(x, z) + yOff, z);
      uvs.push(worldUV ? x : i / nx, worldUV ? z : j / nz);
    }
    grid.push(row);
  }
  for (let j = 0; j < nz; j++) for (let i = 0; i < nx; i++) {
    const a = grid[j][i], b = grid[j][i + 1], c = grid[j + 1][i + 1], d = grid[j + 1][i];
    if (a < 0 || b < 0 || c < 0 || d < 0) continue; // 境界セル(ポリゴン外の頂点を含む)は張らない
    idx.push(a, b, c, a, c, d);
  }
  if (idx.length === 0) return; // 細すぎる/境界だけのポリゴンはフォールバックなしで諦める
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 1;
  scene.add(mesh);
  const entry = { mesh, yOff, minX, maxX, minZ, maxZ };
  areaPolyMeshes.push(entry);
  polyGridAdd(areaPolyGrid, entry);
}

function scatterTreesIn(poly, sqmPerTree, cap) {
  const area = (poly.maxX - poly.minX) * (poly.maxZ - poly.minZ);
  const n = Math.min(cap, Math.max(2, Math.floor(area / sqmPerTree)));
  for (let i = 0; i < n; i++) {
    const x = poly.minX + Math.random() * (poly.maxX - poly.minX);
    const z = poly.minZ + Math.random() * (poly.maxZ - poly.minZ);
    if (!pointInPolygon(x, z, poly.pts)) continue;
    if (isOnRoad(x, z, 2.5, 2.5)) continue; // 公園・森を横切る道路の上に木が生えないように
    addTree(x, z, 0.7 + Math.random() * 0.9);
  }
}

// ======= 明治モード: 迅速測図100m土地利用データ =======
// 出典: 農研機構農業環境研究部門「明治時代初期土地利用・被覆デジタルデータベース」(CC BY 4.0)
// https://github.com/wata909/habs_test — GitHub Pages配信でCORS可、プロキシ不要。
// 100m間隔の点データ。code: 1水田 2畑 3果樹園(桑茶) 4森林 5草地荒地 6村落 7土手崖 8砂地 9湿地 10水面 11竹 12塩田
const meijiCells = new Map();       // "gx,gz"(100m格子) → 土地利用コード
const meijiMeshLoaded = new Set();  // 取得済み二次メッシュ
let meijiReady = false;

function meijiMeshCode(lat, lon) {
  const p = Math.floor(lat * 1.5), u = Math.floor(lon - 100);
  const q = Math.floor((lat * 1.5 - p) * 8), v = Math.floor(((lon - 100) - u) * 8);
  return { m1: '' + p + u, m2: '' + p + u + q + v };
}

async function loadMeijiMesh(lat, lon) {
  const { m1, m2 } = meijiMeshCode(lat, lon);
  if (meijiMeshLoaded.has(m2)) return;
  meijiMeshLoaded.add(m2);
  try {
    const res = await fetch(`https://wata909.github.io/habs_test/${m1}/geojson/rapid${m2}.geojson`);
    if (!res.ok) return; // データ未整備地域(404)は空扱いで確定
    const gj = await res.json();
    if (!gj || !gj.features) return;
    for (const f of gj.features) {
      if (!f.geometry || f.geometry.type !== 'Point') continue;
      const code = f.properties && (f.properties.code || f.properties.habs_code);
      if (!code) continue;
      const p = latLonToXZ(f.geometry.coordinates[1], f.geometry.coordinates[0]);
      meijiCells.set(Math.round(p.x / 100) + ',' + Math.round(p.z / 100), code);
      // 森林・竹は読み込み時に低密度で木を散布(恒久インスタンス。プール上限で頭打ち)
      if ((code === 4 || code === 11) && Math.random() < 0.4) {
        const tx = p.x + (Math.random() - 0.5) * 80, tz = p.z + (Math.random() - 0.5) * 80;
        if (!isOnRoad(tx, tz, 2.5, 2.5)) // 街道の上に木が生えないように
          addTree(tx, tz, code === 11 ? 0.55 : 0.8 + Math.random() * 0.8);
      }
    }
  } catch (e) { meijiMeshLoaded.delete(m2); } // ネットワーク失敗は再試行可能に
}

async function loadMeijiLanduse() {
  showToast('🌾 明治期土地利用データ取得中...', { sticky: true });
  const jobs = [];
  for (const lat of [OSM_BOUNDS.minLat, OSM_BOUNDS.maxLat])
    for (const lon of [OSM_BOUNDS.minLon, OSM_BOUNDS.maxLon])
      jobs.push(loadMeijiMesh(lat, lon));
  await Promise.all(jobs);
  meijiReady = true;
  showToast(`🌾 明治期土地利用 ${meijiCells.size} 地点読込`);
}

// ======= 頂点間引きほか =======
// 頂点の間引き — 直前の採用点から tol[m] 未満の点をスキップ(大河川の負荷対策)
function thinPts(pts, tol) {
  if (tol <= 0 || pts.length < 20) return pts;
  const out = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    const last = out[out.length - 1];
    const dx = pts[i].x - last.x, dz = pts[i].z - last.z;
    if (dx * dx + dz * dz >= tol * tol) out.push(pts[i]);
  }
  out.push(pts[pts.length - 1]);
  return out;
}

// ======= multipolygon 水面(相模川クラスの大河川) =======
// 大きな水面はOSMでは relation(multipolygon) で表現され、outer が複数wayに
// 分割されていることが多い。端点一致で連結して閉リングを組み立てる。
const seenOSMRels = new Set();
function _llEq(a, b) { return Math.abs(a.lat - b.lat) < 1e-6 && Math.abs(a.lon - b.lon) < 1e-6; }
function stitchRings(members) {
  const segs = members.map(m => m.geometry.slice());
  const rings = [];
  while (segs.length) {
    let ring = segs.pop().slice();
    let guard = 0;
    while (guard++ < 500) {
      const head = ring[0], tail = ring[ring.length - 1];
      if (_llEq(head, tail)) break; // 閉じた
      let found = -1, rev = false, atEnd = true;
      for (let i = 0; i < segs.length; i++) {
        const s = segs[i], sh = s[0], st = s[s.length - 1];
        if (_llEq(tail, sh)) { found = i; rev = false; atEnd = true;  break; }
        if (_llEq(tail, st)) { found = i; rev = true;  atEnd = true;  break; }
        if (_llEq(head, st)) { found = i; rev = false; atEnd = false; break; }
        if (_llEq(head, sh)) { found = i; rev = true;  atEnd = false; break; }
      }
      if (found < 0) break; // これ以上つながらない → 開いたまま採用(earcutは閉じ扱い)
      let s = segs.splice(found, 1)[0];
      if (rev) s = s.slice().reverse();
      ring = atEnd ? ring.concat(s.slice(1)) : s.concat(ring.slice(1));
    }
    if (ring.length >= 4) rings.push(ring);
  }
  return rings;
}

function processWaterRelation(el) {
  if (el.type !== 'relation' || !el.members) return;
  const tags = el.tags || {};
  if (!(tags.natural === 'water' || tags.waterway === 'riverbank' || tags.water)) return;
  if (seenOSMRels.has(el.id)) return;
  seenOSMRels.add(el.id);
  const outers = el.members.filter(m => m.type === 'way' && m.role !== 'inner' && m.geometry && m.geometry.length >= 2);
  const inners = el.members.filter(m => m.type === 'way' && m.role === 'inner' && m.geometry && m.geometry.length >= 2);
  const innerRings = stitchRings(inners);
  for (const ring of stitchRings(outers)) {
    let pts = ring.map(g => latLonToXZ(g.lat, g.lon));
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    pts.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); });
    const span = Math.max(maxX - minX, maxZ - minZ);
    if (span < 25) continue;
    const tol = span > 1500 ? 25 : span > 400 ? 10 : 0;
    pts = thinPts(pts, tol);
    if (pts.length < 4) continue;
    const poly = { pts, minX, maxX, minZ, maxZ };
    avoidPolygons.push(poly); // 水面内には建物を生成しない
    polyGridAdd(avoidGrid, poly);
    if (areaPolyBudget.water-- > 0) {
      // このouterのbbox内にある中州(inner)を穴として追加
      const holes = innerRings
        .map(r => thinPts(r.map(g => latLonToXZ(g.lat, g.lon)), tol))
        .filter(hp => hp.length >= 4 &&
                hp[0].x >= minX && hp[0].x <= maxX && hp[0].z >= minZ && hp[0].z <= maxZ);
      buildAreaPoly(pts, waterAreaMat, 0.15, holes);
      minimapWaterPolys.push(poly);
      polyGridAdd(minimapWaterGrid, poly);
    }
  }
}

// waterway の実幅: width タグ優先、なければ種別から推定
function waterwayWidth(tags) {
  const wtag = parseFloat(tags.width || tags['width:river']); // "5 m" 等も parseFloat で拾える
  if (wtag > 0) return Math.min(60, Math.max(1.5, wtag));
  switch (tags.waterway) {
    case 'river':  return 12;
    case 'canal':  return 5;
    case 'stream': return 2.5;
    default:       return 3;
  }
}

// OSM要素が面フィーチャなら処理して true を返す(初期ロード・タイル両方から呼ばれる)
function handleAreaFeature(el) {
  if (el.type !== 'way' || !el.geometry || el.geometry.length < 4) return false;
  const tags = el.tags || {};
  const lu = tags.landuse || '';
  // riverbank ポリゴン(旧スタイルの川の実形状)も水面として扱う
  const isWater  = tags.natural === 'water' || tags.waterway === 'riverbank';
  // 明治: 現代の公園・田畑・森ポリゴンは使わない(迅速測図データで代替)。川・水面のみ残す
  if (IS_MEIJI && !isWater) return false;
  const isPark   = tags.leisure === 'park' || tags.leisure === 'garden' || tags.leisure === 'playground';
  const isFarm   = ['farmland','farm','orchard','meadow','allotments','vineyard'].includes(lu);
  const isForest = lu === 'forest' || tags.natural === 'wood';
  // 学校・大学・病院の敷地全体(構内に手続き生成の家を建てさせないための回避ゾーン)
  const isCampus = ['school','university','college','hospital'].includes(tags.amenity || '');
  if (!isPark && !isWater && !isFarm && !isForest && !isCampus) return false;
  const pts = el.geometry.map(g => latLonToXZ(g.lat, g.lon));
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  pts.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); });
  const poly = { pts, minX, maxX, minZ, maxZ };
  avoidPolygons.push(poly);
  polyGridAdd(avoidGrid, poly);
  // 巨大ポリゴンの面メッシュは張らない(頂点間で地形を突き抜けるため)。木は個別に接地するのでOK
  // また面メッシュ=1ドローコールなので種類ごとに総数予算を設ける(超過分は回避領域としてのみ機能)
  const span = Math.max(maxX - minX, maxZ - minZ);
  if (isPark) {
    if (span < 400 && areaPolyBudget.park-- > 0) buildTerrainFollowingAreaPoly(pts, lawnMat, 0.14, 20, false);
    scatterTreesIn(poly, 170, 40);
    const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
    for (let i = 0; i < 3; i++) { // ベンチ
      const bx = cx + (Math.random() - 0.5) * (maxX - minX) * 0.5;
      const bz = cz + (Math.random() - 0.5) * (maxZ - minZ) * 0.5;
      if (pointInPolygon(bx, bz, pts)) poolAdd(benchP, bx, getGroundY(bx, bz) + 0.35, bz, Math.random() * Math.PI);
    }
    if (pointInPolygon(cx, cz, pts)) { // 公園灯
      const gy = getGroundY(cx, cz);
      poolAdd(poleP, cx, gy + 2, cz, 0, 0.6, 0.5, 0.6);
      poolAdd(lampP, cx, gy + 4.1, cz, 0, 1, 1, 1, 0xffcc77);
    }
  } else if (isWater) {
    if (span < 3000 && areaPolyBudget.water-- > 0) {
      const tp = thinPts(pts, span > 400 ? 10 : 0);
      buildAreaPoly(tp, waterAreaMat, 0.15);
      const _wpEntry = { pts: tp, minX, maxX, minZ, maxZ };
      minimapWaterPolys.push(_wpEntry);
      polyGridAdd(minimapWaterGrid, _wpEntry);
    }
  } else if (isFarm) {
    if (span >= 15 && span < 500 && areaPolyBudget.farm-- > 0) buildTerrainFollowingAreaPoly(pts, farmMat, 0.1, 20, true);
  } else if (isForest) {
    scatterTreesIn(poly, 380, 70);
  } else if (isCampus) {
    if (span < 900 && areaPolyBudget.campus-- > 0) buildTerrainFollowingAreaPoly(pts, campusGroundMat, 0.13, 25, false);
  }
  return true;
}

// ======= TERRAIN SYSTEM =======
const TERRAIN_SEGS = 24; // 25x25 = 625 vertices, ~170m grid
const WORLD_W = (OSM_BOUNDS.maxLon - OSM_BOUNDS.minLon) * SCALE * COS_LAT;
const WORLD_D = (OSM_BOUNDS.maxLat - OSM_BOUNDS.minLat) * SCALE;
const SEGS1 = TERRAIN_SEGS + 1;

// Build terrain mesh (detailed, covers OSM area)
// 高さ別の頂点カラーで起伏を視覚化するマテリアル(遠景地形と共用)
const terrainGeo = new THREE.PlaneGeometry(WORLD_W, WORLD_D, TERRAIN_SEGS, TERRAIN_SEGS);
const terrainCols = new Float32Array(SEGS1 * SEGS1 * 3);
for (let i = 0; i < SEGS1 * SEGS1; i++) { terrainCols[i*3] = 0.23; terrainCols[i*3+1] = 0.33; terrainCols[i*3+2] = 0.21; }
terrainGeo.setAttribute('color', new THREE.BufferAttribute(terrainCols, 3));
const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true });
terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
terrainMesh.rotation.x = -Math.PI / 2;
terrainMesh.receiveShadow = true;
terrainMesh.renderOrder = 0;
scene.add(terrainMesh);

// 遠景の実地形データ(loadWideTerrain がバックグラウンドで代入)。
// farNodeY が参照するため、初回 updateFarMesh(true) より前に宣言しておく(TDZ回避)。
let wideElev = null;

// ======= 遠景地形メッシュ(プレイヤー追従) =======
// 以前は y=-0.3 の平坦な巨大平面だったため、OSM_BOUNDS 外に動的生成された
// 道路・建物(getTerrainY はエッジの標高にクランプされる)が宙に浮き、
// 下に地面が無い状態になっていた。道路・建物と同じ getTerrainY を
// サンプリングする粗いメッシュをプレイヤーに追従させることで、
// 生成物のある場所には必ず一致した高さの地面が存在するようにする。
const FAR_SIZE = 12000, FAR_SEGS = 60, FAR_SEGS1 = FAR_SEGS + 1; // 半径6km > far(5000) なので端は見えない
const farGeo = new THREE.PlaneGeometry(FAR_SIZE, FAR_SIZE, FAR_SEGS, FAR_SEGS);
farGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(FAR_SEGS1 * FAR_SEGS1 * 3), 3));
const farMesh = new THREE.Mesh(farGeo, terrainMat);
farMesh.rotation.x = -Math.PI / 2;
farMesh.frustumCulled = false; // 頂点変位+移動するためカリングさせない
farMesh.renderOrder = 0;
scene.add(farMesh);

// --- 遠景メッシュの高さは farNodeY / farSurfaceY に一本化する ---
// 頂点は世界座標に固定された FAR_STEP(200m) 格子上にあり(中心スナップも FAR_STEP 単位)、
// 「描画される遠景メッシュ表面」= farSurfaceY が返す値、が厳密に成り立つ。
const FAR_STEP = FAR_SIZE / FAR_SEGS; // 200m
const FAR_Y = -0.15;                  // メッシュ全体のyオフセット(詳細地形とのz-fighting回避)
const FAR_SINK_MARGIN = 250, FAR_SINK = 5; // 詳細地形の内側では5m沈めて重なりを防ぐ

// 格子ノード(i,j)の高さ(メッシュ頂点とクエリの両方がこの1つの関数を使う)
function farNodeY(i, j) {
  const x = i * FAR_STEP, z = j * FAR_STEP;
  const inDetail = x > -WORLD_W/2 + FAR_SINK_MARGIN && x < WORLD_W/2 - FAR_SINK_MARGIN &&
                   z > -WORLD_D/2 + FAR_SINK_MARGIN && z < WORLD_D/2 - FAR_SINK_MARGIN;
  let h = getTerrainY(x, z); // 詳細グリッド(範囲外は縁の高さでクランプ)
  if (inDetail) return h - FAR_SINK;
  // 詳細範囲の外側: 遠景の実地形(wideElev)へ滑らかに遷移させ、大山や海岸を出す。
  // wideElev 未取得時は従来どおりクランプ値のまま(安全なフォールバック)。
  if (wideElev) {
    const dEdge = Math.max(Math.abs(x) - (WORLD_W/2 - FAR_SINK_MARGIN),
                           Math.abs(z) - (WORLD_D/2 - FAR_SINK_MARGIN), 0);
    const t = Math.min(1, dEdge / 1400); // 縁から1.4kmかけて実地形へブレンド
    h = h * (1 - t) + getWideTerrainY(x, z) * t;
  }
  return h;
}

// 描画される遠景メッシュ表面と厳密に一致する高さ(三角形分割もPlaneGeometryと同一)
function farSurfaceY(x, z) {
  const i = Math.floor(x / FAR_STEP), j = Math.floor(z / FAR_STEP);
  const u = x / FAR_STEP - i, v = z / FAR_STEP - j;
  const ha = farNodeY(i, j),     hb = farNodeY(i, j + 1);
  const hc = farNodeY(i + 1, j + 1), hd = farNodeY(i + 1, j);
  const s = (u + v <= 1)
    ? ha + (hd - ha) * u + (hb - ha) * v
    : hc + (hb - hc) * (1 - u) + (hd - hc) * (1 - v);
  return s + FAR_Y;
}

let farLastX = Infinity, farLastZ = Infinity;
function updateFarMesh(force) {
  const cx = Math.round(player.position.x / FAR_STEP) * FAR_STEP;
  const cz = Math.round(player.position.z / FAR_STEP) * FAR_STEP;
  if (!force && cx === farLastX && cz === farLastZ) return;
  farLastX = cx; farLastZ = cz;
  farMesh.position.set(cx, FAR_Y, cz);
  const i0 = Math.round((cx - FAR_SIZE / 2) / FAR_STEP);
  const j0 = Math.round((cz - FAR_SIZE / 2) / FAR_STEP);
  const pos = farGeo.attributes.position, col = farGeo.attributes.color;
  for (let jz = 0; jz < FAR_SEGS1; jz++) {
    for (let jx = 0; jx < FAR_SEGS1; jx++) {
      const idx = jz * FAR_SEGS1 + jx;
      const h = farNodeY(i0 + jx, j0 + jz); // クエリと同じノード関数を使用
      pos.setZ(idx, h);
      const c = terrainColorRGB(h);
      col.setXYZ(idx, c[0], c[1], c[2]);
    }
  }
  pos.needsUpdate = true;
  col.needsUpdate = true;
  farGeo.computeVertexNormals();
}

let elevData = null;  // flat array [iz * SEGS1 + ix]
let elevBase = 0;

// 詳細地形メッシュの「描画される表面」と厳密に一致する高さを返す。
// 修正点1: 以前はバイリニア補間だったが、実際のメッシュは三角形で描画されるため
//   急斜面ではセル対角線上で最大数mズレて道路が埋まっていた。
//   → PlaneGeometry と同じ対角線(b-d)の区分線形補間に変更し、ズレをゼロに。
// 修正点2: 範囲外で fx>1 のまま線形外挿され高さが暴走していた → [0,1]にクランプ。
function getTerrainY(x, z) {
  if (!elevData) return 0;
  const nx = (x + WORLD_W / 2) / WORLD_W * TERRAIN_SEGS;
  const nz = (z + WORLD_D / 2) / WORLD_D * TERRAIN_SEGS;
  const ix = Math.max(0, Math.min(TERRAIN_SEGS - 1, Math.floor(nx)));
  const iz = Math.max(0, Math.min(TERRAIN_SEGS - 1, Math.floor(nz)));
  const fx = Math.max(0, Math.min(1, nx - ix));
  const fz = Math.max(0, Math.min(1, nz - iz));
  const h00 = elevData[ iz    * SEGS1 + ix    ];
  const h10 = elevData[ iz    * SEGS1 + ix + 1];
  const h01 = elevData[(iz+1) * SEGS1 + ix    ];
  const h11 = elevData[(iz+1) * SEGS1 + ix + 1];
  if (fx + fz <= 1) return h00 + (h10 - h00) * fx + (h01 - h00) * fz;
  return h11 + (h01 - h11) * (1 - fx) + (h10 - h11) * (1 - fz);
}

// 起伏の倍率
const ELEV_SCALE = 2.0;

// ======= 「見えている地面」の高さ(生成物・プレイヤーはすべてこれを使う) =======
// 画面に存在する地面は「詳細地形メッシュ」と「遠景地形メッシュ」の2枚。
// getTerrainY / farSurfaceY はどちらも描画される三角形と厳密に一致するので、
// その上側包絡線(max)に置けば、どちらのメッシュにも埋まることは構造上あり得ない。
function getGroundY(x, z) {
  const inside = x >= -WORLD_W/2 && x <= WORLD_W/2 && z >= -WORLD_D/2 && z <= WORLD_D/2;
  const fy = farSurfaceY(x, z);
  return inside ? Math.max(getTerrainY(x, z), fy) : fy;
}

// 高さ→頂点カラー: 緑(低地) → 深緑(山) → 岩 → 雪。詳細地形と遠景地形で共用
let terrainMaxH = 1;
// 岩・雪・森林限界の境界(ゲーム高さ)。実標高(m)基準で loadElevations が設定する。
// 以前は「詳細エリアの最大高」で正規化していたため、遠景の実際の高山(大山1252m)が
// 正規化1.0を超えて全部「白い岩」になり、森も詳細エリアの縁で途切れていた。
// 実標高基準にして、山は中腹まで緑・森、岩と雪は本当に高い所だけにする。
let ROCK_Y = 1e9, SNOW_Y = 1e9, TREELINE = 1e9;
function terrainColorRGB(h) {
  if (MODE === 'space')   { const t = Math.max(0,Math.min(1,h/terrainMaxH)); const g = 0.15 + t*0.25; return [g*0.9, g, g*1.3]; }
  if (MODE === 'edo')     { const t = Math.max(0,Math.min(1,h/terrainMaxH)); return [0.30 + 0.18*t, 0.27 + 0.10*t, 0.16 + 0.06*t]; }
  if (MODE === 'marchen') { const t = Math.max(0,Math.min(1,h/terrainMaxH)); return [0.28 + 0.42*t, 0.60 - 0.12*t, 0.32 + 0.28*t]; }
  // 現実・明治: 実標高基準。森林限界(約2500m)まで森の緑、2500〜2900mで岩、2900m以上が雪。
  // 大山・丹沢はいずれも2500m未満なので全山が緑=森になる。
  if (h < ROCK_Y) { const k = Math.max(0, Math.min(1, h / Math.max(1, ROCK_Y))); return [0.20 - 0.05*k, 0.34 - 0.07*k, 0.17 - 0.03*k]; } // 低地の緑→山地の深緑
  if (h < SNOW_Y) { const k = (h - ROCK_Y) / Math.max(1, SNOW_Y - ROCK_Y);       return [0.15 + 0.32*k, 0.26 + 0.22*k, 0.13 + 0.22*k]; } // 岩肌
  const k = Math.min(1, (h - SNOW_Y) / Math.max(1, SNOW_Y - ROCK_Y));            return [0.55 + 0.35*k, 0.58 + 0.32*k, 0.56 + 0.38*k];   // 雪
}
// 起動直後も緑の地面で初期化(elevData ロード後に applyTerrain が再サンプリングする)
updateFarMesh(true);

// elevData を terrainGeo に反映(頂点高さ+高さ別カラー+法線+バウンディング再計算)
function applyTerrain() {
  const posAttr = terrainGeo.attributes.position;
  const colAttr = terrainGeo.attributes.color;
  terrainMaxH = 1;
  for (const h of elevData) terrainMaxH = Math.max(terrainMaxH, h);
  for (let i = 0; i < elevData.length; i++) {
    const h = elevData[i];
    posAttr.setZ(i, h); // メッシュ回転前のローカルZ → ワールドY
    const c = terrainColorRGB(h);
    colAttr.setXYZ(i, c[0], c[1], c[2]);
  }
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
  terrainGeo.computeVertexNormals();
  terrainGeo.computeBoundingSphere(); // 頂点変位後に再計算しないとカリング判定が狂う
  updateFarMesh(true); // 遠景地形も新しい標高で再サンプリング
}

// API失敗時のフォールバック — 北西(大山方面)に向かって高くなる擬似地形
function proceduralElevs(elevs) {
  for (let iz = 0; iz < SEGS1; iz++) {
    for (let ix = 0; ix < SEGS1; ix++) {
      const wx = -WORLD_W/2 + ix * WORLD_W / TERRAIN_SEGS;
      const wz = -WORLD_D/2 + iz * WORLD_D / TERRAIN_SEGS;
      const fx = (wx + WORLD_W/2) / WORLD_W; // 0=西
      const fz = (wz + WORLD_D/2) / WORLD_D; // 0=北
      const mountain = Math.pow(Math.max(0, 1 - (fx*1.4 + fz*0.9)), 2) * 350;
      const rolling = (Math.sin(wx*0.004)*Math.cos(wz*0.003) + Math.sin(wx*0.011+1.7)*Math.cos(wz*0.009+0.6)*0.5) * 12 + 14;
      elevs[iz * SEGS1 + ix] = Math.max(0, mountain + rolling);
    }
  }
}

// 同時実行数を絞ってバッチ処理する小さなワーカープール。
// 標高取得を Promise.all で無制限に並列発行していたところ、遠景の高解像度化(WIDE_SEGS増)
// と合わさって一度に最大50件以上の同時リクエストが発生し、プロキシ/サーバーが詰まって
// OSM取得(伊勢原本体)まで巻き添えで失敗する、遠くへジャンプした際に地形取得自体が
// 失敗して何も描写されない、という不具合を起こしていた。同時実行数を小さく固定する。
const FETCH_CONCURRENCY = 3;
async function runLimited(items, worker, limit = FETCH_CONCURRENCY) {
  const results = new Array(items.length);
  let idx = 0;
  async function runNext() {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await worker(items[i], i);
    }
  }
  const pool = [];
  for (let n = 0; n < Math.min(limit, items.length); n++) pool.push(runNext());
  await Promise.all(pool);
  return results;
}

// ======= 国土地理院(GSI)標高タイル =======
// opentopodataには「1リクエスト/秒・1リクエスト最大100地点・1日最大1000コール」の制限があり、
// 初回起動だけで約21コール(初期7+遠景9+NEAR5)、移動のたびにさらに消費するため、
// 「地形待ち→道路・建物生成が全部ゲートされて遅い」の根本原因だった。
// 日本国内では国土地理院の標高タイル(dem_png: DEM10B相当、z14、約10mメッシュ)を
// 並列取得する。レート制限・日次上限が無く、地形読み込みが数十秒→数秒になる。
// ・タイルはCORS対応なのでプロキシを通さず直接fetchできる(ブラウザHTTPキャッシュも効く)
// ・海上などタイルが無い場所は404が正常応答 → 「データ無し」(呼び出し側で海底/0m扱い)
// ・日本のカバー範囲外の点が混じるグリッドや、ネットワークエラー時は null を返し、
//   呼び出し側が従来どおり opentopodata へフォールバックする(挙動の安全網は従来のまま)
const GSI_DEM_Z = 14;
const _gsiTiles = new Map(); // "tx,ty" -> Promise<Float32Array|null> (null=タイル無し/海上)
const GSI_TILE_CACHE_MAX = 120; // 約30MB。超えたら古い順に捨てる(HTTPキャッシュがあるので再取得は速い)
function gsiCovers(lat, lon) { return lat >= 20 && lat <= 46 && lon >= 122 && lon <= 154; }
function _gsiLoadTile(tx, ty) {
  const key = tx + ',' + ty;
  let p = _gsiTiles.get(key);
  if (p) return p;
  p = (async () => {
    const res = await fetch(`https://cyberjapandata.gsi.go.jp/xyz/dem_png/${GSI_DEM_Z}/${tx}/${ty}.png`);
    if (res.status === 404) return null; // 海上など: タイルが存在しない(正常系)
    if (!res.ok) throw new Error('GSI HTTP ' + res.status);
    const bmp = await createImageBitmap(await res.blob());
    const cv = document.createElement('canvas');
    cv.width = 256; cv.height = 256;
    const ctx = cv.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(bmp, 0, 0);
    const d = ctx.getImageData(0, 0, 256, 256).data;
    const out = new Float32Array(65536);
    for (let i = 0; i < 65536; i++) {
      // 標高 = (R*2^16 + G*2^8 + B) * 0.01m。2^23 は無効値(海など)。それ以上は負値(2^24を引く)
      const x = d[i * 4] * 65536 + d[i * 4 + 1] * 256 + d[i * 4 + 2];
      out[i] = (x === 8388608) ? NaN : (x < 8388608 ? x : x - 16777216) * 0.01;
    }
    return out;
  })();
  p.catch(() => _gsiTiles.delete(key)); // 失敗Promiseをキャッシュに残すと永久に失敗し続けるため取り除く
  _gsiTiles.set(key, p);
  if (_gsiTiles.size > GSI_TILE_CACHE_MAX) {
    for (const k of _gsiTiles.keys()) {
      if (_gsiTiles.size <= GSI_TILE_CACHE_MAX) break;
      if (k !== key) _gsiTiles.delete(k);
    }
  }
  return p;
}
// latlons([{lat,lon},...])に対応する標高(m)の配列を返す。データ無し地点(海上)は null。
// グリッド全体が使えない場合(国外の点が混じる/ネットワーク失敗)は null を返す。
async function fetchElevationsGSI(latlons) {
  if (!latlons.length || !latlons.every(ll => gsiCovers(ll.lat, ll.lon))) return null;
  try {
    const n = 2 ** GSI_DEM_Z;
    const jobs = latlons.map(ll => {
      const xt = (ll.lon + 180) / 360 * n;
      const latR = ll.lat * Math.PI / 180;
      const yt = (1 - Math.log(Math.tan(latR) + 1 / Math.cos(latR)) / Math.PI) / 2 * n;
      const tx = Math.floor(xt), ty = Math.floor(yt);
      return { key: tx + ',' + ty, tx, ty,
        px: Math.min(255, Math.floor((xt - tx) * 256)),
        py: Math.min(255, Math.floor((yt - ty) * 256)) };
    });
    // タイル単位に重複排除して並列取得(キャッシュ削除に巻き込まれないようローカルに保持)
    const tiles = new Map();
    const keys = [...new Set(jobs.map(j => j.key))];
    await runLimited(keys, async (k, i) => {
      const j = jobs.find(jb => jb.key === k);
      tiles.set(k, await _gsiLoadTile(j.tx, j.ty));
    }, 8);
    return jobs.map(j => {
      const tile = tiles.get(j.key);
      const h = tile ? tile[j.py * 256 + j.px] : NaN;
      return Number.isFinite(h) ? h : null;
    });
  } catch (e) {
    return null; // ネットワークエラー等 → 呼び出し側で opentopodata にフォールバック
  }
}

async function loadElevations() {
  showToast('🏔 地形データ取得中...', { sticky: true });
  // Build lat/lon for each vertex
  // PlaneGeometry vertex (ix, iz): worldX = -W/2 + ix*W/SEGS, worldZ = -D/2 + iz*D/SEGS
  const latlons = [];
  for (let iz = 0; iz < SEGS1; iz++) {
    for (let ix = 0; ix < SEGS1; ix++) {
      const wx = -WORLD_W/2 + ix * WORLD_W / TERRAIN_SEGS;
      const wz = -WORLD_D/2 + iz * WORLD_D / TERRAIN_SEGS;
      latlons.push(xzToLatLon(wx, wz));
    }
  }
  const elevs = new Array(latlons.length).fill(0);
  let ok = true;
  // まず国土地理院タイルから並列取得(数秒)。国外・失敗時のみopentopodata(直列・低速)へ
  const gsi = await fetchElevationsGSI(latlons);
  if (gsi) {
    for (let i = 0; i < elevs.length; i++) elevs[i] = gsi[i] || 0; // データ無し(海上)は0m
  } else try {
    // バッチを少数ずつ並列発行する(FETCH_CONCURRENCY件まで)。opentopodataの1req/秒
    // レート制限は server/server.js のプロキシ側(scheduleUpstream)が直列キューで既に
    // 守っているため、クライアント側でさらに1.1秒ずつ待つのは二重の待機だった。
    // ただし無制限に同時発行するとプロキシ/サーバーが詰まるため、少数の同時実行数に絞る。
    const batches = [];
    for (let i = 0; i < latlons.length; i += 100) batches.push(latlons.slice(i, i + 100));
    const results = await runLimited(batches, batch => {
      const locStr = batch.map(ll => `${ll.lat.toFixed(6)},${ll.lon.toFixed(6)}`).join('|');
      return fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${encodeURIComponent(locStr)}`).then(r => r.json());
    });
    results.forEach((json, bi) => {
      if (json && json.results) json.results.forEach((r, j) => { elevs[bi*100 + j] = r.elevation || 0; });
      else ok = false; // 429等 — 失敗分は0のままだが、ok=falseで下のprocedural地形に総入れ替えされる
    });
  } catch(e) { ok = false; }

  if (!ok) {
    showToast('⚠️ 地形API失敗 - 擬似地形を生成');
    proceduralElevs(elevs);
  }

  elevBase = Math.min(...elevs);
  // 岩・雪・森林限界の高さ境界を実標高基準で確定(applyTerrain の着色前に必要)。
  // 本州中部の森林限界は約2500m。丹沢(〜1673m)・大山(1252m)はこれより低く、頂上まで森。
  ROCK_Y   = (2500 - elevBase) * ELEV_SCALE; // これ以上で岩肌(この一帯には基本存在しない)
  SNOW_Y   = (2900 - elevBase) * ELEV_SCALE; // これ以上で雪
  TREELINE = (2500 - elevBase) * ELEV_SCALE; // 森林限界≈2500m。大山・丹沢は全山が森になる
  elevData = elevs.map(e => Math.max(0, e - elevBase) * ELEV_SCALE);
  applyTerrain();
  // 地形確定後、松明ライトを地表の高さに再配置(固定y=4のままだと丘に埋まる)
  torchLights.forEach(l => { l.position.y = getGroundY(l.position.x, l.position.z) + 4; });
  initDistantSea(); // elevBase 確定後に海面を作る
  if (ok) showToast('🏔 地形反映完了');
}

// ======= 遠景の実地形(北西=大山の山塊 / 南=相模湾へ下る海岸) =======
// 詳細標高グリッド(±約2.2km、約170m間隔)の外側に、実標高グリッドを背景として敷く。
// これで遠景メッシュ(farMesh、半径6km=直径12km相当を描画)が縁の高さでクランプされて
// 平坦になるのを解消し、北西に大山が立ち上がり、南は海面へ下る本物の地形が地平に現れる。
//
// 「伊勢原と同じ解像度を全域で」に一段階のグリッドで対応しようとすると、広い範囲を
// 高解像度で覆うために一度に大量の点(50バッチ超)を取りに行くことになり、公開APIや
// プロキシが詰まって「格子状フォールバックに落ちる」「取り直しに5分かかる」不具合が
// 起きていた。そこで2段階構成にする:
//   ① FAR  = 広い範囲(±14km)を低解像度で覆う。地平線に見える山並み・海岸線の概形用。
//            取得点数が少ない(約9バッチ)ので初回・再取得とも短時間で確実に終わる。
//   ② NEAR = プレイヤーの周囲(±4km)を比較的高い解像度(約300〜400m間隔)で覆う。
//            範囲が狭いので取得点数も少なく、頻繁に取り直しても軽い。
// 実際の高さ問い合わせ(getWideTerrainY)は、まずNEARの範囲内ならNEARを、範囲外ならFARを返す。
//
// 【opentopodata公開APIの実際の上限(公式ポリシーで確認済み)】
//   1リクエスト/秒・1リクエスト最大100地点、かつ「1日あたり最大1000コール」というハード上限がある。
//   NEARを伊勢原本体と同じ約170m間隔・±2kmのままだと、ダッシュ(45m/s)で動き続けた場合
//   1時間で900コール超に達し、1日の上限をわずか1時間程度で使い切ってしまう計算になった。
//   上限に達すると以降その日は標高取得が失敗し続け、地形が更新されなくなる(=読み込みが
//   進まないまま止まる)ため、これが「読み込みが遅い/終わらない」の一因になっていた可能性が高い。
//   → NEARの範囲を広げ(±2km→±4km)て取り直しの頻度そのものを下げ、かつ解像度を少し
//   落とす(約170m→約300〜400m)ことで、1回の取り直しあたりのバッチ数と発生頻度の両方を
//   減らした。体感の「待ち時間」は「取り直し頻度 × 1回あたりの待ち時間」で決まるため、
//   頻度を下げるほうが解像度をわずかに落とすより効果が大きい。
const WIDE_HALF_LAT = 0.13, WIDE_HALF_LON = 0.13;   // FAR: ≈ ±14km(低解像度)
const WIDE_SEGS = 28, WIDE_SEGS1 = WIDE_SEGS + 1;   // FAR: 約1km間隔、約9バッチ
const WIDE_W = 2 * WIDE_HALF_LON * SCALE * COS_LAT;
const WIDE_D = 2 * WIDE_HALF_LAT * SCALE;
// 遠景標高グリッドの中心(ワールド座標)。プレイヤーが遠くへ移動/ジャンプしたら中心を移して取り直す。
// これで富士山など伊勢原から離れた場所でも実際の地形・標高が出る。
let wideCX = 0, wideCZ = 0, wideLoading = false;

const NEAR_HALF_LAT = 0.036, NEAR_HALF_LON = 0.036; // NEAR: ≈ ±4km(高解像度・プレイヤー追従)
const NEAR_SEGS = 20, NEAR_SEGS1 = NEAR_SEGS + 1;   // NEAR: 約300〜400m間隔、約5バッチ
const NEAR_W = 2 * NEAR_HALF_LON * SCALE * COS_LAT;
const NEAR_D = 2 * NEAR_HALF_LAT * SCALE;
let nearElev = null, nearCX = 0, nearCZ = 0, nearLoading = false;

let seaLevelM = 5;            // 海面の実標高(m)。スライダーで変更可(elevBase確定時に初期値を上書き)
// wideElev は上方(遠景地形メッシュ定義の前)で宣言済み。flat [iz*WIDE_SEGS1+ix] = ゲーム高さ(実標高で固定)
let SEA_Y = 0;                // 海面(seaLevelM)のゲーム高さ。SEA_Y = (seaLevelM - elevBase) * ELEV_SCALE

// 汎用のバイリニア補間。inRangeOnly=true のときは範囲外で null を返す(NEARの範囲外判定に使う)。
function sampleGrid(elev, cx, cz, w, d, segs, segs1, x, z, inRangeOnly) {
  if (!elev) return null;
  const nx = (x - cx + w / 2) / w * segs;
  const nz = (z - cz + d / 2) / d * segs;
  if (inRangeOnly && (nx < 0 || nx > segs || nz < 0 || nz > segs)) return null;
  const ix = Math.max(0, Math.min(segs - 1, Math.floor(nx)));
  const iz = Math.max(0, Math.min(segs - 1, Math.floor(nz)));
  const fx = Math.max(0, Math.min(1, nx - ix));
  const fz = Math.max(0, Math.min(1, nz - iz));
  const h00 = elev[ iz    * segs1 + ix    ];
  const h10 = elev[ iz    * segs1 + ix + 1];
  const h01 = elev[(iz+1) * segs1 + ix    ];
  const h11 = elev[(iz+1) * segs1 + ix + 1];
  return h00*(1-fx)*(1-fz) + h10*fx*(1-fz) + h01*(1-fx)*fz + h11*fx*fz;
}

function getWideTerrainY(x, z) {
  // まずプレイヤー追従の高解像度NEARグリッドの範囲内かを見る(範囲外ならnull)
  const near = sampleGrid(nearElev, nearCX, nearCZ, NEAR_W, NEAR_D, NEAR_SEGS, NEAR_SEGS1, x, z, true);
  if (near !== null) return near;
  // 範囲外、またはNEAR未取得なら低解像度のFARグリッドへフォールバック
  return sampleGrid(wideElev, wideCX, wideCZ, WIDE_W, WIDE_D, WIDE_SEGS, WIDE_SEGS1, x, z, false) || 0;
}

async function loadWideTerrain(centerX = 0, centerZ = 0) {
  if (wideLoading) return;
  wideLoading = true;
  const reCenter = (wideElev !== null); // 2回目以降(=別地域へ移動しての取り直し)
  if (reCenter) showToast('🏔 この地域の地形を取得中...', { sticky: true });
  const pts = [];
  for (let iz = 0; iz < WIDE_SEGS1; iz++)
    for (let ix = 0; ix < WIDE_SEGS1; ix++) {
      const wx = centerX - WIDE_W/2 + ix * WIDE_W / WIDE_SEGS;
      const wz = centerZ - WIDE_D/2 + iz * WIDE_D / WIDE_SEGS;
      pts.push(xzToLatLon(wx, wz));
    }
  const raw = new Array(pts.length).fill(null);
  // 【重要】以前はここだけopentopodata(1req/秒・1日1000コール上限の共有プロキシ)に
  // 直行しており、loadElevations/loadNearTerrainと違ってGSIタイル(レート制限なし)を
  // 使っていなかった。上限に達したりプロキシが詰まると遠景(FAR)の実地形が更新されなく
  // なり、「地形読み込みが止まる」「標高2倍の効果が(遠くの山や海岸で)見えない」の
  // 原因になっていた。まず国土地理院タイルを試し、国外の点等で使えない時だけ
  // opentopodataへフォールバックする(loadElevations/loadNearTerrainと同じ方針に統一)。
  const gsi = await fetchElevationsGSI(pts);
  if (gsi) {
    for (let i = 0; i < raw.length; i++) raw[i] = gsi[i];
  } else try {
    // loadElevations と同じ理由で少数の同時実行数に絞ってバッチ発行する
    // (解像度アップでバッチ数が最大54件まで増えたため、無制限並列だと確実に詰まる)
    const batches = [];
    for (let i = 0; i < pts.length; i += 100) batches.push(pts.slice(i, i + 100));
    const results = await runLimited(batches, batch => {
      const loc = batch.map(ll => `${ll.lat.toFixed(6)},${ll.lon.toFixed(6)}`).join('|');
      return fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${encodeURIComponent(loc)}`).then(r => r.json());
    });
    for (let bi = 0; bi < results.length; bi++) {
      const j = results[bi];
      if (!j || !j.results) { wideLoading = false; onWideTerrainFail(); return; } // 失敗時は現状維持(安全なフォールバック)
      j.results.forEach((r, k) => { raw[bi*100 + k] = r.elevation; });
    }
  } catch (e) { wideLoading = false; onWideTerrainFail(); return; }
  const arr = new Float32Array(pts.length);
  const oceanFloor = (0 - elevBase) * ELEV_SCALE - 10; // データ無しノードは海底(海面より十分下)扱い
  for (let i = 0; i < raw.length; i++) {
    const m = raw[i];
    arr[i] = (m == null) ? oceanFloor : (m - elevBase) * ELEV_SCALE; // 実標高で固定(海面とは無関係)
  }
  wideElev = arr; wideCX = centerX; wideCZ = centerZ; // データと中心を同時に更新
  wideLoading = false;
  _wideFailCount = 0; // 成功したのでリセット
  updateFarMesh(true); // 遠景メッシュを新しい実地形で再構築
  if (reCenter) showToast('🏔 地形反映完了', { duration: 2500 });
}

// 遠景(FAR)取得に失敗するたびに呼ぶ。checkNearTerrainのonNearTerrainFailと同じ考え方で、
// 失敗するたび再試行の間隔を伸ばす(上流を叩き続けない)。5回目以降は10秒間隔で回復を待つ。
let _wideFailCount = 0;
function onWideTerrainFail() {
  _wideFailCount++;
  if (_wideFailCount === 3) { // 数回続けて失敗した時だけ知らせる(単発の通信エラーではうるさくしない)
    console.warn('[遠景地形] 取得に失敗しています(' + _wideFailCount + '回目)。取得できるまで自動で再試行します。');
    showToast('⚠️ 遠景の地形取得に失敗しています(自動で再試行中)', { duration: 3000 });
  }
}

// プレイヤーが遠景(FAR)グリッドの中心から離れすぎたら、その場所を中心に取り直す
// (富士山などへ飛んでも地形が出る)。FARは範囲が広いので頻度は控えめでよい。
// 【重要】以前は wideElev が未取得(=初回ロードが1度でも失敗した)場合、この関数が
// 即return するだけで再試行のきっかけが一切無く、そのセッションではFAR(遠景)の
// 実地形が永久に取得されないまま止まっていた(「地形読み込みが止まる」「標高2倍の
// 効果が遠景で見えない」の主因と考えられる)。checkNearTerrainと同じく「未取得なら
// それ自体を取得トリガーにする」形にし、失敗しても一定間隔で自動的に再試行し続ける。
let _wideCheckFrame = 0;
function checkWideTerrain() {
  if (wideLoading) return;
  const interval = 120 * Math.min(5, 1 + _wideFailCount); // 失敗するたび間隔を伸ばす(最大10秒)
  if ((++_wideCheckFrame) % interval !== 0) return;
  if (!wideElev ||
      Math.abs(player.position.x - wideCX) > WIDE_W * 0.32 ||
      Math.abs(player.position.z - wideCZ) > WIDE_D * 0.32) {
    loadWideTerrain(player.position.x, player.position.z);
  }
}

// NEAR取得に失敗するたびに呼ぶ。既定回数(5回)を超えたら「NEARは使えない」扱いにして、
// 建物生成がAPI障害で永久にブロックされないようにする(chunkNearTerrainReadyが参照)。
function onNearTerrainFail() {
  _nearFailCount++;
  if (_nearFailCount >= 5) _nearGiveUp = true;
}

// NEAR(プレイヤー追従の高解像度グリッド)の取得。範囲が狭く点数も少ないので、
// FARと同じロジックだが速く終わる(約7バッチ)。
async function loadNearTerrain(centerX = 0, centerZ = 0) {
  if (nearLoading) return;
  nearLoading = true;
  const pts = [];
  for (let iz = 0; iz < NEAR_SEGS1; iz++)
    for (let ix = 0; ix < NEAR_SEGS1; ix++) {
      const wx = centerX - NEAR_W/2 + ix * NEAR_W / NEAR_SEGS;
      const wz = centerZ - NEAR_D/2 + iz * NEAR_D / NEAR_SEGS;
      pts.push(xzToLatLon(wx, wz));
    }
  const raw = new Array(pts.length).fill(null);
  // まず国土地理院タイル(並列・数秒)。NEARは建物生成のゲートなので、ここが速いほど
  // 道路・建物の読み込み体感が改善する。国外・失敗時のみopentopodataへ。
  const gsi = await fetchElevationsGSI(pts);
  if (gsi) {
    for (let i = 0; i < raw.length; i++) raw[i] = gsi[i]; // null(海上)は下でoceanFloor扱い
  } else try {
    const batches = [];
    for (let i = 0; i < pts.length; i += 100) batches.push(pts.slice(i, i + 100));
    const results = await runLimited(batches, batch => {
      const loc = batch.map(ll => `${ll.lat.toFixed(6)},${ll.lon.toFixed(6)}`).join('|');
      return fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${encodeURIComponent(loc)}`).then(r => r.json());
    });
    for (let bi = 0; bi < results.length; bi++) {
      const j = results[bi];
      if (!j || !j.results) { nearLoading = false; onNearTerrainFail(); return; } // 失敗時は現状維持(古いNEAR/FARへ自動フォールバック)
      j.results.forEach((r, k) => { raw[bi*100 + k] = r.elevation; });
    }
  } catch (e) { nearLoading = false; onNearTerrainFail(); return; }
  const arr = new Float32Array(pts.length);
  const oceanFloor = (0 - elevBase) * ELEV_SCALE - 10;
  for (let i = 0; i < raw.length; i++) {
    const m = raw[i];
    arr[i] = (m == null) ? oceanFloor : (m - elevBase) * ELEV_SCALE;
  }
  nearElev = arr; nearCX = centerX; nearCZ = centerZ;
  nearLoading = false;
  _nearFailCount = 0; _nearGiveUp = false; // 成功したのでリセット
  updateFarMesh(true);
  // NEARグリッドが更新された(=この範囲の地形高さが変わった可能性がある)ので、
  // 範囲にかかる道路・川/公園/田畑ポリゴンをすぐに新しい地形へ合わせ直す(浮き/埋まりを即座に解消する)
  rebuildRoadsInBounds(centerX - NEAR_W/2, centerX + NEAR_W/2, centerZ - NEAR_D/2, centerZ + NEAR_D/2);
  rebuildAreaPolysInBounds(centerX - NEAR_W/2, centerX + NEAR_W/2, centerZ - NEAR_D/2, centerZ + NEAR_D/2);
  // 【重要】以前は建物だけここで追従させておらず、道路はNEAR更新のたびに正確な高さへ
  // 追従するのに建物は生成時の高さで固定されたままだったため、進むほど道路と建物の
  // 高さのズレが蓄積して浮く/埋まるが悪化していた。同じ範囲で建物もY方向に追従させる。
  rebuildBuildingsInBounds(centerX - NEAR_W/2, centerX + NEAR_W/2, centerZ - NEAR_D/2, centerZ + NEAR_D/2);
  // 駅舎も道路・建物と同じタイミングでY方向に追従させる(浮き対策)
  rebuildStationsInBounds(centerX - NEAR_W/2, centerX + NEAR_W/2, centerZ - NEAR_D/2, centerZ + NEAR_D/2);
}

// プレイヤーがNEARグリッドの中心から離れたら取り直す。範囲を広げた(±4km)ぶん、
// 閾値も0.3→0.4に上げて取り直し頻度自体を下げた(opentopodataの1日1000コール上限対策。
// 上のNEAR定数のコメント参照)。それでも端に近づく前に十分な余裕を残して取り直す。
let _nearCheckFrame = 0, _nearFailCount = 0, _nearGiveUp = false;
function checkNearTerrain() {
  if (nearLoading) return;
  const interval = 30 * Math.min(20, 1 + _nearFailCount); // 失敗するたび間隔を伸ばす(最大10秒)
  if ((++_nearCheckFrame) % interval !== 0) return;
  if (!nearElev ||
      Math.abs(player.position.x - nearCX) > NEAR_W * 0.4 ||
      Math.abs(player.position.z - nearCZ) > NEAR_D * 0.4) {
    loadNearTerrain(player.position.x, player.position.z);
  }
}

// 海面標高の変更は「水面プレーンの上下」だけにする。地形・道路・建物は一切動かさない。
// (以前は海面に応じて遠景地形の高さも作り替えていたため、水が来ていない陸の道路までズレて消えていた)
function setSeaLevel() {
  SEA_Y = (seaLevelM - elevBase) * ELEV_SCALE;
  if (seaMesh) seaMesh.position.y = SEA_Y;
}

// 海面(実標高0m)の巨大プレーン。カメラ追従・霧免除で、南の地平の先に海が見える。
// 陸(地形メッシュ)は不透明でdepthが先に書かれるので、標高が海面より高い場所では自然に隠れる。
let seaMesh = null;
const waterOverlay = document.getElementById('waterOverlay');
let _wasSubmerged = false;
function initDistantSea() {
  if (seaMesh) return;
  // 海面標高の初期値: 保存値があれば優先。無ければ「詳細エリアの最低標高より少し下」に置く
  // (= 海岸が街の近くまで来て、かつ街は水没しない安全な既定値)
  let saved = NaN;
  try { saved = parseFloat(localStorage.getItem('iseharaSeaLevel')); } catch (e) {}
  seaLevelM = Number.isFinite(saved) ? saved : 3;
  seaLevelM = Math.max(-10, Math.min(10, seaLevelM)); // -10〜10m
  SEA_Y = (seaLevelM - elevBase) * ELEV_SCALE;
  const c = document.createElement('canvas'); c.width = 128; c.height = 128;
  const g = c.getContext('2d');
  const base = MODE === 'space' ? '#0a2440' : MODE === 'edo' ? '#2f5a6a'
             : MODE === 'marchen' ? '#3fc8ff' : MODE === 'meiji' ? '#345f7a' : '#1f6ea8';
  const hi = MODE === 'space' ? '#1e4a7a' : MODE === 'marchen' ? '#8fe6ff' : '#5aa8d8';
  g.fillStyle = base; g.fillRect(0, 0, 128, 128);
  g.strokeStyle = hi; g.globalAlpha = 0.5; g.lineWidth = 2;
  for (let i = 0; i < 11; i++) {
    const y = i * 12 + (i % 2 ? 3 : 0);
    g.beginPath(); g.moveTo(0, y);
    for (let x = 0; x <= 128; x += 16) g.lineTo(x, y + Math.sin(x * 0.15 + i) * 3);
    g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(260, 260);
  const geo = new THREE.PlaneGeometry(60000, 60000);
  const mat = new THREE.MeshBasicMaterial({ map: tex, fog: false });
  seaMesh = new THREE.Mesh(geo, mat);
  seaMesh.rotation.x = -Math.PI / 2;
  seaMesh.position.y = SEA_Y;
  seaMesh.frustumCulled = false;
  seaMesh.renderOrder = -1; // 空(-2)の後・地形の前。depthTestで陸には隠れる
  scene.add(seaMesh);
  setupSeaSlider();
}

// 海面標高スライダーの初期化・配線(max = 詳細エリア最低標高 → 街は水没しない範囲で調整)
function setupSeaSlider() {
  const sl = document.getElementById('seaSlider');
  const lab = document.getElementById('seaVal');
  const box = document.getElementById('seaCtrl');
  if (!sl || !lab) return;
  sl.min = -10; sl.max = 10; sl.step = 0.5;   // 海面標高 -10〜10m を 0.5m 刻みで
  sl.value = seaLevelM;
  lab.textContent = seaLevelM.toFixed(1);
  sl.addEventListener('input', () => {
    seaLevelM = Math.max(-10, Math.min(10, +sl.value));
    lab.textContent = seaLevelM.toFixed(1);
    try { localStorage.setItem('iseharaSeaLevel', String(seaLevelM)); } catch (e) {}
    setSeaLevel();
  });
  // スマホ: スライダー操作がカメラ回転ハンドラに奪われないようにする
  if (box) ['touchstart', 'touchmove', 'pointerdown'].forEach(ev =>
    box.addEventListener(ev, e => e.stopPropagation(), { passive: false }));
}

// OSM(Overpass)データの取得だけを行う。地形(標高)データへの依存が無いので、
// loadElevations() と並行に開始できる(以前は awaitloadElevations() の後に
// 直列で呼んでおり、地形取得+OSM取得の待ち時間がそのまま合算されていた)。
async function fetchOSMData() {
  // 伊勢原本体エリア(OSM_BOUNDS)は起動のたびに全く同じ範囲・同じクエリになるため、
  // 一度取得した結果を静的JSONとして同梱してある(data/isehara-osm-seed.json)。
  // まずこれを同一オリジンから取りに行く — Overpass本体の混雑やRender等の共有IP制限の
  // 影響を受けず、静的ファイル配信なので通常数百ms〜1秒程度で完了する。これが
  // 「起動時に道路・建物の読み込みが遅い」の主因(Overpassへの40〜45秒クエリ)を消す。
  // ファイルが無い/壊れている場合のみ、従来どおりOverpassへ直接問い合わせる。
  try {
    const seedRes = await fetch('/data/isehara-osm-seed.json');
    if (seedRes.ok) {
      const seedJson = await seedRes.json();
      if (seedJson && Array.isArray(seedJson.elements) && seedJson.elements.length > 0) return seedJson;
    }
  } catch (e) { /* 静的ファイル取得失敗時は下のOverpass直接取得にフォールバック */ }

  const bb = `${OSM_BOUNDS.minLat},${OSM_BOUNDS.minLon},${OSM_BOUNDS.maxLat},${OSM_BOUNDS.maxLon}`;
  const query = `[out:json][timeout:40];(way["highway"](${bb});way["building"](${bb});way["landuse"~"residential|commercial|industrial|retail|mixed_use|farmland|orchard|meadow|allotments|forest"](${bb});way["leisure"~"park|garden|playground"](${bb});way["natural"~"water|wood"](${bb});way["waterway"~"river|stream|canal|riverbank"](${bb});relation["natural"="water"](${bb});relation["waterway"="riverbank"](${bb});way["railway"="rail"](${bb});node["railway"="station"](${bb});node["railway"="halt"](${bb});node["public_transport"="station"](${bb}););out geom;`;
  const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);
  // 一度の失敗(429やタイムアウト)ですぐ単純格子状のフォールバックマップに落とすと、Overpassが
  // 一時的に混雑していただけでも見た目が大きく崩れてしまう。最大3回、間隔を空けて再試行する。
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      showToast(attempt === 1
        ? '🗺 伊勢原マップ取得中... (最大45秒)'
        : `🗺 伊勢原マップ取得再試行中... (${attempt}/3)`, { sticky: true });
      // クエリ自体のOverpass側タイムアウトが40秒なのに、以前クライアント側は32秒で見切っていたため、
      // サーバーがまだ処理中でも早期に諦めてフォールバックになることがあった。サーバー側より余裕を持たせる。
      const res = await Promise.race([
        fetch(url),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 45000))
      ]);
      if (!res.ok) throw new Error('HTTP ' + res.status); // 429/5xx等
      const json = await res.json();
      if (!json || !json.elements) throw new Error('no elements');
      return json;
    } catch (e) {
      if (attempt < 3) await new Promise(r => setTimeout(r, 4000 * attempt)); // 4s, 8s と間隔を空けて再試行
    }
  }
  return null; // 3回とも失敗した場合のみフォールバックマップを使う
}

// data を省略した場合は自分で fetchOSMData() する(従来どおりの単体呼び出しにも対応)
async function loadOSM(preFetchedData) {
  const data = preFetchedData !== undefined ? preFetchedData : await fetchOSMData();

  if (!data || !data.elements) {
    showToast('⚠️ OSM取得失敗 - フォールバックマップ使用');
    buildFallbackMap();
    return;
  }
  showToast(`✅ OSMデータ取得完了 (${data.elements.length} 要素)`);

  const nodeMap = {};
  data.elements.forEach(el => {
    if (el.type === 'node') nodeMap[el.id] = { lat: el.lat, lon: el.lon };
  });

  let buildingCount = 0;
  let roadCount = 0;

  // === PASS 1: Roads & railways first ===
  data.elements.forEach(el => {
    if (el.type !== 'way') return;
    const tags = el.tags || {};

    if (tags.highway && el.geometry && el.geometry.length >= 2) {
      const hw = tags.highway;
      const isImportant = hw==='trunk' || hw==='primary' || hw==='secondary' || hw==='motorway';
      // 2500だと伊勢原駅周辺など密な市街地で細街路が途中打ち切りになり、その空白地に
      // (別キャップの)建物だけは生成されてしまうため「建物が道路をふさぐ」ように見えていた。
      if (!isImportant && roadCount >= 6000) return;
      const width = hw==='trunk'||hw==='primary' ? 8 : hw==='secondary' ? 6 : hw==='tertiary'||hw==='residential' ? 4 : 2.5;
      const type = hw==='motorway' ? 'motorway' : hw==='motorway_link' ? 'trunk'
                 : (hw==='trunk'||hw==='primary'||hw==='secondary'||hw==='tertiary') ? hw : 'road';
      if (IS_MEIJI && (type === 'road' || type === 'motorway')) return; // 明治: 細街路も高速道路もない
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, width, type);
      }
      roadCount++;
    }

    // 明治(1880年代): 伊勢原周辺に鉄道はまだない
    if (!IS_MEIJI && tags.railway === 'rail' && el.geometry && el.geometry.length >= 2) {
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, 4, 'railway');
      }
    }

    // 川・水路(青いリボン。isOnRoad判定で川の上への建物生成も防げる)
    // riverbank は線ではなく面(handleAreaFeature)で処理するため除外
    if (tags.waterway && tags.waterway !== 'riverbank' && el.geometry && el.geometry.length >= 2) {
      const ww = waterwayWidth(tags);
      for (let i = 0; i < el.geometry.length-1; i++) {
        const a = latLonToXZ(el.geometry[i].lat, el.geometry[i].lon);
        const b = latLonToXZ(el.geometry[i+1].lat, el.geometry[i+1].lon);
        addRoad(a.x, a.z, b.x, b.z, ww, 'water');
      }
    }
  });

  // === PASS 2: Buildings — skip any that overlap a road ===
  data.elements.forEach(el => {
    if (el.type !== 'way') return;
    const tags = el.tags || {};

    if (IS_MEIJI && tags.building) { // 明治: OSM建物は神社仏閣のみ残す
      const st = getBuildingStyle(tags);
      if (!st || (st.type !== 'shrine' && st.type !== 'temple')) return;
    }
    // 学校・大学・病院は、校舎そのものにbuildingタグが無く敷地全体(amenity)しか
    // マッピングされていないケースが多い。その場合も敷地の中心に代表的な校舎を1棟
    // 建てる(敷地いっぱいの巨大建物にならないよう、サイズは後段でキャップする)。
    const isCampusOnly = !IS_MEIJI && !tags.building &&
      ['school','university','college','hospital'].includes(tags.amenity || '');
    if ((tags.building || isCampusOnly) && buildingCount < 3000 && el.geometry && el.geometry.length >= 4) { // 700/1200では初期エリア内でも歯抜けが出ていた
      const pts = el.geometry.map(g => latLonToXZ(g.lat, g.lon));
      let cx = 0, cz = 0;
      pts.forEach(p => { cx += p.x; cz += p.z; });
      cx /= pts.length; cz /= pts.length;

      let maxDx = 0, maxDz = 0;
      pts.forEach(p => {
        maxDx = Math.max(maxDx, Math.abs(p.x - cx));
        maxDz = Math.max(maxDz, Math.abs(p.z - cz));
      });
      let w = Math.max(maxDx * 2, 2);
      let d = Math.max(maxDz * 2, 2);
      if (isCampusOnly) { w = Math.min(w, 34); d = Math.min(d, 22); } // 敷地全体でなく校舎サイズに収める

      let style = getBuildingStyle(tags);
      if (MODE === 'edo' && shouldSkipEdoBuilding(style)) return; // 江戸: 現代の建物密度をそのまま使わず間引く
      const resolvedH = resolveBuildingHeight(tags);
      const levels = parseInt(tags['building:levels']) || 1 + Math.floor(Math.random()*3);
      let h = resolvedH != null ? resolvedH : Math.max(levels * 3, 3) + Math.random()*2;
      h = applyLandmarkMinHeight(style, h); // 学校・病院・役場・神社仏閣は最低限の高さを確保
      style = classifyResidential(style, w, d, h);
      let fw = w, fd = d, fh = h;
      ({ w: fw, d: fd, h: fh } = applySizeFloor(style, w, d, h)); // マンション・工場は最低サイズを底上げ
      if (MODE === 'edo') fh = applyEdoHeightCap(style, fh); // 江戸: 現代建物の実測高さそのままだと高層ビルになるため木造家屋相当に抑える
      // 直接生成せず、タイル取得分と同じキューに積んでフレーム分割で生成する。
      // 【重要】以前はここで直接addBuildingしており、NEAR高解像度地形がまだ届く前に
      // 高さが焼き込まれてしまい、初期スポーン周辺の建物が浮く/埋まる主な原因になっていた。
      // isOnRoad判定はキュー投入時ではなく、他の建物と同じくフレーム分割の生成時に行う。
      pendingBuildings.push({ x: cx, z: cz, w: fw, d: fd, h: fh, style, real: true });
      buildingCount++;
    }
  });

  // === PASS 3: Collect landuse polygons for dynamic chunk generation ===
  data.elements.forEach(el => {
    if (el.type !== 'way') return;
    const tags = el.tags || {};
    const lu = tags.landuse;
    if (!lu || !['residential','commercial','industrial','retail','mixed_use'].includes(lu)) return;
    if (!el.geometry || el.geometry.length < 4) return;
    const pts = el.geometry.map(g => latLonToXZ(g.lat, g.lon));
    let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
    pts.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z); });
    const _luEntry = { pts, lu, minX, maxX, minZ, maxZ };
    landusePolygons.push(_luEntry);
    polyGridAdd(landuseGrid, _luEntry);
  });

  // Station landmarks(明治: 鉄道開通前なので駅なし)
  processStationNodes(data.elements);

  // === PASS 4: 公園・水域・田畑・森 + multipolygon水面 ===
  data.elements.forEach(el => {
    handleAreaFeature(el);
    if (el.type === 'relation') processWaterRelation(el);
  });

  // 初期ロードで処理したway IDを記録(境界タイルの再取得時に二重生成しないため)
  data.elements.forEach(el => { if (el.type === 'way') seenOSMWays.add(el.id); });

  showToast(`✨ 伊勢原ファンタジー世界へようこそ！ (建物:${buildingCount} 道路:${roadCount})`, { duration: 4000 });

  // モード切替リロードなら切替前の位置・向きから再開、通常起動は東成瀬2-2-11にスポーン
  const resume = consumeResumePos();
  if (resume) {
    const rp = latLonToXZ(resume.lat, resume.lon);
    player.position.set(rp.x, 0, rp.z); // yはanimateの床追従が地形/屋根に合わせる
    if (typeof resume.yaw === 'number') camYaw = resume.yaw;
    if (typeof resume.rot === 'number') player.rotation.y = resume.rot;
  } else {
    const spw = latLonToXZ(SPAWN_LAT, SPAWN_LON);
    const sp = findSpawnNear(spw.x, spw.z); // 建物内なら最寄りの空き地点へ
    player.position.set(sp.x, 0, sp.z);
  }
  initialWorldLoaded = true; // ここからタイル取得を許可(標高は既に反映済み)。森は updateForest が周囲に描く
}

function buildFallbackMap() {
  // Grid of buildings (meter scale)
  for (let x = -1000; x <= 1000; x += 40) {
    for (let z = -1000; z <= 1000; z += 40) {
      if (Math.random() < 0.6) {
        const w = 8 + Math.random()*20;
        const d = 8 + Math.random()*20;
        const h = 4 + Math.random()*20;
        addBuilding(x + (Math.random()-0.5)*15, z + (Math.random()-0.5)*15, w, d, h);
      }
    }
  }
  // Roads (6m wide)
  for (let i = -1000; i <= 1000; i += 40) {
    addRoad(-1200, i, 1200, i, 6);
    addRoad(i, -1200, i, 1200, 6);
  }
  showToast('✨ 伊勢原ファンタジー世界（フォールバック）へようこそ！', { duration: 3000 });
  const resume2 = consumeResumePos();
  if (resume2) {
    const rp2 = latLonToXZ(resume2.lat, resume2.lon);
    player.position.set(rp2.x, 0, rp2.z);
    if (typeof resume2.yaw === 'number') camYaw = resume2.yaw;
    if (typeof resume2.rot === 'number') player.rotation.y = resume2.rot;
  } else {
    const spw2 = latLonToXZ(SPAWN_LAT, SPAWN_LON);
    const sp2 = findSpawnNear(spw2.x, spw2.z);
    player.position.set(sp2.x, 0, sp2.z);
  }
  initialWorldLoaded = true;
}

// 起動時の初期位置: スマホ等の位置情報から取得。取得不可(非対応/拒否/タイムアウト)は東京駅。
const TOKYO_STATION = { lat: 35.681236, lon: 139.767125 };
function getStartLocation() {
  return new Promise((resolve) => {
    if (!('geolocation' in navigator)) { resolve(TOKYO_STATION); return; }
    let done = false;
    const finish = (v) => { if (!done) { done = true; resolve(v); } };
    const timer = setTimeout(() => finish(TOKYO_STATION), 8000); // 応答が無ければ東京駅
    navigator.geolocation.getCurrentPosition(
      (p) => { clearTimeout(timer); finish({ lat: p.coords.latitude, lon: p.coords.longitude }); },
      () => { clearTimeout(timer); finish(TOKYO_STATION); }, // 拒否・失敗も東京駅
      { enableHighAccuracy: true, timeout: 7000, maximumAge: 60000 }
    );
  });
}

// Load terrain first, then place OSM world on top
// 明治モードは迅速測図の土地利用データを先に読む(チャンク生成が依存)
(async () => {
  const startLocP = getStartLocation(); // 位置情報の取得を本編ロードと並行で開始
  // モード切替リロード(江戸↔現実など)では切替前の位置に戻す。その時は現在地ジャンプしない。
  let isModeSwitch = false;
  try { isModeSwitch = !!localStorage.getItem('iseharaResumePos'); } catch (e) {}
  // OSM取得は地形データにもmeiji土地利用データにも依存しないので、それらの取得と
  // 並行して先に投げておく(以前は地形→OSMの完全直列で、両方の待ち時間がそのまま合算されていた)
  const osmDataP = fetchOSMData();
  await loadElevations();
  if (IS_MEIJI) await loadMeijiLanduse();
  await loadOSM(await osmDataP); // モード切替時はここで切替前の位置に復帰する
  // 通常起動のみ初期位置へ移動(現在地、取れなければ東京駅)。伊勢原の詳細地形は座標基準として残し、
  // 現在地の地形は遠景グリッド(約1km間隔)+ OSMタイルで表示する。
  const loc = await startLocP;
  if (!isModeSwitch) jumpToLatLon(loc.lat, loc.lon);
  // 最終的なプレイヤー位置を中心に、FAR(広域・低解像度)とNEAR(周辺・高解像度)を両方取得
  loadWideTerrain(player.position.x, player.position.z);
  loadNearTerrain(player.position.x, player.position.z);
})();

// ======= REAL-WORLD COORDINATES =======
const gpsEl = document.getElementById('gpsDisplay');
let lastGpsUpdate = 0;

function xzToLatLon(x, z) {
  return { lat: MID_LAT - z / SCALE, lon: MID_LON + x / (SCALE * COS_LAT) };
}

// ======= 現在地の住所表示(市区町村+町名レベル)。移動中ずっと更新する =======
// Nominatim(OSMの逆ジオコーディング)を server/server.js 経由(/api/nominatim)で叩く。
// 公式ポリシー上、移動のたびに逐次リバースジオコーディングする使い方は
// 「reverse queries in a grid」に近く、頻度が高すぎると禁止行為(BAN対象)とみなされ得る。
// そのため、時間(約10秒)と移動距離(150m)の両方が閾値を超えたときだけ再取得する
// (「時々ふりかえって現在地を確認する」程度の頻度に抑える)。失敗時は前回の表示を維持する。
const addressEl = document.getElementById('addressDisplay');
let addrFetching = false, lastAddrX = null, lastAddrZ = null, _addrCheckFrame = 0;
async function updateAddressDisplay() {
  if (addrFetching) return;
  addrFetching = true;
  try {
    const { lat, lon } = xzToLatLon(player.position.x, player.position.z);
    // 座標を丸めてプロキシ側のディスクキャッシュのヒット率を上げる(同じ町内を歩き回っても
    // キャッシュヒットで即応答になる)
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}&zoom=18&addressdetails=1&accept-language=ja`;
    const res = await fetch(url);
    const j = await res.json();
    const a = (j && j.address) || {};
    const city = a.city || a.town || a.village || a.county || '';
    const area = a.suburb || a.neighbourhood || a.quarter || a.city_district || '';
    const text = [city, area].filter(Boolean).join('');
    if (addressEl) addressEl.textContent = text ? `📍 ${text}` : '📍 (住所不明)';
  } catch (e) { /* 失敗時は前回表示のまま何もしない */ }
  addrFetching = false;
}
function checkAddressDisplay() {
  if (!initialWorldLoaded) return;
  _addrCheckFrame++;
  if (_addrCheckFrame % 600 !== 0) return; // ~10秒ごと(以前は45秒ごとで反映が遅く感じられたため短縮)
  if (lastAddrX !== null && Math.hypot(player.position.x - lastAddrX, player.position.z - lastAddrZ) < 150) return;
  lastAddrX = player.position.x; lastAddrZ = player.position.z;
  updateAddressDisplay();
}

// ======= MAP JUMP (Leaflet overlay) =======
let leafletMap = null, playerMarker = null;
const mapOverlay = document.getElementById('mapOverlay');
const mapHintEl = document.getElementById('mapHint');

// 指定の緯度経度へジャンプ(地図タップ・地名検索・現在地ボタンの共通処理)
function jumpToLatLon(toLat, toLon) {
  const pos = latLonToXZ(toLat, toLon);
  player.position.set(pos.x, 0, pos.z); // yはanimateの床追従が合わせる
  if (playerMarker) { playerMarker.setLatLng([toLat, toLon]); playerMarker.openPopup(); }
  if (leafletMap) leafletMap.setView([toLat, toLon], leafletMap.getZoom());
  // 遠景(FAR)グリッドの外へ飛んだら、その場を中心に地形を取り直す(富士山などでも地形・標高が出る)。
  // wideElevが未取得(初回ロードが失敗していた等)の場合もここで取得のきっかけになるようにする。
  if (!wideElev || Math.abs(pos.x - wideCX) > WIDE_W * 0.32 || Math.abs(pos.z - wideCZ) > WIDE_D * 0.32)
    loadWideTerrain(pos.x, pos.z);
  // マップジャンプは高確率でNEARグリッドの範囲外になるので、こちらは毎回無条件で取り直す
  // (範囲が狭く数秒〜十秒程度で終わるため、ジャンプ直後に足元の高解像度地形をすぐ用意できる)
  loadNearTerrain(pos.x, pos.z);
  setTimeout(() => mapOverlay.classList.remove('active'), 300);
}

function openMapJump() {
  mapOverlay.classList.add('active');
  mapHintEl.textContent = 'タップした場所にジャンプします';
  const { lat, lon } = xzToLatLon(player.position.x, player.position.z);

  if (!leafletMap) {
    leafletMap = L.map('leafletMap').setView([lat, lon], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(leafletMap);

    // Player marker
    const wizIcon = L.divIcon({ html: '🧙', className: '', iconSize: [28,28], iconAnchor:[14,14] });
    playerMarker = L.marker([lat, lon], { icon: wizIcon }).addTo(leafletMap)
      .bindPopup('現在地').openPopup();

    // Tap to jump
    leafletMap.on('click', e => jumpToLatLon(e.latlng.lat, e.latlng.lng));
  } else {
    playerMarker.setLatLng([lat, lon]);
    leafletMap.setView([lat, lon], leafletMap.getZoom());
    leafletMap.invalidateSize();
  }
}

document.getElementById('jumpBtn').addEventListener('click', openMapJump);
document.getElementById('mapCloseBtn').addEventListener('click', () => {
  mapOverlay.classList.remove('active');
});

// ======= 地名・住所・施設名の検索ジャンプ =======
// 国土地理院ジオコーディングAPI(無料・キー不要・CORS可)→ 失敗時は Nominatim にフォールバック
const mapSearchInput = document.getElementById('mapSearchInput');
async function searchPlaceJump() {
  const q = mapSearchInput.value.trim();
  if (!q) return;
  mapHintEl.textContent = '🔎 「' + q + '」を検索中...';
  let lat = null, lon = null, name = '';
  try {
    const res = await fetch('https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(q));
    const js = await res.json();
    if (Array.isArray(js) && js.length && js[0].geometry && js[0].geometry.coordinates) {
      lon = js[0].geometry.coordinates[0];
      lat = js[0].geometry.coordinates[1];
      name = (js[0].properties && js[0].properties.title) || q;
    }
  } catch (e) {}
  if (lat === null) { // フォールバック: Nominatim (OSM)
    try {
      const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=ja&q=' + encodeURIComponent(q));
      const js = await res.json();
      if (Array.isArray(js) && js.length) {
        lat = parseFloat(js[0].lat);
        lon = parseFloat(js[0].lon);
        name = js[0].display_name || q;
      }
    } catch (e) {}
  }
  if (lat === null || !isFinite(lat) || !isFinite(lon)) {
    mapHintEl.textContent = '⚠️ 「' + q + '」が見つかりませんでした';
    return;
  }
  mapHintEl.textContent = '📍 ' + name + ' へジャンプ！';
  jumpToLatLon(lat, lon);
}
document.getElementById('mapSearchBtn').addEventListener('click', searchPlaceJump);
mapSearchInput.addEventListener('keydown', e => {
  e.stopPropagation(); // WASD移動のキー入力ハンドラに拾わせない
  if (e.key === 'Enter') searchPlaceJump();
});
mapSearchInput.addEventListener('keyup', e => e.stopPropagation());

// ======= スマホ等の位置情報から現在地ジャンプ =======
// Geolocation API は HTTPS(secure context)必須。LANのhttpアクセスでは使えない旨を案内する
document.getElementById('geoBtn').addEventListener('click', () => {
  if (!('geolocation' in navigator)) {
    mapHintEl.textContent = '⚠️ この端末・ブラウザは位置情報に対応していません';
    return;
  }
  if (!window.isSecureContext) {
    mapHintEl.textContent = '⚠️ 位置情報はHTTPS接続でのみ使えます(http://192.168.…などLAN経由では不可。Render等のhttps版でお試しを)';
    return;
  }
  mapHintEl.textContent = '📡 現在地を取得中...';
  navigator.geolocation.getCurrentPosition(
    p => {
      mapHintEl.textContent = '📍 現在地へジャンプ！';
      jumpToLatLon(p.coords.latitude, p.coords.longitude);
    },
    err => {
      mapHintEl.textContent = '⚠️ 現在地を取得できませんでした(' +
        (err.code === 1 ? '位置情報の利用が許可されていません' : err.message) + ')';
    },
    { enableHighAccuracy: true, timeout: 10000 });
});

function updateGPS(t) {
  if (uiHidden) return; // UI非表示中は更新不要
  if (t - lastGpsUpdate < 0.5) return;
  lastGpsUpdate = t;
  const { lat, lon } = xzToLatLon(player.position.x, player.position.z);

  if (leafletMap && playerMarker) playerMarker.setLatLng([lat, lon]);
}

// ======= CAMERA OCCLUSION =======
// If a building is between camera and player, pull camera closer
function occlusionCamPos(targetPos, playerPos) {
  const dir = new THREE.Vector3().subVectors(targetPos, playerPos);
  const dist = dir.length();
  dir.normalize();
  for (let d = 1.5; d < dist; d += 0.4) {
    const tp = playerPos.clone().addScaledVector(dir, d);
    if (wouldCollide(tp.x, tp.z, tp.y - 1.2)) {
      // Return a position just before the hit
      return playerPos.clone().addScaledVector(dir, Math.max(d - 0.8, 1.5));
    }
  }
  return targetPos;
}

// ======= SPAWN FINDER =======
// 指定地点が建物内なら、螺旋状に周囲を探して最寄りの空き地点に立たせる
function findSpawnNear(x0, z0) {
  // スポーン時点ではプレイヤーyが未設定のため、その地点の地面高さで判定する
  if (!wouldCollide(x0, z0, getGroundY(x0, z0))) return { x: x0, z: z0 };
  for (let r = 2; r <= 200; r += 2) {
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
      const x = x0 + Math.cos(a) * r, z = z0 + Math.sin(a) * r;
      if (!wouldCollide(x, z, getGroundY(x, z))) return { x, z };
    }
  }
  return { x: x0, z: z0 };
}

// ======= MINIMAP =======
const minimapCanvas = document.getElementById('minimapCanvas');
const mctx = minimapCanvas.getContext('2d');
const MM = 200; // minimap size in px
const MM_RANGE = 200; // 200 meters radius visible on minimap

let _mmFrame = 0;
function drawMinimap() {
  if (uiHidden) return; // UI非表示中は2Dキャンバス描画ごと省略
  // 3フレームに1回だけ再描画(2Dキャンバス描画も無視できない負荷のため)
  if (++_mmFrame % 3 !== 0) return;
  mctx.clearRect(0,0,MM,MM);
  mctx.fillStyle = 'rgba(10,5,25,0.9)';
  mctx.fillRect(0,0,MM,MM);

  const px = player.position.x, pz = player.position.z;
  const scale = MM / (MM_RANGE * 2);

  function toMap(wx, wz) {
    return {
      mx: MM/2 + (wx - px) * scale,
      my: MM/2 + (wz - pz) * scale
    };
  }

  // Roads (color-coded by type)
  const mmRoadColor = { motorway:'#44bb44', trunk:'#ffcc00', primary:'#ffcc00', secondary:'#ffaa40', tertiary:'#aabbcc', railway:'#cc44ff', road:'#505878', water:'#3388cc' };
  const mmRoadWidth = { motorway:4, trunk:3, primary:2.5, secondary:2, tertiary:1.5, railway:2, road:1, water:2.5 };
  const R = MM_RANGE + 60; // 表示範囲外の要素は描画コマンド自体を発行しない

  // 実形状の水面ポリゴン(道路より下層に描く)
  // 【重要】以前はminimapWaterPolys/minimapRoads(取得済み全件。増え続けて減らない)を
  // 毎回全件走査していた。drawMinimapは間引いても約20fpsで呼ばれ続けるため、
  // 探索が進むほど1フレームあたりのコストが際限なく悪化していた
  // (長時間プレイでの重量化の主因の一つ)。空間ハッシュで表示範囲の近傍だけ拾う。
  mctx.fillStyle = '#2a6a9a';
  for (const wp of queryPolyGrid(minimapWaterGrid, px - R, px + R, pz - R, pz + R)) {
    if (wp.minX - px > R || px - wp.maxX > R || wp.minZ - pz > R || pz - wp.maxZ > R) continue;
    mctx.beginPath();
    const p0 = toMap(wp.pts[0].x, wp.pts[0].z);
    mctx.moveTo(p0.mx, p0.my);
    for (let i = 1; i < wp.pts.length; i++) {
      const p = toMap(wp.pts[i].x, wp.pts[i].z);
      mctx.lineTo(p.mx, p.my);
    }
    mctx.closePath();
    mctx.fill();
  }

  for (const r of queryRoadGrid(px - R, px + R, pz - R, pz + R)) {
    if ((r.x1-px > R && r.x2-px > R) || (px-r.x1 > R && px-r.x2 > R) ||
        (r.z1-pz > R && r.z2-pz > R) || (pz-r.z1 > R && pz-r.z2 > R)) continue;
    const t = r.type || 'road';
    mctx.strokeStyle = mmRoadColor[t] || '#505878';
    // 川は3D側の実幅をそのままミニマップスケールに変換(道路は視認性優先の固定幅)
    mctx.lineWidth = t === 'water' ? Math.max(1.5, (r.rw || 3) * scale) : (mmRoadWidth[t] || 1);
    const a = toMap(r.x1, r.z1), b = toMap(r.x2, r.z2);
    mctx.beginPath(); mctx.moveTo(a.mx, a.my); mctx.lineTo(b.mx, b.my); mctx.stroke();
  }

  // Buildings
  mctx.fillStyle = '#5a3a8a';
  for (const b of minimapBuildings) {
    if (Math.abs(b.x - px) > R || Math.abs(b.z - pz) > R) continue;
    const c = toMap(b.x, b.z);
    const bw = b.w * scale, bd = b.d * scale;
    mctx.fillRect(c.mx - bw/2, c.my - bd/2, bw, bd);
  }

  // Camera FOV cone (blue) — shows what the player sees on screen
  const fov = Math.PI / 2.5; // ~72° FOV
  mctx.save();
  mctx.translate(MM/2, MM/2);
  mctx.rotate(-camYaw); // camera view direction
  mctx.fillStyle = 'rgba(80, 200, 255, 0.18)';
  mctx.beginPath();
  mctx.moveTo(0, 0);
  const cr = MM / 2 - 4;
  mctx.arc(0, 0, cr, -Math.PI/2 - fov/2, -Math.PI/2 + fov/2);
  mctx.closePath();
  mctx.fill();
  // Camera direction tick
  mctx.strokeStyle = '#50c8ff';
  mctx.lineWidth = 1.5;
  mctx.beginPath(); mctx.moveTo(0, 0); mctx.lineTo(0, -10); mctx.stroke();
  mctx.restore();

  // Player arrow — arrowhead points in facing direction, feathers at back
  const py2 = player.rotation.y;
  mctx.save();
  mctx.translate(MM/2, MM/2);
  mctx.rotate(Math.PI - py2); // corrected: tip points in movement direction
  mctx.fillStyle = '#ff4040';
  mctx.strokeStyle = '#ffffff';
  mctx.lineWidth = 1;
  mctx.beginPath();
  // Arrowhead tip (up = forward)
  mctx.moveTo(0, -10);
  mctx.lineTo(5, -2);
  mctx.lineTo(2, -2);
  // Shaft
  mctx.lineTo(2, 5);
  // Right feather
  mctx.lineTo(5, 9);
  mctx.lineTo(0, 6);
  // Left feather
  mctx.lineTo(-5, 9);
  mctx.lineTo(-2, 5);
  mctx.lineTo(-2, -2);
  mctx.lineTo(-5, -2);
  mctx.closePath();
  mctx.fill();
  mctx.stroke();
  mctx.restore();

  // Range circle
  mctx.strokeStyle = 'rgba(160,100,255,0.3)';
  mctx.lineWidth = 1;
  mctx.beginPath();
  mctx.arc(MM/2, MM/2, MM/2-1, 0, Math.PI*2);
  mctx.stroke();
}
