<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>伊勢原ファンタジー</title>
<style>
:root {
  --hud-bg: rgba(15,18,32,0.55);
  --hud-border: rgba(255,255,255,0.14);
  --hud-blur: 12px;
  --hud-radius: 14px;
  --accent: #8b7bff;          /* 時代モード連動で将来差し替え可能(このCSS変数1個のみ) */
  --text: #eef0fa;
  --text-dim: rgba(238,240,250,0.65);
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --safe-top: max(16px, env(safe-area-inset-top));
  --safe-left: max(16px, env(safe-area-inset-left));
  --safe-right: max(16px, env(safe-area-inset-right));
  --safe-bottom: max(16px, env(safe-area-inset-bottom));
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  overflow:hidden; background:#000;
  font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
  color:var(--text);
  /* ジャンプボタン等を長押しした時にテキスト選択やコピー用のカーソル/吹き出しが
     出てしまう(結果、touchendが早期に発火してジャンプが上昇/下降を繰り返す原因になる)
     のを防ぐため、ページ全体で選択・コールアウト・タップハイライトを無効化する。 */
  user-select:none; -webkit-user-select:none;
  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}
#canvas { display:block; width:100vw; height:100vh; }

.glass {
  background:var(--hud-bg);
  backdrop-filter:blur(var(--hud-blur));
  -webkit-backdrop-filter:blur(var(--hud-blur));
  border:1px solid var(--hud-border);
  box-shadow:var(--shadow);
}
@supports not (backdrop-filter: blur(1px)) {
  .glass { background:rgba(15,18,32,0.8); }
}

/* ── ロケーションカプセル(住所+GPS座標・標高を統合。タップで展開) ── */
#addressDisplay {
  position:fixed; top:var(--safe-top); left:50%; transform:translateX(-50%);
  border-radius:999px; padding:8px 18px; font-size:13px;
  cursor:pointer; z-index:40; white-space:nowrap; text-align:center;
  color:var(--text);
}
#addressDisplay::after { content:' ▾'; color:var(--text-dim); }
#gpsDisplay {
  position:fixed; top:calc(var(--safe-top) + 44px); left:50%; transform:translateX(-50%);
  border-radius:var(--hud-radius); padding:12px 18px; font-size:12px;
  line-height:2; z-index:40; text-align:center;
  font-variant-numeric:tabular-nums; color:var(--text-dim);
  display:none; pointer-events:all;
}
#gpsDisplay.open { display:block; }

/* ── アイコンレール(視点/上空/マップジャンプ/時代モード/海面/視点回転/ヘルプ) ── */
#hudRail {
  position:fixed; top:50%; left:var(--safe-left); transform:translateY(-50%);
  display:flex; flex-direction:column; gap:10px; z-index:30;
}
.railBtn {
  width:48px; height:48px; border-radius:50%;
  font-size:20px; cursor:pointer; color:var(--text);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:transform .1s;
}
.railBtn:active { transform:scale(.94); }
.railBtn.active { box-shadow:var(--shadow), 0 0 0 2px var(--accent); }
.railBtn .sub {
  position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
  font-size:9px; color:var(--text-dim); white-space:nowrap;
}
.railBtn.hasSub { margin-bottom:12px; } /* subラベル分の余白 */

/* 海面ポップオーバー(🌊タップで開閉) */
#seaCtrl {
  position:fixed; left:calc(var(--safe-left) + 58px); top:50%; transform:translateY(-50%);
  border-radius:var(--hud-radius); padding:14px 16px; width:220px; z-index:35;
  font-size:12px; display:none; touch-action:none;
}
#seaCtrl.open { display:block; }
#seaCtrl input { width:100%; margin-top:8px; accent-color:var(--accent); }
#seaVal { color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums; }

/* キャラクター選択ポップオーバー(🧍タップで開閉) */
#charCtrl {
  position:fixed; left:calc(var(--safe-left) + 58px); top:50%; transform:translateY(-50%);
  border-radius:var(--hud-radius); padding:14px 16px; width:200px; z-index:35;
  font-size:12px; display:none;
}
#charCtrl.open { display:block; }
#charCtrl .charRow { display:flex; gap:8px; margin-top:8px; }
#charCtrl button {
  flex:1; padding:8px 0; border-radius:999px; border:1px solid var(--hud-border);
  background:rgba(255,255,255,0.08); color:var(--text); font-size:13px; cursor:pointer;
}
#charCtrl button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── 右上 UI非表示トグル(常時表示。スティック・ジャンプ・このボタン以外を隠す) ── */
#uiToggleBtn {
  position:fixed; top:var(--safe-top); right:var(--safe-right);
  width:40px; height:40px; border-radius:50%;
  font-size:16px; cursor:pointer; color:var(--text); z-index:50;
  display:flex; align-items:center; justify-content:center;
}

/* Touch joystick */
#joystick {
  position:fixed; bottom:calc(var(--safe-bottom) + 24px); left:calc(var(--safe-left) + 12px);
  width:120px; height:120px; border-radius:50%;
  pointer-events:all; z-index:30; touch-action:none; user-select:none;
}
#joystickKnob {
  position:absolute; top:50%; left:50%; width:48px; height:48px;
  background:rgba(139,123,255,0.55); border:1px solid var(--accent);
  border-radius:50%; transform:translate(-50%,-50%); pointer-events:none;
}
/* Minimap */
#minimap {
  position:fixed; bottom:calc(var(--safe-bottom) + 84px); right:var(--safe-right);
  width:160px; height:160px; border-radius:var(--hud-radius); overflow:hidden;
  z-index:25; pointer-events:none;
}
#jumpBtn {
  /* レール内のボタンなので個別配置は不要(.railBtnが担当) */
}
/* トースト(旧#status。読み込み中系は完了まで保持し完了メッセージに差し替える) */
#status {
  position:fixed; bottom:calc(var(--safe-bottom) + 100px); left:50%; transform:translateX(-50%);
  border-radius:999px; padding:9px 20px; font-size:13px; z-index:60;
  color:var(--text); pointer-events:none; text-align:center;
  transition:opacity .4s;
}
/* ヘルプモーダル(初回のみ自動表示。以後は?ボタンから) */
#helpModal {
  position:fixed; inset:0; z-index:80; display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.55);
}
#helpModal.active { display:flex; }
#info {
  border-radius:var(--hud-radius); padding:20px 24px; max-width:min(92vw,420px);
  font-size:13px; line-height:1.9; color:var(--text);
}
#infoCloseBtn {
  display:block; margin:16px auto 0; padding:8px 22px;
  border-radius:999px; border:1px solid var(--hud-border);
  background:rgba(255,255,255,0.08); color:var(--text); font-size:13px; cursor:pointer;
}
#deployInfo {
  margin-top:12px; padding-top:10px; border-top:1px solid var(--hud-border);
  font-size:11px; line-height:1.6; color:var(--text-dim);
}
#hopBtn {
  position:fixed; bottom:var(--safe-bottom); right:var(--safe-right);
  width:64px; height:64px; border-radius:50%;
  font-size:26px; color:var(--text); cursor:pointer; pointer-events:all; z-index:30;
  touch-action:none; user-select:none; -webkit-user-select:none;
  -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
}
#hopBtn:active { background:rgba(139,123,255,0.35); }
/* Map overlay */
#mapOverlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.9); z-index:200;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
}
#mapOverlay.active { display:flex; }
#leafletMap {
  width:90vw; height:75vh;
  border:2px solid #40c0ff; border-radius:8px;
}
#mapCloseBtn {
  background:rgba(80,40,120,0.9); color:#e8c8ff;
  border:1px solid #a060ff; border-radius:8px;
  padding:10px 28px; font-size:16px; cursor:pointer;
  pointer-events:all;
}
#mapHint {
  color:#80e0ff; font-size:13px; text-align:center;
}
#mapSearchRow { display:flex; gap:8px; width:90vw; pointer-events:all; }
#mapSearchInput {
  flex:1; min-width:0; padding:10px 12px; font-size:15px;
  border-radius:8px; border:1px solid #40c0ff;
  background:rgba(10,20,40,0.9); color:#e0f0ff;
}
#mapSearchBtn, #geoBtn {
  background:rgba(20,80,120,0.9); color:#c8ecff;
  border:1px solid #40c0ff; border-radius:8px;
  padding:10px 14px; font-size:14px; cursor:pointer;
  white-space:nowrap;
}
#mapSearchBtn:hover, #geoBtn:hover { background:rgba(30,110,160,0.95); }
/* 水中エフェクト(キャラが完全に水没した時) */
#waterOverlay {
  position:fixed; inset:0; z-index:100; display:none; pointer-events:none;
  background:radial-gradient(ellipse at center,
    rgba(30,110,170,0.32) 0%, rgba(10,60,115,0.58) 62%, rgba(4,32,74,0.82) 100%);
  animation:waterShimmer 3.5s ease-in-out infinite;
}
#waterOverlay::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(120,210,255,0.18) 0%, rgba(120,210,255,0) 30%);
}
#waterOverlay.active { display:block; }
@keyframes waterShimmer { 0%,100% { opacity:0.82; } 50% { opacity:1; } }
/* UI非表示: スティック・ジャンプ・👁トグル以外を隠して景色を全画面で楽しむモード */
body.uiHidden #hudRail, body.uiHidden #addressDisplay, body.uiHidden #gpsDisplay,
body.uiHidden #seaCtrl, body.uiHidden #charCtrl, body.uiHidden #minimap, body.uiHidden #credit,
body.uiHidden #status, body.uiHidden #helpModal { display:none !important; }
body.uiHidden #uiToggleBtn { opacity:0.45; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="waterOverlay"></div>

<!-- 上中央: ロケーションカプセル(タップでGPS座標・標高を展開) -->
<div id="addressDisplay" class="glass">📍 現在地を取得中...</div>
<a id="gpsDisplay" class="glass" href="#" target="_blank">📍 座標取得中...</a>

<!-- 左: アイコンレール -->
<nav id="hudRail">
  <button class="railBtn glass hasSub active" id="viewBtn" title="視点切替"><span class="ico" id="viewIco">👁</span><span class="sub" id="viewSub">一人称</span></button>
  <button class="railBtn glass" id="mapBtn" title="上空視点">🗺</button>
  <button class="railBtn glass" id="jumpBtn" title="マップジャンプ">📍</button>
  <button class="railBtn glass hasSub" id="modeBtn" title="時代モード"><span class="ico" id="modeIco">🏙</span><span class="sub" id="modeSub">現実</span></button>
  <button class="railBtn glass" id="seaBtn" title="海面設定">🌊</button>
  <button class="railBtn glass" id="charBtn" title="キャラクター選択">🧍</button>
  <button class="railBtn glass" id="camDirBtn" title="視点回転">🔄</button>
  <button class="railBtn glass" id="helpBtn" title="操作ヘルプ">?</button>
</nav>

<!-- 海面ポップオーバー(🌊タップで開閉) -->
<div id="seaCtrl" class="glass">
  🌊 海面の高さ <span id="seaVal">3.0</span>m
  <input id="seaSlider" type="range" min="-10" max="10" step="0.5" value="3">
</div>

<!-- キャラクター選択ポップオーバー(🧍タップで開閉) -->
<div id="charCtrl" class="glass">
  🧍 キャラクター
  <div class="charRow">
    <button id="charBoyBtn" data-sex="boy">👦 少年</button>
    <button id="charGirlBtn" data-sex="girl">👧 少女</button>
  </div>
</div>

<button id="uiToggleBtn" class="glass" title="UI表示/非表示">🙈</button>
<div id="credit" style="display:none; position:fixed; bottom:2px; left:8px; font-size:10px; color:rgba(255,255,255,0.65); z-index:30; pointer-events:all;"></div>
<div id="mapOverlay">
  <div id="mapHint">タップした場所にジャンプします</div>
  <div id="mapSearchRow">
    <input id="mapSearchInput" type="text" placeholder="地名・住所・施設名で検索" autocomplete="off">
    <button id="mapSearchBtn">🔎 検索</button>
    <button id="geoBtn">📡 現在地</button>
  </div>
  <div id="leafletMap"></div>
  <button id="mapCloseBtn">✕ 閉じる</button>
</div>

<!-- 操作ヘルプ(初回のみ自動表示。以後は?ボタンから) -->
<div id="helpModal">
  <div id="info" class="glass">
    PC: WASD移動 / Shiftダッシュ / Spaceジャンプ / ドラッグ回転<br>
    スマホ: 左スティック移動(倒すほど加速) / 右スワイプ回転 / ⤴ジャンプ
    <div id="deployInfo"></div>
    <button id="infoCloseBtn">閉じる</button>
  </div>
</div>

<div id="status" class="glass">🗺 伊勢原マップ読み込み中...</div>
<div id="minimap" class="glass"><canvas id="minimapCanvas" width="200" height="200"></canvas></div>
<div id="joystick" class="glass"><div id="joystickKnob"></div></div>
<button id="hopBtn" class="glass">⤴</button>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Prevent default touch scroll everywhere
document.documentElement.style.touchAction = 'none';
document.body.style.touchAction = 'none';

// ======= 表示モード =======
// 地形・道路・当たり判定・ゲームロジックは全モード共通。見た目(マテリアル/ジオメトリ/環境色)のみ差し替える。
// 切替は localStorage に保存してリロード=ワールド全体をそのモードで再生成(最も安全な「チャンク再構築」)。
const VISUAL_MODES = [
  { id: 'real',    label: '🏙 現実' },
  { id: 'meiji',   label: '🌾 明治' },
  { id: 'edo',     label: '🏯 江戸' },
  { id: 'marchen', label: '🍭 メルヘン' },
  { id: 'space',   label: '🛸 宇宙' },
];
let MODE = 'real';
try {
  const m = localStorage.getItem('iseharaVisualMode');
  if (VISUAL_MODES.some(v => v.id === m)) MODE = m;
} catch (e) {}
(function initModeBtn() {
  const btn = document.getElementById('modeBtn');
  const idx = VISUAL_MODES.findIndex(v => v.id === MODE);
  const [icoText, ...labelParts] = VISUAL_MODES[idx].label.split(' ');
  document.getElementById('modeIco').textContent = icoText;
  document.getElementById('modeSub').textContent = labelParts.join(' ');
  btn.addEventListener('click', () => {
    const next = VISUAL_MODES[(idx + 1) % VISUAL_MODES.length].id;
    try {
      localStorage.setItem('iseharaVisualMode', next);
      // 現在位置と向きを保存 → リロード後の loadOSM がここから再開する(スポーンに戻さない)
      const ll = xzToLatLon(player.position.x, player.position.z);
      localStorage.setItem('iseharaResumePos',
        JSON.stringify({ lat: ll.lat, lon: ll.lon, yaw: camYaw, rot: player.rotation.y }));
    } catch (e) {}
    location.reload();
  });
})();

// モード切替リロード用の再開位置(1回読んだら消す — 通常リロードは従来どおりスポーン地点)
function consumeResumePos() {
  try {
    const s = localStorage.getItem('iseharaResumePos');
    if (!s) return null;
    localStorage.removeItem('iseharaResumePos');
    const p = JSON.parse(s);
    if (typeof p.lat === 'number' && typeof p.lon === 'number') return p;
  } catch (e) {}
  return null;
}
// モード別の環境パレット
const MODE_CONF = {
  real: {
    fog: 0x3080b0, ambient: 0x9070d0, ambInt: 2.5, moon: 0xd0c0ff,
    sky: ['#0a2a60', '#1a5090', '#3090c0', '#80d0f0'], glow: 'rgba(200,100,50,0.5)',
    water: 0x2277bb, lawn: 0x4a8a3d, roadMinor: 0xe8e8e8, windowC: 0xffee88,
  },
  meiji: { // 明治(迅速測図)— 落ち着いた自然色・薄暮
    fog: 0x8a9a88, ambient: 0xb8b8a0, ambInt: 2.4, moon: 0xe8dcc0,
    sky: ['#1a2a3a', '#3a5a6a', '#7a9a8a', '#d8c8a0'], glow: 'rgba(220,170,90,0.45)',
    water: 0x3a6a8a, lawn: 0x5a7a3a, roadMinor: 0x907a55, windowC: 0xffcc77,
  },
  edo: { // セピア・和
    fog: 0x8a7a5a, ambient: 0xc0a878, ambInt: 2.3, moon: 0xffe8c0,
    sky: ['#2a2018', '#4a3a28', '#7a6040', '#c8a870'], glow: 'rgba(255,180,80,0.5)',
    water: 0x4a7a8a, lawn: 0x6a7a40, roadMinor: 0xcabc9a, windowC: 0xffd890,
  },
  marchen: { // 明るいパステル
    fog: 0x88c8e8, ambient: 0xd0c0f0, ambInt: 3.2, moon: 0xfff0d0,
    sky: ['#3a70c8', '#5a9ae0', '#90c8f0', '#ffd8e8'], glow: 'rgba(255,160,220,0.6)',
    water: 0x55ccff, lawn: 0x66d060, roadMinor: 0xf2e2e8, windowC: 0xfff0a0,
  },
  space: { // 宇宙コロニー
    fog: 0x0a0e1a, ambient: 0x8090c0, ambInt: 2.2, moon: 0xa0c0ff,
    sky: ['#000006', '#01020e', '#040820', '#0a1030'], glow: 'rgba(80,120,255,0.35)',
    water: 0x113355, lawn: 0x3a4450, roadMinor: 0x556070, windowC: 0x66eeff,
  },
}[MODE];
const IS_MEIJI = MODE === 'meiji';
// 明治モードのデータ出典表記(CC BY 4.0 の帰属表示)
if (IS_MEIJI) {
  const cr = document.getElementById('credit');
  cr.style.display = 'block';
  cr.innerHTML = '明治期土地利用: 出典 <a href="https://habs.rad.naro.go.jp/" target="_blank" style="color:#cdb">農研機構農業環境研究部門</a>(迅速測図・CC BY 4.0)';
}

// ======= SCENE SETUP =======
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
// 影を無効化 — 3000m範囲を1024pxで描く影は約3m/texelでほぼ視認できず、
// シャドウパスで全建物を毎フレーム二重描画するコストだけが残るため
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
// フォグ: 高密度モード(明治以外)は生成半径を狭めた分だけ濃くして、ポップインを隠す
const WORLD_FOG = new THREE.FogExp2(MODE_CONF.fog, MODE === 'meiji' ? 0.0004 : 0.00056); // 毎フレーム new しない(GC対策)
scene.fog = WORLD_FOG;

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.5, 5000);

// ======= FANTASY SKY =======
// 半径はカメラの far(5000) より十分小さく。原点固定だったのをカメラ追従に変更
// (以前は原点から100m以上離れると球の反対側がfarクリップされ、マップジャンプで
//  球の外に出ると空が完全に消えていた)
let skyMesh = null, skyCanvas = null, skyCtx = null, skyTex = null;
function buildSky() {
  const geo = new THREE.SphereGeometry(4000, 32, 32);
  skyCanvas = document.createElement('canvas');
  skyCanvas.width = 512; skyCanvas.height = 512;
  skyCtx = skyCanvas.getContext('2d');
  const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0,   MODE_CONF.sky[0]);
  grad.addColorStop(0.4, MODE_CONF.sky[1]);
  grad.addColorStop(0.7, MODE_CONF.sky[2]);
  grad.addColorStop(1,   MODE_CONF.sky[3]);
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0,0,512,512);
  // Horizon glow
  const hgrad = skyCtx.createRadialGradient(256,512,0,256,512,300);
  hgrad.addColorStop(0, MODE_CONF.glow);
  hgrad.addColorStop(1, 'rgba(0,0,0,0)');
  skyCtx.fillStyle = hgrad;
  skyCtx.fillRect(0,0,512,512);
  skyTex = new THREE.CanvasTexture(skyCanvas);
  // fog:false — 半径4000ではFogExp2でほぼフォグ色に塗り潰されるため空はフォグ対象外に
  const mat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide, fog: false, depthWrite: false });
  skyMesh = new THREE.Mesh(geo, mat);
  skyMesh.frustumCulled = false;
  skyMesh.renderOrder = -2; // 最初に背景として描画
  scene.add(skyMesh);

  // 宇宙モード: 地球と衛星を空に浮かべる(skyMeshの子なのでカメラ追従も自動)
  if (MODE === 'space') {
    const ec = document.createElement('canvas'); ec.width = 64; ec.height = 64;

// ======= 実時間のデイナイト(朝・昼・夕方・夜) =======
// 実際の時刻から、空グラデーション・フォグ・光(太陽/月)・星の見え方を時間帯に連動させる。
// 宇宙モードは対象外(常に宇宙)。1分ごとに更新。
const _cA = new THREE.Color(), _cB = new THREE.Color();
function _lerpCss(a, b, t) { _cA.set(a); _cB.set(b); return _cA.lerp(_cB, t).getStyle(); }
function _lerpHex(a, b, t) { _cA.setHex(a); _cB.setHex(b); return _cA.lerp(_cB, t).getHex(); }
// キーフレーム: 0時=夜 / 6時=朝(夜明け) / 12時=昼 / 18時=夕方
const DAY_KF = [
  { sky:['#050a1e','#0a1836','#16244e','#2b4270'], glow:0x7c8cdc, glowA:0.22, fog:0x1a2848, sun:0xb9c4ff, sunInt:0.5, amb:0x3a4a7a, ambInt:1.05, star:1.0 },
  { sky:['#33406e','#8a6a90','#e6a878','#ffdca6'], glow:0xffaa5a, glowA:0.50, fog:0xb69a86, sun:0xffd2a0, sunInt:1.25,amb:0x9a8aa0, ambInt:1.75, star:0.12 },
  { sky:['#2a70c8','#4a95e0','#8fc4ef','#cfe8fb'], glow:0xfff0d2, glowA:0.30, fog:0x9fc4e0, sun:0xfff4e0, sunInt:2.3, amb:0xbcd0e6, ambInt:2.5, star:0.0 },
  { sky:['#1e2448','#6a3a68','#d0673c','#ffb060'], glow:0xff783c, glowA:0.50, fog:0xa86a56, sun:0xff9a58, sunInt:1.15,amb:0x8a6a80, ambInt:1.6, star:0.12 },
];
function applyTimeOfDay() {
  if (MODE === 'space') return; // 宇宙は常に宇宙
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60; // 0..24
  const seg = Math.min(3, Math.floor(h / 6));
  const a = DAY_KF[seg], b = DAY_KF[(seg + 1) % 4];
  const t = (h - seg * 6) / 6;
  if (skyCtx && skyTex) {
    const sky = [0,1,2,3].map(i => _lerpCss(a.sky[i], b.sky[i], t));
    const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, sky[0]); grad.addColorStop(0.4, sky[1]);
    grad.addColorStop(0.7, sky[2]); grad.addColorStop(1, sky[3]);
    skyCtx.fillStyle = grad; skyCtx.fillRect(0, 0, 512, 512);
    const glow = _lerpHex(a.glow, b.glow, t);
    const glowA = a.glowA + (b.glowA - a.glowA) * t;
    const r = (glow>>16)&255, g = (glow>>8)&255, bl = glow&255;
    const hg = skyCtx.createRadialGradient(256, 512, 0, 256, 512, 320);
    hg.addColorStop(0, `rgba(${r},${g},${bl},${glowA})`);
    hg.addColorStop(1, 'rgba(0,0,0,0)');
    skyCtx.fillStyle = hg; skyCtx.fillRect(0, 0, 512, 512);
    skyTex.needsUpdate = true;
  }
  WORLD_FOG.color.setHex(_lerpHex(a.fog, b.fog, t));
  ambientLight.color.setHex(_lerpHex(a.amb, b.amb, t));
  ambientLight.intensity = a.ambInt + (b.ambInt - a.ambInt) * t;
  moonLight.color.setHex(_lerpHex(a.sun, b.sun, t));
  moonLight.intensity = a.sunInt + (b.sunInt - a.sunInt) * t;
  // 太陽/月の位置(6時=東の地平, 12時=天頂, 18時=西の地平, 夜=地平下)
  const ang = (h - 6) / 12 * Math.PI, sy = Math.sin(ang);
  moonLight.position.set(Math.cos(ang) * 900, sy * 1000 + (sy < 0 ? -150 : 200), 300);
  const night = a.star + (b.star - a.star) * t; // 1=夜, 0=昼
  if (starMesh) starMesh.material.opacity = night;
  // 松明は夜だけ灯す(昼間に暖色の点光源が浮くのを防ぐ)
  torchLights.forEach(l => { l.intensity = 0.1 + night * 1.1; });
}

// ======= GROUND / TERRAIN =======
// Placeholder — actual terrain mesh is built after OSM_BOUNDS constants are defined

// ======= COLLISION BOXES =======
let collisionBoxes = [];

// 空間ハッシュグリッド — wouldCollide が全ボックスを線形走査していたため、
// カメラ遮蔽判定(毎フレーム約40回呼ぶ)と合わせて数万判定/フレームになっていた。
// 近傍セルのみの照合に変更して大幅軽量化。
const COLL_CELL = 60;
let collGrid = new Map();
function collGridAdd(box) {
  const x0 = Math.floor(box.min.x / COLL_CELL), x1 = Math.floor(box.max.x / COLL_CELL);
  const z0 = Math.floor(box.min.z / COLL_CELL), z1 = Math.floor(box.max.z / COLL_CELL);
  for (let gx = x0; gx <= x1; gx++) for (let gz = z0; gz <= z1; gz++) {
    const k = gx + ',' + gz;

    if (!arr) { arr = []; collGrid.set(k, arr); }

}

}
let currentChunkKey = null; // generateChunk 実行中のみセット(アンロード時の掃除タグ)

// ======= MINIMAP DATA =======
let minimapBuildings = []; // {x,z,w,d,ck}
const minimapRoads = [];   // {x1,z1,x2,z2}
// 道路の空間ハッシュ — 「道路の上に木/建物を置かない」判定を高速化する(全道路の線形走査を避ける)。
// minimapRoads へ追加するたび addRoadRecord 経由でここにも登録する。
const ROAD_CELL = 40;
const roadGrid = new Map();
function roadGridAdd(r) {
  const pad = (r.rw || 4) / 2 + 3;
  const gx0 = Math.floor((Math.min(r.x1, r.x2) - pad) / ROAD_CELL), gx1 = Math.floor((Math.max(r.x1, r.x2) + pad) / ROAD_CELL);
  const gz0 = Math.floor((Math.min(r.z1, r.z2) - pad) / ROAD_CELL), gz1 = Math.floor((Math.max(r.z1, r.z2) + pad) / ROAD_CELL);
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const k = gx + ',' + gz; let arr = roadGrid.get(k);
    if (!arr) { arr = []; roadGrid.set(k, arr); }
    arr.push(r);
  }
}
// minimapRoads.push の共通化: 記録と同時に空間グリッドへ登録
function addRoadRecord(r) { minimapRoads.push(r); roadGridAdd(r); }
// 矩形範囲にかかる可能性のある道路だけを空間ハッシュから拾う(minimapRoads全件走査を避ける)
function queryRoadGrid(x0, x1, z0, z1) {
  const gx0 = Math.floor(x0 / ROAD_CELL), gx1 = Math.floor(x1 / ROAD_CELL);
  const gz0 = Math.floor(z0 / ROAD_CELL), gz1 = Math.floor(z1 / ROAD_CELL);
  const seen = new Set(), out = [];
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = roadGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const r of arr) { if (!seen.has(r)) { seen.add(r); out.push(r); } }
  }
  return out;
}

// ======= ポリゴン(避けエリア・landuse・水/公園/田畑メッシュ)用の汎用空間ハッシュ =======
// 【重要】これらは取得したタイル分だけ増え続けて一切減らないため、以前は

// いた。探索距離が伸びるほど1回あたりのコストが線形に悪化し、長時間プレイで
// 「移動を続けると徐々に重くなり最終的に落ちる」症状の主因の一つになっていた。
// ポリゴンは道路よりずっと広い範囲を覆うことがあるため、道路用より粗いセルを使う。
const POLY_CELL = 200;
function polyGridAdd(grid, entry) {
  const gx0 = Math.floor(entry.minX / POLY_CELL), gx1 = Math.floor(entry.maxX / POLY_CELL);
  const gz0 = Math.floor(entry.minZ / POLY_CELL), gz1 = Math.floor(entry.maxZ / POLY_CELL);
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const k = gx + ',' + gz;
    let arr = grid.get(k);
    if (!arr) { arr = []; grid.set(k, arr); }
    arr.push(entry);
  }
}
function queryPolyGrid(grid, x0, x1, z0, z1) {
  const gx0 = Math.floor(x0 / POLY_CELL), gx1 = Math.floor(x1 / POLY_CELL);
  const gz0 = Math.floor(z0 / POLY_CELL), gz1 = Math.floor(z1 / POLY_CELL);
  const seen = new Set(), out = [];
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = grid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const e of arr) { if (!seen.has(e)) { seen.add(e); out.push(e); } }
  }
  return out;
}

// 道路メッシュを、現在(呼び出し時点)の getGroundY に合わせて作り直す。
// 以前は道路メッシュを最初に生成した瞬間の地形高さで永久に固定していたため、
// 後からNEAR高解像度地形グリッドが届いて地形の高さが変わると、道路が地面に埋まったり
// 逆に浮いて見えたりしていた。ジオメトリだけ差し替え、Mesh自体・マテリアルは使い回す。
// 【重要】unloadFarRoadsで遠方アンロードされた道路(r.mesh===null)は、このタイミング
// (=プレイヤー付近のチャンクが生成された=近くまで戻ってきた)でメッシュを作り直して復元する。
function rebuildRoadMesh(r) {
  if (r.type === 'motorway') { if (r.mesh) rebuildMotorwayMesh(r); return; } // 高架はアンロード対象外(常にmesh有り)
  const geo = makeRoadGeo(r.x1, r.z1, r.x2, r.z2, r.rw, r.yOff);
  if (!geo) return;
  if (r.mesh) {
    r.mesh.geometry.dispose();
    r.mesh.geometry = geo;
  } else {
    const mesh = new THREE.Mesh(geo, r.mat);
    mesh.renderOrder = 1;
    scene.add(mesh);
    r.mesh = mesh;
  }
  // 非現実モードの線路(白帯オーバーレイ)も同じタイミングで復元/追従
  if (r.type === 'railway' && !IS_REAL) {
    const rg = makeRoadGeo(r.x1, r.z1, r.x2, r.z2, 1.5, 0.5);
    if (rg) {
      if (r.railWhite) {
        r.railWhite.geometry.dispose();
        r.railWhite.geometry = rg;
      } else {
        const rail = new THREE.Mesh(rg, ROAD_MAT.rail_white);
        rail.renderOrder = 2;
        scene.add(rail);
        r.railWhite = rail;
      }
    }
  }
}

// ======= 道路メッシュ生成のフレーム分割 =======
// 以前は addRoad が呼ばれた瞬間に makeRoadGeo(1mごとの地形サンプリング)+Mesh生成+scene.add
// を同期実行していた。密集市街地のOSMタイル(6枚バッチ)が届くと数千セグメントを1フレームで
// 生成することになり、数秒〜数十秒のフリーズの主因だった(東京都心で45秒超を確認)。
// → addRoad はレコード登録(軽量。isOnRoad判定・ミニマップは即座に正しく動く)だけ行い、
//   重いメッシュ生成はこのキューで1フレームあたり時間バジェット内だけ処理する。
const pendingRoadMeshes = [];
function queueRoadMesh(r) {
  if (r._q) return; // 二重投入防止
  r._q = true;
  pendingRoadMeshes.push(r);
}
function processRoadMeshQueue() {
  if (pendingRoadMeshes.length === 0) return;
  const t0 = performance.now();
  const px = player.position.x, pz = player.position.z;
  const lim2 = ROAD_UNLOAD_DIST * ROAD_UNLOAD_DIST;
  let i = 0;
  while (i < pendingRoadMeshes.length) {
    if ((i & 7) === 0 && performance.now() - t0 > 6) break; // 6ms/フレームまで
    const r = pendingRoadMeshes[i++];
    r._q = false;
    const mx = (r.x1 + r.x2) / 2 - px, mz = (r.z1 + r.z2) / 2 - pz;
    // 遠方(unloadFarRoadsの解放距離の外)はどうせすぐ解放されるので作らない。
    // プレイヤーが近づけばチャンク再生成(rebuildRoadsNearChunk)やNEAR更新
    // (rebuildRoadsInBounds)が再キューするので、恒久的に欠けることはない。
    if (mx * mx + mz * mz > lim2) { r._dirty = false; continue; }
    if (r.mesh && !r._dirty) continue; // 既に構築済みで地形も変わっていない
    rebuildRoadMesh(r);
    r._dirty = false;
  }
  pendingRoadMeshes.splice(0, i);
}

// 【重要】道路・線路は建物と違い、これまで距離に関係なく永久にscene・GPUメモリに
// 残り続けていた(1本ごとに専用ジオメトリのMeshをscene.addするだけで、チャンクアンロード
// でも消えない)。探索範囲が広がるほど道路メッシュが際限なく積み上がり、長時間移動を
// 続けるとGPUメモリ・描画コールが持たずに重くなって落ちる症状の主因になっていた。
// ここでは建物と違い、minimapRoads/roadGrid(=isOnRoad判定・ミニマップ・踏切検出が
// 恒久的に参照する軽量データ)自体は消さず、GPU側の重いMesh/ジオメトリだけを距離に応じて
// 破棄・復元する(復元は上のrebuildRoadMeshが、プレイヤーが近づいてチャンクが再生成される
// タイミングで自動的に行う)。高架(motorway)は橋脚がInstancedMeshで個別解放できないため
// 対象外とする(高速道路は本数が少なく、影響は小さい)。
const ROAD_UNLOAD_DIST = 2500;
let _roadUnloadFrame = 0;
function unloadFarRoads() {
  _roadUnloadFrame++;
  if (_roadUnloadFrame % 90 !== 0) return; // 建物と同様、毎フレームやる必要はない(~1.5秒ごと)
  const px = player.position.x, pz = player.position.z;
  const d2 = ROAD_UNLOAD_DIST * ROAD_UNLOAD_DIST;
  for (const r of minimapRoads) {
    if (r.type === 'motorway' || !r.mesh) continue; // 高架は対象外/既にアンロード済みはスキップ
    const mx = (r.x1 + r.x2) / 2, mz = (r.z1 + r.z2) / 2;
    const dx = mx - px, dz = mz - pz;
    if (dx * dx + dz * dz <= d2) continue; // まだ範囲内
    scene.remove(r.mesh);
    r.mesh.geometry.dispose();
    r.mesh = null;
    if (r.railWhite) {
      scene.remove(r.railWhite);
      r.railWhite.geometry.dispose();
      r.railWhite = null;
    }
  }
}

// 矩形範囲(ワールド座標)にかかる道路を、現在の地形に合わせてまとめて再構築する。
function rebuildRoadsInBounds(x0, x1, z0, z1) {
  const gx0 = Math.floor(x0 / ROAD_CELL), gx1 = Math.floor(x1 / ROAD_CELL);
  const gz0 = Math.floor(z0 / ROAD_CELL), gz1 = Math.floor(z1 / ROAD_CELL);
  const seen = new Set();
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = roadGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const r of arr) {
      if (seen.has(r)) continue;
      seen.add(r);
      // 同期一括再構築(数百〜数千本)はNEAR更新のたびに大きなカクつきを生んでいたため、
      // フレーム分割キューに回す。_dirty=trueで「メッシュ生成済みでも作り直す」指定。
      r._dirty = true;
      queueRoadMesh(r);
    }
  }
}

// プレイヤー近くのチャンクが生成される(=このあたりの地形が最新・最高解像度で
// 揃っている)たびに呼び、そのチャンクにかかる道路だけ現在の地形に合わせて再構築する。
function rebuildRoadsNearChunk(chunkX, chunkZ) {
  const margin = 20; // 道幅ぶんの余裕
  const x0 = chunkX * CHUNK_SIZE - margin, x1 = chunkX * CHUNK_SIZE + CHUNK_SIZE + margin;
  const z0 = chunkZ * CHUNK_SIZE - margin, z1 = chunkZ * CHUNK_SIZE + CHUNK_SIZE + margin;
  rebuildRoadsInBounds(x0, x1, z0, z1);
  rebuildStationsInBounds(x0, x1, z0, z1); // 駅もY方向だけ地形に合わせて追従させる
  rebuildAreaPolysInBounds(x0, x1, z0, z1); // 川・公園・田畑ポリゴンも同じタイミングで合わせ直す
  rebuildBuildingsInBounds(x0, x1, z0, z1); // 建物もY方向だけ地形に合わせて追従させる
}
// 点(x,z)が、道路の中心線から (道幅/2 + extra) 以内にあるか(近傍セルだけ調べる)
function roadNear(x, z, extra) {
  const gx = Math.floor(x / ROAD_CELL), gz = Math.floor(z / ROAD_CELL);
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) {
    const arr = roadGrid.get((gx + dx) + ',' + (gz + dz));
    if (!arr) continue;
    for (const r of arr) {
      const ax = r.x2 - r.x1, az = r.z2 - r.z1, len2 = ax * ax + az * az;
      let tt = len2 > 0 ? ((x - r.x1) * ax + (z - r.z1) * az) / len2 : 0;
      tt = tt < 0 ? 0 : tt > 1 ? 1 : tt;
      const nx = r.x1 + ax * tt - x, nz = r.z1 + az * tt - z;
      const lim = (r.rw || 4) / 2 + extra;
      if (nx * nx + nz * nz < lim * lim) return true;
    }
  }
  return false;
}
// ======= 建物の高さresnap(地形更新への追従) =======
// 建物は道路と違い「壁+屋根+屋上設備+ライト」等の複数メッシュが絶対Y座標で
// 直置きされた剛体の集合。地形が変わっても形状自体は変えず、束ねて
// Y方向にだけ平行移動すれば大部分の浮き/埋まりは解消できる(道路のような
// ジオメトリ全再構築は不要)。ただし建物フットプリント内で傾斜が大きく
// 変化した場合は一律シフトだけでは片側だけ残ることがある(既知の限界。
// まずはこの方式で様子を見て、必要なら角ごとの微傾斜補正を検討する)。
const buildingRecords = []; // {x,z,w,d,h,style,gy,parts:[mesh/light,...],cbox,ck,bid}
let _buildingIdSeq = 0; // collisionBoxes/minimapBuildings/placedBuildingsから一括削除するための共通ID
const BUILDING_CELL = 80;
let buildingGrid = new Map();
function buildingGridAdd(rec) {
  const pad = Math.max(rec.w, rec.d) / 2 + 5;
  const gx0 = Math.floor((rec.x - pad) / BUILDING_CELL), gx1 = Math.floor((rec.x + pad) / BUILDING_CELL);
  const gz0 = Math.floor((rec.z - pad) / BUILDING_CELL), gz1 = Math.floor((rec.z + pad) / BUILDING_CELL);
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const k = gx + ',' + gz;
    let arr = buildingGrid.get(k);
    if (!arr) { arr = []; buildingGrid.set(k, arr); }
    arr.push(rec);
  }
}
function rebuildBuildingGrid() {
  buildingGrid = new Map();
  for (const rec of buildingRecords) buildingGridAdd(rec);
}
// 1棟ぶんを現在の地形に合わせてY方向へ平行移動する(形状・ジオメトリは変えない)
function rebuildBuildingHeight(rec) {
  const hs = [
    getGroundY(rec.x, rec.z),
    getGroundY(rec.x - rec.w/2, rec.z - rec.d/2), getGroundY(rec.x + rec.w/2, rec.z - rec.d/2),
    getGroundY(rec.x - rec.w/2, rec.z + rec.d/2), getGroundY(rec.x + rec.w/2, rec.z + rec.d/2),
  ];
  const newGy = Math.min(...hs);
  const delta = newGy - rec.gy;
  if (Math.abs(delta) < 0.05) return; // 誤差レベルは無視(毎回全建物を動かさない)
  for (const p of rec.parts) { if (p) p.position.y += delta; }
  if (rec.cbox) { rec.cbox.min.y += delta; rec.cbox.max.y += delta; }
  rec.gy = newGy;
}
// 矩形範囲(ワールド座標)にかかる建物を、現在の地形に合わせてまとめて追従させる。
// 道路のrebuildRoadsInBoundsと同じタイミング(NEAR再取得時・チャンク生成時)で呼ぶ。
function rebuildBuildingsInBounds(x0, x1, z0, z1) {
  const gx0 = Math.floor(x0 / BUILDING_CELL), gx1 = Math.floor(x1 / BUILDING_CELL);
  const gz0 = Math.floor(z0 / BUILDING_CELL), gz1 = Math.floor(z1 / BUILDING_CELL);
  const seen = new Set();
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = buildingGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const rec of arr) {
      if (seen.has(rec)) continue;
      seen.add(rec);
      rebuildBuildingHeight(rec);
    }
  }
}

// 【重要】実OSM建物(タイル取得・初期ロード由来)は、手続き生成のチャンク建物と違って
// 一度生成されると距離に関係なく永久にscene・collisionBoxes等に残り続けていた。
// 探索範囲が広がるほど建物数が際限なく増え、最終的に描画・メモリが持たずに
// 「移動を続けると徐々に重くなり落ちる」症状になっていた。
// ここでプレイヤーから一定距離を超えた実建物のTHREE.jsオブジェクトを解放する。
// ただし完全に忘れるのではなく、軽量な記述(x,z,w,d,h,style)だけpendingBuildingsへ
// 戻しておき、再訪時にNEAR準備が整えば通常の経路でまた生成されるようにする
// (手続き生成建物のチャンク・アンロード/再生成と同じ考え方)。
const BUILDING_UNLOAD_DIST = 2500;
let _buildingUnloadFrame = 0;
function unloadFarBuildings() {
  _buildingUnloadFrame++;
  if (_buildingUnloadFrame % 90 !== 0) return; // 毎フレームやる必要はない(~1.5秒ごと)
  if (buildingRecords.length === 0) return;
  const px = player.position.x, pz = player.position.z;
  const d2 = BUILDING_UNLOAD_DIST * BUILDING_UNLOAD_DIST;
  const removeIds = new Set();
  for (let i = buildingRecords.length - 1; i >= 0; i--) {
    const rec = buildingRecords[i];
    const dx = rec.x - px, dz = rec.z - pz;
    if (dx * dx + dz * dz <= d2) continue; // まだ範囲内
    for (const p of rec.parts) {
      if (!p) continue;
      scene.remove(p);
      if (p.geometry && !p.geometry.userData.shared) p.geometry.dispose();
    }
    removeIds.add(rec.bid);
    buildingRecords.splice(i, 1);
    // 再訪時に復元できるよう、軽量な記述だけキューへ戻す
    pendingBuildings.push({ x: rec.x, z: rec.z, w: rec.w, d: rec.d, h: rec.h, style: rec.style, real: rec.real });
  }
  if (removeIds.size === 0) return;
  collisionBoxes = collisionBoxes.filter(b => !removeIds.has(b.buildingId));
  minimapBuildings = minimapBuildings.filter(b => !removeIds.has(b.bid));
  placedBuildings = placedBuildings.filter(b => !removeIds.has(b.bid));
  rebuildCollGrid();
  rebuildBuildingGrid();
}

let placedBuildings = [];  // {x,z,r,ck} for landuse de-duplication
const landusePolygons = []; // {pts, lu, minX, maxX, minZ, maxZ} — stored during loadOSM for dynamic chunk generation
const landuseGrid = new Map(); // polyGridAdd/queryPolyGridで使う空間ハッシュ(全件走査を避ける)
const loadedChunks = new Set(); // "cx,cz" string keys of already-generated chunks
const chunkMeshes = new Map();  // "cx,cz" → [THREE.Mesh, ...] for unloading
const CHUNK_SIZE = 120;  // meters per chunk side
// 建物密度を大幅に上げた(ぎゅうぎゅうの日本の街並み)ため、生成半径は
// ±480m→±360mに縮小し、代わりにフォグを濃く(0.0004→0.00056)して
// ポップインが目立たない距離バランスを維持する。明治は低密度なので従来の±480mのまま
const CHUNK_RADIUS = IS_MEIJI ? 4 : 3;

function pointInPolygon(px, pz, pts) {
  let inside = false;
  for (let i = 0, j = pts.length-1; i < pts.length; j=i++) {
    const xi=pts[i].x, zi=pts[i].z, xj=pts[j].x, zj=pts[j].z;
    if (((zi>pz)!==(zj>pz)) && (px < (xj-xi)*(pz-zi)/(zj-zi)+xi)) inside=!inside;
  }
  return inside;
}

function hasBuildingNearby(cx, cz, minDist) {
  const d2 = minDist*minDist;
  for (const b of placedBuildings) {
    const dx=cx-b.x, dz=cz-b.z;
    if (dx*dx+dz*dz < d2) return true;
  }
  return false;
}

// 「本物のOSM建物」が近くに実在するか(手続き生成分は含まない)。
// 農地・山道の道グリッドを住宅街と誤認する対策(denseAreaの裏付け条件に使う)。
// 家並みが実在するエリアなら、landuseタグが無くても実OSM建物が既にいくつか立っている。
function hasRealBuildingNearby(cx, cz, dist) {
  const d2 = dist * dist;
  const gx0 = Math.floor((cx - dist) / BUILDING_CELL), gx1 = Math.floor((cx + dist) / BUILDING_CELL);
  const gz0 = Math.floor((cz - dist) / BUILDING_CELL), gz1 = Math.floor((cz + dist) / BUILDING_CELL);
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = buildingGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const rec of arr) {
      if (!rec.real) continue;
      const dx = rec.x - cx, dz = rec.z - cz;
      if (dx*dx + dz*dz < d2) return true;
    }
  }
  return false;
}

// hasRealBuildingNearbyの「一戸建て限定」版。landuseタグが無い(=luTypeAtがnullを返す)
// 場所でも、近くの本物のOSM建物が工場(industrial)などの非住宅用途だと分かっていれば、
// それを一戸建て補完(buildable)の根拠にしない。landuse=industrialのポリゴンが
// 描かれていない工場・倉庫の構内でも一戸建てが誤って並ぶのを防ぐための追加ガード。
function hasRealHouseNearby(cx, cz, dist) {
  const d2 = dist * dist;
  const gx0 = Math.floor((cx - dist) / BUILDING_CELL), gx1 = Math.floor((cx + dist) / BUILDING_CELL);
  const gz0 = Math.floor((cz - dist) / BUILDING_CELL), gz1 = Math.floor((cz + dist) / BUILDING_CELL);
  for (let gx = gx0; gx <= gx1; gx++) for (let gz = gz0; gz <= gz1; gz++) {
    const arr = buildingGrid.get(gx + ',' + gz);
    if (!arr) continue;
    for (const rec of arr) {
      if (!rec.real) continue;
      if (rec.style && (rec.style.type === 'industrial' || rec.style.type === 'shop')) continue;
      const dx = rec.x - cx, dz = rec.z - cz;
      if (dx*dx + dz*dz < d2) return true;
    }
  }
  return false;
}

// ======= 手続き生成ファサード(Canvasテクスチャ) =======
// 窓の列・サッシ・軒下の影・基礎の帯・ベランダ・1階の玄関などをテクスチャに焼き込み、
// (種類×壁色×バリアント)ごとに1度だけ生成してキャッシュ共有する。
// 窓明かりは emissiveMap に焼くため、旧実装の「窓1枚=1メッシュ」が丸ごと不要になった。
// 種類: house=一戸建て(1枚絵) / apt=集合住宅(1マス=1フロア、ベランダ付き)
//       office=ビル(1マス=1フロア) / ind=工場・倉庫(1マス=約8m)
// 描画ルール: キャンバス左上12px四方には何も描かない
// (BoxGeometryの天面/底面UVをこの無地部に向けるため。setBoxFacadeUVs 参照)
const _hex6 = c => '#' + ('00000' + c.toString(16)).slice(-6);
function shadeHex(c, f) {
  const r = Math.min(255, ((c >> 16 & 255) * f) | 0),
        g = Math.min(255, ((c >> 8 & 255) * f) | 0),
        b = Math.min(255, ((c & 255) * f) | 0);
  return r << 16 | g << 8 | b;
}
const _shadeCss = (c, f) => _hex6(shadeHex(c, f));
const facadeCache = new Map();
function facadeMat(kind, color, variant) {
  const key = kind + '_' + color + '_' + variant;
  const hit = facadeCache.get(key);
  if (hit) return hit;
  const S = 128;
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  const g = cv.getContext('2d');
  const ec = document.createElement('canvas'); ec.width = ec.height = S;
  const e = ec.getContext('2d');
  e.fillStyle = '#000'; e.fillRect(0, 0, S, S);
  // 決定的乱数 — 同じキーは常に同じ絵(チャンク再生成でも見た目が揺れない)
  let sd = 2166136261 ^ (variant * 977);
  for (let i = 0; i < key.length; i++) sd = (sd ^ key.charCodeAt(i)) * 16777619 | 0;
  const rnd = () => ((sd = (sd * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
  const wc = _hex6(MODE_CONF.windowC);

  g.fillStyle = _hex6(color); g.fillRect(0, 0, S, S);
  // 壁のむら・汚れ
  for (let i = 0; i < 26; i++) {
    g.fillStyle = rnd() < 0.5 ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
    g.fillRect((rnd() * S) | 0, (14 + rnd() * (S - 18)) | 0, (2 + rnd() * 5) | 0, (2 + rnd() * 4) | 0);
  }

  // 窓1枚(枠+ガラス+中桟/格子+窓下の落ち影。lit なら emissive にも描く)
  const win = (x, y, ww, wh, lit, opt) => {
    opt = opt || {};
    g.fillStyle = opt.frame || _shadeCss(color, 0.5);
    g.fillRect(x - 2, y - 2, ww + 4, wh + 4);
    g.fillStyle = lit ? wc : (opt.glass || '#25303e');
    g.fillRect(x, y, ww, wh);

const forestLeafColors = MODE === 'space'   ? [0x66eeff, 0x88ffcc, 0xbb99ff]

// プレイヤー周囲の一定範囲だけを描くため上限は控えめ(常時描画=重いので)。低ポリの樹冠で軽量化。
const forestTrunkP = makePool(new THREE.CylinderGeometry(0.16, 0.26, 2.0, 5), forestTrunkMat, 2600);
const forestLeafPools = forestLeafColors.map(c => makePool(
  MODE === 'space' ? new THREE.ConeGeometry(1.1, 3.0, 5) : new THREE.SphereGeometry(1.4, 5, 4),
  new THREE.MeshLambertMaterial({ color: c }),           // 単色 → instanceColor 不要で確実に描画

// 木の見た目は「位置から決定」する(乱数を使わない)。こうすると森を再構築しても
// 同じ場所には同じ木が並び、ちらつき・入れ替わりが起きない。
function _fhash(a, b) { let h = (a * 374761393 + b * 668265263) | 0; h = (h ^ (h >> 13)) * 1274126177 | 0; return ((h ^ (h >> 16)) >>> 0) / 4294967296; }
function plantTree(x, z) {
  if (MODE !== 'space' && forestTrunkP.n >= forestTrunkP.max) return; // 幹が上限なら木ごと追加しない(浮いた樹冠防止)
  const gy = getGroundY(x, z);
  const r1 = _fhash(Math.floor(x * 7.3), Math.floor(z * 7.3));
  const s = 0.9 + r1 * 1.3;
  const rot = _fhash(Math.floor(x * 3.1) + 7, Math.floor(z * 5.7) + 3) * 6.283;
  const leaf = forestLeafPools[(Math.floor(Math.abs(x) * 1.7 + Math.abs(z) * 2.3)) % forestLeafPools.length];

  poolAdd(leaf, x, gy + 2.6 * s, z, rot, s * 1.25, s * 1.3, s * 1.25); // 樹冠: 幹の上に載る球(単色)

const SCRUB_MAX = 2400;
const scrubMat = new THREE.MeshLambertMaterial({

// 全道路種別中の最大幅(河川60m。waterwayWidthのMath.min(60,...)参照)の半分。
// isOnRoadで「この距離まで探せば取りこぼしがない」近傍セル数を見積もるのに使う。
const MAX_ROAD_HALF_W = 30;
// Returns true if the rectangle (cx,cz,bw,bd) overlaps any road segment
// 【重要】以前はminimapRoads(取得済み全道路。増え続けて減らない)を毎回線形走査していたため、
// 探索が進むほど呼び出しコストが際限なく重くなっていた(長時間プレイでの重量化の主因の一つ)。
// roadGrid(空間ハッシュ)を使い、実際に該当しうる近傍セルだけを見るように変更する。
function isOnRoad(cx, cz, bw, bd) {
  const halfDiag = Math.sqrt(bw*bw + bd*bd) / 2;
  const searchR = MAX_ROAD_HALF_W + halfDiag + 1;
  const cellR = Math.max(1, Math.ceil(searchR / ROAD_CELL)) + 1; // +1はセル境界のずれに対する安全マージン
  const gx = Math.floor(cx / ROAD_CELL), gz = Math.floor(cz / ROAD_CELL);
  for (let dx = -cellR; dx <= cellR; dx++) for (let dz = -cellR; dz <= cellR; dz++) {
    const arr = roadGrid.get((gx + dx) + ',' + (gz + dz));
    if (!arr) continue;
    for (const r of arr) {
      const rdx = r.x2-r.x1, rdz = r.z2-r.z1;
      const len2 = rdx*rdx + rdz*rdz;
      if (len2 < 0.01) continue;
      const t = Math.max(0, Math.min(1, ((cx-r.x1)*rdx + (cz-r.z1)*rdz) / len2));
      const nx = r.x1 + t*rdx - cx, nz = r.z1 + t*rdz - cz;
      const dist = Math.sqrt(nx*nx + nz*nz);
      if (dist < (r.rw||5)/2 + halfDiag + 1) return true; // 1m margin
    }
  }
  return false;
}

// OSMのbuilding:colour/roof:colourタグ(#rrggbb・#rgb・一部の色名)を数値カラーへ変換する。
// 未対応の表記は静かにnullを返し、既存の既定色にフォールバックする(タグ読み取りのみでコストはほぼゼロ)。
const OSM_COLOR_NAMES = {
  white: 0xf0f0ec, black: 0x202020, gray: 0x888888, grey: 0x888888,
  silver: 0xc0c0c0, red: 0xcc3333, green: 0x3a7a3a, blue: 0x3a5a9a,
  yellow: 0xe0c040, orange: 0xd88a30, brown: 0x8a6040, beige: 0xd8c8a0,
  tan: 0xd2b48c, cream: 0xf0e8d0, pink: 0xe8a0b0, purple: 0x7a4a9a,
  darkgray: 0x555555, darkgrey: 0x555555, lightgray: 0xcccccc, lightgrey: 0xcccccc,
  darkgreen: 0x2a5a2a, darkblue: 0x2a3a6a, darkred: 0x8a2222,
  cyan: 0x40b0c0, gold: 0xd4af37, ivory: 0xf0ead6, maroon: 0x7a2a2a,
  navy: 0x1a2a5a, olive: 0x707a30, bronze: 0x8a6a3a, copper: 0xb0684a,
};
function parseOsmColor(v) {
  if (!v) return null;
  const s = String(v).trim().toLowerCase();
  if (/^#[0-9a-f]{6}$/.test(s)) return parseInt(s.slice(1), 16);
  if (/^#[0-9a-f]{3}$/.test(s)) {
    const r = s[1], g = s[2], b = s[3];
    return parseInt(r + r + g + g + b + b, 16);
  }
  return OSM_COLOR_NAMES.hasOwnProperty(s) ? OSM_COLOR_NAMES[s] : null;
}

// Determine building visual style from OSM tags
function getBuildingStyle(tags) {
  const am = tags.amenity || '', rel = tags.religion || '', bt = tags.building || '';
  const name = (tags.name || '') + (tags['name:ja'] || '');
  let style = null;
  if (am === 'place_of_worship' || name.includes('神社') || name.includes('shrine')) {
    if (rel === 'shinto' || name.includes('神社'))
      style = { color: 0xcc2200, roofColor: 0x880000, emissive: 0x440000, type: 'shrine' };
    else if (rel === 'buddhist' || name.includes('寺') || name.includes('院'))
      style = { color: 0x7a5020, roofColor: 0x4a3010, emissive: 0x221100, type: 'temple' };
    else
      style = { color: 0xd4a0a0, roofColor: 0x883333, emissive: 0x220000, type: 'church' };
  } else if (am === 'school' || am === 'university' || am === 'college' || bt === 'school') {
    style = { color: 0xf0e060, roofColor: 0xa09020, emissive: 0x221100, type: 'school' };
  } else if (am === 'hospital' || am === 'clinic' || name.includes('病院')) {
    style = { color: 0xf8f8f8, roofColor: 0xdddddd, emissive: 0x111111, type: 'hospital' };
  } else if (am === 'townhall' || am === 'police' || am === 'fire_station' || name.includes('市役所') || name.includes('役場')) {
    style = { color: 0x6070a0, roofColor: 0x405080, emissive: 0x001133, type: 'government' };
  } else if (tags.shop || bt === 'commercial' || am === 'supermarket' || am === 'convenience') {
    style = { color: 0xff8840, roofColor: 0xcc5500, emissive: 0x221100, type: 'shop' };
  } else if (bt === 'apartments') {
    style = { color: 0x90a0c0, roofColor: 0x506080, emissive: 0x001122, type: 'apartment' };
  } else if (bt === 'house' || bt === 'detached' || bt === 'residential') {
    style = { color: 0xd4b070, roofColor: 0x886030, emissive: 0x110800, type: 'house' };
  } else if (bt === 'industrial' || bt === 'warehouse' || bt === 'factory') {
    style = { color: 0x808890, roofColor: 0x505860, emissive: 0x111111, type: 'industrial' };
  }

  // building:colour/roof:colour/roof:shape/roof:material があれば、種別に関わらず上書きする。
  // タグが無い建物は従来通り(この分岐に入らない)なので既存の見た目・負荷は変わらない。
  const wallTag = parseOsmColor(tags['building:colour']);
  const roofTag = parseOsmColor(tags['roof:colour']);
  const roofShape = tags['roof:shape'];
  const roofMaterial = tags['roof:material'];
  if (wallTag != null || roofTag != null || roofShape || roofMaterial) {
    style = Object.assign({ type: 'default' }, style || {});
    if (wallTag != null) style.color = wallTag;
    if (roofTag != null) style.roofColor = roofTag;
    if (roofShape) style.roofShape = roofShape;
    if (roofMaterial) style.roofMaterial = roofMaterial;
  }
  return style; // nullなら従来通りデフォルト紫のランダム
}

// ======= 建物の高さ・マンション判定(タグが曖昧でも大きさ・高さで見た目を識別可能にする) =======
// building:height(実測m)を最優先、無ければbuilding:levels*3、どちらも無ければ既存通りランダム。
function resolveBuildingHeight(tags) {
  const hTag = parseFloat(tags['building:height']);
  if (Number.isFinite(hTag) && hTag > 0) return hTag;
  const levels = parseInt(tags['building:levels']);
  if (Number.isFinite(levels) && levels > 0) return Math.max(levels * 3, 3);
  return null; // タグから決められない → 呼び出し元の既存ランダム式にフォールバック
}
const APT_HEIGHT_M = 10;      // これ以上の高さは一戸建てタグでもマンション扱いにする
const APT_FOOTPRINT_M2 = 200; // これ以上のフットプリント面積も同様
const APARTMENT_STYLE = { color: 0x90a0c0, roofColor: 0x506080, emissive: 0x001122, type: 'apartment' };
// 「高さ・階数・フットプリント面積がある閾値を超えたらタグに関わらずマンション扱いにする」ルール。
// house/defaultタイプ(=タグが曖昧、または一戸建てタグだが実際は大きい)だけを対象にする。
function classifyResidential(style, w, d, h) {
  if (!style) return style;
  if (style.type !== 'house' && style.type !== 'default') return style;
  if (h >= APT_HEIGHT_M || w * d >= APT_FOOTPRINT_M2) return APARTMENT_STYLE;
  return style;
}

// 学校・病院・役場・神社仏閣は街の目印として際立つべきだが、OSMに高さ/階数タグが
// 無いと既存のランダム式(3〜11m程度)で低く埋もれてしまう。種別が判明しているものだけ
// 最低高さを底上げする(タグの実測値がある場合はresolveBuildingHeightの値を尊重=縮めない)。
const LANDMARK_MIN_H = { school: 7, hospital: 9, government: 8, shrine: 6, temple: 7 };
function applyLandmarkMinHeight(style, h) {
  if (!style) return h;
  const min = LANDMARK_MIN_H[style.type];
  return min ? Math.max(h, min) : h;
}

// 江戸: OSM建物の実測高さ(現代の高層マンション・オフィスビル等)をそのまま使うと、
// 明治(実測データに基づき低層の集落家屋へ全面差し替え済み)より江戸の方が高層建築だらけに
// 見えてしまう(本来は逆で、江戸期の方が古く木造2階建て程度が大半のはず)。
// 神社仏閣・城郭など一部の例外を除き、天井高さを木造家屋相当に抑える。
const EDO_MAX_H = { shrine: 16, temple: 16, church: 16, school: 8, hospital: 8, government: 9, apartment: 8, industrial: 8, shop: 8, house: 8, default: 8 };
function applyEdoHeightCap(style, h) {
  const cap = EDO_MAX_H[(style && style.type) || 'default'];
  return Math.min(h, cap != null ? cap : EDO_MAX_H.default);
}
// 同じ理由で建物の「数」も現代の密集度をそのまま使うと多すぎる。
// ランドマーク(神社仏閣)以外は一定確率で間引き、当時の低密度な町並みに近づける。
function shouldSkipEdoBuilding(style) {
  const t = style && style.type;
  if (t === 'shrine' || t === 'temple' || t === 'church') return false;
  return Math.random() < 0.4;
}

// マンション・工場は一戸建てよりはっきり大きく見えるべき。タグ欠落時のランダム
// 高さ/フットプリントが小さすぎて一戸建てと見分けがつかないケースの最低サイズ底上げ
// (実測タグ由来の大きい建物はMath.maxなので縮まない)。
const SIZE_FLOOR = {
  apartment:  { w: 15, d: 12, h: 12 },
  industrial: { w: 20, d: 16, h: 8  },
};
function applySizeFloor(style, w, d, h) {
  if (!style) return { w, d, h };
  const f = SIZE_FLOOR[style.type];
  if (!f) return { w, d, h };
  return { w: Math.max(w, f.w), d: Math.max(d, f.d), h: Math.max(h, f.h) };
}

function addBuilding(x, z, w, d, h, style, isReal) {
  const _origH = h; // 遠方アンロード時、再生成できるよう元のhを覚えておく(下でhを斜面ぶん延長するため)
  // 4隅+中心の地形高さを見て、最低点を基礎にし最高点まで胴体を延長。
  // (中心1点だけだと斜面で山側が埋まり、谷側が浮いていた)
  const hs = [
    getGroundY(x, z),
    getGroundY(x - w/2, z - d/2), getGroundY(x + w/2, z - d/2),
    getGroundY(x - w/2, z + d/2), getGroundY(x + w/2, z + d/2),
  ];
  const gy = Math.min(...hs);   // 基礎 = 最低点
  h += Math.max(...hs) - gy;    // 斜面の高低差ぶん建物を延長して埋まりを防ぐ

  // このbuildingを構成する全メッシュ/ライトをここに集める。
  // 【重要】以前はここで各パーツを個別に絶対Y座標でsceneへ直置きし、生成後は二度と
  // 動かさない仕様だった。地形(NEAR)は後から更新され続けるのに建物だけ固定されるため、
  // 進めば進むほど道路・地形との高さのズレが蓄積して浮く/埋まるが悪化していた。
  // 剛体(building全体)としてY方向にだけ平行移動すればよいので、パーツを集めておき
  // rebuildBuildingHeight() でまとめてシフトできるようにする。
  const parts = [];
  const dm = (...a) => { const m = detailMesh(...a); parts.push(m); return m; };

  const type = style ? style.type : 'default';
  const floors = Math.max(1, Math.round(h / 3)); // building:levels は h に反映済み → 窓の段数に逆算
  const minWD = Math.min(w, d), maxWD = Math.max(w, d);

  // ---- 壁色(モード別パレット。lambertMat/facadeMat キャッシュを通すので増殖しない) ----
  let isMushroom = false;
  let wallC;
  if (MODE === 'edo' && type !== 'shrine' && type !== 'temple') {
    wallC = EDO_WALLS[(Math.random() * EDO_WALLS.length) | 0]; // 木造・土壁
  } else if (MODE === 'marchen') {
    isMushroom = maxWD < 11 && Math.random() < 0.3; // 小さい家はたまにキノコ
    wallC = isMushroom ? 0xf0e8d8 : PASTEL_WALLS[(Math.random() * PASTEL_WALLS.length) | 0];
  } else if (MODE === 'space') {
    wallC = SPACE_WALLS[(Math.random() * SPACE_WALLS.length) | 0]; // 金属
  } else if (style && style.color != null) {
    wallC = style.color;
  } else if (MODE === 'real') {
    wallC = DEFAULT_WALLS_REAL[(Math.random() * DEFAULT_WALLS_REAL.length) | 0];
  } else {
    wallC = DEFAULT_WALLS[(Math.random() * DEFAULT_WALLS.length) | 0];
  }

  // ---- ファサード種別(手続きテクスチャ。神社仏閣・教会・キノコは従来の無地) ----
  const kind =
    (isMushroom || type === 'shrine' || type === 'temple' || type === 'church') ? null :
    type === 'industrial' ? 'ind' :
    (floors <= 2 && (type === 'house' || type === 'default' || type === 'shop')) ? 'house' :
    (type === 'house' || type === 'apartment') ? 'apt' : 'office';
  const mat = kind
    ? facadeMat(kind, wallC, (Math.random() * 2) | 0)
    : lambertMat(wallC, (style && style.emissive) || (MODE === 'space' ? 0x0a1420 : 0));

  const geo = isMushroom
    ? new THREE.CylinderGeometry(minWD * 0.42, minWD * 0.5, h, 10)
    : new THREE.BoxGeometry(w, h, d);
  if (kind) { // 側面に窓タイルを並べ、天面/底面は無地領域へ
    const tw = kind === 'ind' ? 8 : 3.6; // 1タイルの実幅
    setBoxFacadeUVs(geo,
      kind === 'house' ? 1 : Math.max(1, Math.round(w / tw)),
      kind === 'house' ? 1 : Math.max(1, Math.round(d / tw)),
      kind === 'house' ? 1 : floors);
  }
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, gy + h/2, z);
  mesh.renderOrder = 2;
  scene.add(mesh);
  parts.push(mesh);

  // ==== 屋根 — 切妻・寄棟・片流れ・陸屋根+パラペットをモード/種別/高さで出し分け ====
  let roofC = MODE === 'edo' ? 0x3a4450 /* 瓦 */ : (style && style.roofColor) ? style.roofColor : 0x5030a0;
  if (MODE === 'real' && type === 'house' && Math.random() < 0.6)
    roofC = ROOF_COLS[(Math.random() * ROOF_COLS.length) | 0]; // 住宅は屋根色もばらす
  const rm = roofSurfMat(roofC, null);
  const rtype = MODE === 'marchen' ? '_marchen'
              : MODE === 'space' ? '_space'
              : (IS_MEIJI && type !== 'shrine' && type !== 'temple') ? '_meiji'
              : (MODE === 'edo' && type !== 'shrine' && type !== 'temple') ? '_edo' : type;

  // 勾配屋根を載せる(長辺方向に棟を向け、ov=軒の張り出し)
  const pitched = (geoR, rh, ov, matR) => {
    const m2 = new THREE.Mesh(geoR, matR);
    if (d > w) { m2.rotation.y = Math.PI / 2; m2.scale.set(d + ov, rh, w + ov); }
    else m2.scale.set(w + ov, rh, d + ov);
    m2.position.set(x, gy + h - 0.02, z);
    m2.renderOrder = 2;
    scene.add(m2);
    parts.push(m2);
    return m2;
  };

  if (rtype === '_meiji') {
    // 茅葺き: 軒の深い分厚い寄棟(茅の縦筋テクスチャ)
    pitched(HIP_GEO, Math.max(2.6, h * 0.85), minWD * 0.55, roofSurfMat(0x8a7050, 'thatch'));
  } else if (rtype === '_edo') {
    // 瓦: 切妻と寄棟を混在(瓦テクスチャ+深い軒)
    pitched(Math.random() < 0.5 ? GABLE_GEO : HIP_GEO,
            Math.min(3.2, Math.max(1.4, minWD * 0.42)), 1.8, roofSurfMat(0x3a4450, 'tile'));
  } else if (rtype === '_marchen') {
    if (isMushroom) { // キノコの傘
      dm(UNIT_SPH, lambertMat(0xff5060), x, gy + h + minWD * 0.12, z,
                 minWD * 1.6, minWD * 0.88, minWD * 1.6);
    } else { // しま模様のとんがり屋根+たまに煙突
      dm(UNIT_CONE8, roofSurfMat(PASTEL_ROOFS[(Math.random() * PASTEL_ROOFS.length) | 0], 'stripe'),
                 x, gy + h + h * 0.42, z, maxWD * 1.36, h * 0.85, maxWD * 1.36);
      if (detailOK() && Math.random() < 0.3)
        dm(UNIT_BOX, lambertMat(0xb06050), x + w * 0.22, gy + h + 0.9, z, 0.8, 1.8, 0.8);
    }
  } else if (rtype === '_space') {
    // パラペット+ガラスドーム+ネオン帯(+たまに発光アンテナ)
    dm(PARAPET_GEO, lambertMat(shadeHex(wallC, 0.7)), x, gy + h, z, w + 0.2, 0.7, d + 0.2);
    const dome = dm(UNIT_DOME, SPACE_GLASS, x, gy + h, z, minWD * 1.1, minWD * 1.1, minWD * 1.1);
    dome.renderOrder = 3;
    dm(UNIT_BOX, NEON_MATS[(Math.random() * NEON_MATS.length) | 0],
               x, gy + h - 0.25, z, w * 1.02, 0.22, d * 1.02);
    if (detailOK() && Math.random() < 0.3)
      dm(UNIT_CYL, lambertMat(0x223344, 0x2266ff), x + w * 0.2, gy + h + 1.6, z - d * 0.15, 0.12, 3.2, 0.12);
  } else if (rtype === 'shrine') {
    // Pagoda-style double roof
    dm(UNIT_CONE4, rm, x, gy + h + h * 0.2, z, maxWD * 1.6, h * 0.4, maxWD * 1.6, Math.PI / 4);
    dm(UNIT_CONE4, rm, x, gy + h + h * 0.55, z, maxWD, h * 0.25, maxWD, Math.PI / 4);
    // Torii gate in front
    const tMat = lambertMat(0xdd2200);
    const pillarH = Math.min(h * 0.8, 8);
    [-1.5, 1.5].forEach(ox =>
      dm(UNIT_CYL, tMat, x + ox, gy + pillarH / 2, z + d / 2 + 2, 0.6, pillarH, 0.6));
    dm(UNIT_BOX, tMat, x, gy + pillarH - 0.5, z + d / 2 + 2, 4.5, 0.5, 0.5);
    dm(UNIT_BOX, tMat, x, gy + pillarH - 1.5, z + d / 2 + 2, 3.8, 0.4, 0.4);
  } else if (rtype === 'temple') {
    // Wide curved roof + bell tower hint
    dm(UNIT_CONE8, rm, x, gy + h + h * 0.15, z, maxWD * 1.8, h * 0.3, maxWD * 1.8);
    dm(UNIT_CYL, lambertMat(0x4a3010), x + w / 2 + 2, gy + h * 0.3, z, 1.9, h * 0.6, 1.9);
  } else if (rtype === 'hospital') {
    // 陸屋根+パラペット+赤十字
    dm(PARAPET_GEO, rm, x, gy + h, z, w + 0.5, 0.8, d + 0.5);
    dm(UNIT_BOX, CROSS_MAT, x, gy + h + 0.7, z, 3, 0.4, 1);
    dm(UNIT_BOX, CROSS_MAT, x, gy + h + 0.7, z, 1, 0.4, 3);
  } else if (rtype === 'school') {
    pitched(HIP_GEO, Math.max(1.4, minWD * 0.22), 1.6, rm); // 幅広の寄棟
  } else if (rtype === 'government') {
    dm(UNIT_DOME, rm, x, gy + h, z, minWD * 0.8, minWD * 0.8, minWD * 0.8); // Dome
  } else {
    // 一般建物(現実モード)
    // OSMのroof:shapeタグがあれば形状はそれを優先(flat/gabled/hipped/pyramidal/skillion等)。
    // タグが無ければ従来通り高さ・種別からの推定/ランダムのまま(挙動・負荷とも変化なし)。
    const roofShape = style && style.roofShape;
    const shapeFlat = roofShape === 'flat';
    const isFlat = shapeFlat || (!roofShape && (h >= 10 || (type === 'apartment' && h >= 7) || (type === 'industrial' && h >= 8)));
    if (isFlat) {
      // 陸屋根+パラペット+屋上設備(貯水槽・室外機・アンテナ)
      dm(PARAPET_GEO, lambertMat(shadeHex(wallC, 0.8)), x, gy + h, z, w + 0.3, 0.9, d + 0.3);
      if (detailOK()) {
        if (Math.random() < 0.6)
          dm(UNIT_CYL, TANK_MAT, x + w * 0.22, gy + h + 1.2, z + d * 0.18, 2.2, 2.4, 2.2);
        if (Math.random() < 0.7)
          dm(UNIT_BOX, AC_MAT, x - w * 0.2, gy + h + 0.5, z - d * 0.15, 1.8, 1.0, 1.2, Math.random() * 3);
        if (Math.random() < 0.35)
          dm(UNIT_CYL, lambertMat(0x888888), x - w * 0.05, gy + h + 2, z + d * 0.2, 0.1, 4, 0.1);
      }
      // 工場: 遠くからでも「工場」と分かるよう煙突を1本立てる(白/赤の縞、屋根より確実に高い)
      if (type === 'industrial') {
        const chH = h * 0.9 + 4;
        dm(UNIT_CYL, lambertMat(0xd8d8d0), x - w * 0.32, gy + h + chH / 2, z - d * 0.28, 1.3, chH, 1.3);
        dm(UNIT_CYL, lambertMat(0xcc3322), x - w * 0.32, gy + h + chH - 0.6, z - d * 0.28, 1.34, 1.2, 1.34);
      }
    } else {
      // 勾配屋根: タグがあれば形状を確定、無ければ従来通り切妻50%/寄棟35%/片流れ15%のランダム
      // (工場・倉庫は片流れ)。roof:materialが瓦系ならテクスチャも瓦にする。住宅は既定で瓦。
      let geoR;
      if (roofShape === 'gabled' || roofShape === 'gable') geoR = GABLE_GEO;
      else if (roofShape === 'hipped' || roofShape === 'hip' || roofShape === 'pyramidal') geoR = HIP_GEO;
      else if (roofShape === 'skillion' || roofShape === 'lean_to' || roofShape === 'pitched') geoR = SHED_GEO;
      else {
        const r = Math.random();
        geoR = type === 'industrial' ? SHED_GEO : r < 0.5 ? GABLE_GEO : r < 0.85 ? HIP_GEO : SHED_GEO;
      }
      const roofMat = style && style.roofMaterial;
      const isTileMat = roofMat === 'roof_tiles' || roofMat === 'tiles' || roofMat === 'tile';
      const rM = roofSurfMat(roofC, (isTileMat || (MODE === 'real' && type === 'house')) ? 'tile' : null);
      pitched(geoR, geoR === SHED_GEO ? Math.max(0.8, minWD * 0.18)
                                      : Math.min(4.2, Math.max(1.5, minWD * 0.38)), 1.0, rM);
      // 玄関庇(住宅のみ)
      if (type === 'house' && detailOK() && Math.random() < 0.5)
        dm(UNIT_BOX, roofSurfMat(roofC, null), x + w * 0.22, gy + 2.35, z + d / 2 + 0.5, 2.2, 0.16, 1.1);
    }
  }

  // エントランス(中高層ビルの1階の玄関ガラス)
  if ((kind === 'office' || kind === 'apt') && h >= 9 && MODE !== 'edo' && !IS_MEIJI &&
      detailOK() && Math.random() < 0.5) {
    dm(UNIT_PLANE, ENTRANCE_MAT, x, gy + 1.4, z + d / 2 + 0.06, 3.0, 2.8, 1);
  }

  // コンビニ・商店のモード別演出(共有マテリアル、追加は最大2メッシュ+提灯インスタンス)
  if (type === 'shop' && h <= 12) {
    if (MODE === 'edo') {
      // 茶屋: 暖簾+提灯
      dm(UNIT_PLANE, NOREN_MAT, x, gy + 1.7, z + d / 2 + 0.08, Math.min(w * 0.7, 6), 1.1, 1);
      poolAdd(lampP, x - Math.min(w, 8) * 0.35, gy + 2.2, z + d / 2 + 0.4, 0, 0.9, 1.2, 0.9, 0xff8830);
      poolAdd(lampP, x + Math.min(w, 8) * 0.35, gy + 2.2, z + d / 2 + 0.4, 0, 0.9, 1.2, 0.9, 0xff8830);
    } else {
      const bandMats = MODE === 'space' ? NEON_MATS : MODE === 'marchen' ? CANDY_BAND_MATS : SIGN_BAND_MATS;
      dm(UNIT_PLANE, STOREFRONT_MAT, x, gy + 1.1, z + d / 2 + 0.06, Math.min(w * 0.85, 10), 1.6, 1);
      dm(UNIT_BOX, bandMats[(Math.random() * bandMats.length) | 0],
                 x, gy + 2.4, z + d / 2 + 0.2, Math.min(w, 12) * 0.95, 0.7, 0.25);
    }
  } else if (type === 'school') {
    // 校庭(土色の広場)
    const yard = dm(UNIT_PLANE, YARD_MAT, x, gy + 0.12, z, w + 18, d + 18, 1);
    yard.rotation.x = -Math.PI / 2;
  }

  // (旧: 窓プレーン生成はファサードテクスチャの emissiveMap に置換され削除)

  // Special glow for shrines/temples
  if (type === 'shrine') {
    parts.push(addDecorLight(0xff4400, 1.5, 30, x, gy+h*0.8, z));
  } else if (type === 'temple') {
    parts.push(addDecorLight(0xffaa00, 1.2, 25, x, gy+h*0.8, z));
  } else if (Math.random() < 0.06) {
    dm(UNIT_SPH, glowMat, x, gy + h * 0.6, z, maxWD * 1.6, maxWD * 1.6, maxWD * 1.6);
    parts.push(addDecorLight(0x8040ff, 0.8, 15, x, gy + h*0.6, z));
  }

  // Collision AABB — terrain-aware(chunkKey はアンロード時の掃除用)
  // 上端は実際の屋根高さに(+5の余白があるとジャンプでの屋根着地位置がずれる)
  const cbox = new THREE.Box3(
    new THREE.Vector3(x-w/2, gy, z-d/2),
    new THREE.Vector3(x+w/2, gy + h, z+d/2)
  );
  cbox.chunkKey = currentChunkKey;
  // 実OSM建物を遠方アンロードする際、collisionBoxes/minimapBuildings/placedBuildings
  // からもこのbuilding分だけ一括で取り除けるよう、共通のIDを振っておく。
  const bid = _buildingIdSeq++;
  cbox.buildingId = bid;
  collisionBoxes.push(cbox);
  collGridAdd(cbox);

  // Minimap record
  minimapBuildings.push({x, z, w, d, ck: currentChunkKey, bid});
  // Spatial index for landuse fill de-duplication
  placedBuildings.push({x, z, r: Math.max(w,d)/2, ck: currentChunkKey, bid});

  // resnap用の記録(地形が後から更新された時にこのbuilding一式をY方向へ平行移動する)。
  // h/styleも保持しておき、遠方アンロード時にpendingBuildingsへ戻して再訪時に再生成できるようにする。
  // isReal: 実OSM建物かどうか(手続き生成の密集地判定で「本物の建物が近くにあるか」の
  // 裏付けに使う。農地の農道グリッドを住宅街と誤認する対策)
  const brec = { x, z, w, d, h: _origH, style, gy, parts, cbox, ck: currentChunkKey, bid, real: !!isReal };
  buildingRecords.push(brec);
  buildingGridAdd(brec);
}

// ======= 現実モード: リアル道路・線路・高速高架 =======
const IS_REAL = MODE === 'real';

// 路面テクスチャ(Canvas)。u=道路横断方向(0..1)、v=道なり(メートル。materialのrepeatで周期化)。
// 種別ごとに1枚だけ生成して全セグメントで共有(アスファルト粒・車線・路肩・歩道を焼き込み)
const _roadTexCache = {};
function realRoadTex(kind) {
  if (_roadTexCache[kind]) return _roadTexCache[kind];
  const c = document.createElement('canvas');
  c.width = kind === 'xwalk' ? 64 : 128;
  c.height = kind === 'xwalk' ? 64 : kind === 'rail' ? 128 : 256;
  const W = c.width, H = c.height;
  const g = c.getContext('2d');
  const u = f => (f * W) | 0;
  const WHITE = 'rgba(230,232,235,0.92)', YELLOW = '#d8b032';
  const noise = (x0, x1, n, a) => {
    for (let i = 0; i < n; i++) {
      g.fillStyle = Math.random() < 0.5 ? `rgba(255,255,255,${a})` : `rgba(0,0,0,${a * 1.6})`;
      g.fillRect((u(x0) + Math.random() * (u(x1) - u(x0))) | 0, (Math.random() * H) | 0, 2, 2);
    }
  };
  const line = (p, wpx, col) => { g.fillStyle = col; g.fillRect(u(p) - wpx / 2, 0, wpx, H); };
  const dash = (p, wpx, col, on, off) => {
    g.fillStyle = col;
    for (let y = 0; y < H; y += on + off) g.fillRect(u(p) - wpx / 2, y, wpx, on);
  };
  const sidewalk = (x0, x1) => { g.fillStyle = '#5a5d62'; g.fillRect(u(x0), 0, u(x1) - u(x0), H); noise(x0, x1, 30, 0.04); };

  if (kind === 'xwalk') { // 横断歩道ゼブラ(背景透過でアスファルトが透ける)
    g.clearRect(0, 0, W, H);
    g.fillStyle = 'rgba(232,235,238,0.88)';
    for (let x = 2; x < W; x += 10) g.fillRect(x, 2, 5, H - 4);
  } else if (kind === 'rail') { // バラスト(砂利道床)+枕木+2本のレール
    g.fillStyle = '#6a6157'; g.fillRect(0, 0, W, H);
    noise(0, 1, 500, 0.07);
    g.fillStyle = '#463a2c';
    for (let y = 2; y < H; y += 13) g.fillRect(u(0.16), y, u(0.68), 6); // 枕木(約0.8m間隔)
    for (const p of [0.37, 0.63]) {
      line(p + 0.012, 5, '#2c2c2e');  // レール影
      line(p, 3, '#b6babe');          // レール(鋼)
    }
  } else if (kind === 'motorway') {
    // アトラス: u 0〜0.72=路面 / 0.74〜0.87=防音壁 / 0.88〜1=桁コンクリート
    g.fillStyle = '#33363b'; g.fillRect(0, 0, u(0.72), H); noise(0, 0.72, 220, 0.045);
    line(0.045, 3, WHITE); line(0.675, 3, WHITE);                   // 路肩の白実線
    line(0.35, 2, WHITE); line(0.37, 2, WHITE);                     // 中央分離
    dash(0.185, 3, WHITE, 85, 86); dash(0.545, 3, WHITE, 85, 86);   // 車線境界(白破線)
    g.fillStyle = '#b2b6ba'; g.fillRect(u(0.74), 0, u(0.87) - u(0.74), H); // 防音壁
    g.fillStyle = 'rgba(0,0,0,0.14)';
    for (let y = 0; y < H; y += 34) g.fillRect(u(0.74), y, u(0.87) - u(0.74), 2); // 壁パネル目地
    g.fillStyle = '#6e7175'; g.fillRect(u(0.88), 0, W - u(0.88), H); noise(0.88, 1, 60, 0.05); // 桁
  } else if (kind === 'trunk') { // 国道クラス: 歩道+黄色2本の中央線+2車線ずつ
    g.fillStyle = '#37393e'; g.fillRect(0, 0, W, H); noise(0, 1, 200, 0.05);
    sidewalk(0, 0.10); sidewalk(0.90, 1);
    line(0.10, 2, '#9aa0a4'); line(0.90, 2, '#9aa0a4'); // 縁石
    line(0.145, 2.5, WHITE); line(0.855, 2.5, WHITE);   // 路側線
    line(0.49, 2, YELLOW); line(0.51, 2, YELLOW);       // 中央線(黄・2本)
    dash(0.31, 2.5, WHITE, 53, 85); dash(0.69, 2.5, WHITE, 53, 85);
  } else if (kind === 'primary') { // 主要地方道: 歩道+黄色中央線+車線破線

// 2線分の交差判定(端点付近5%は除外)。交点とa(道路)側の方向を返す
function segCross(a, b) {
  const d1x = a.x2 - a.x1, d1z = a.z2 - a.z1, d2x = b.x2 - b.x1, d2z = b.z2 - b.z1;
  const den = d1x * d2z - d1z * d2x;
  if (Math.abs(den) < 1e-6) return null;
  const t = ((b.x1 - a.x1) * d2z - (b.z1 - a.z1) * d2x) / den;
  const s = ((b.x1 - a.x1) * d1z - (b.z1 - a.z1) * d1x) / den;
  if (t < 0.05 || t > 0.95 || s < 0.05 || s > 0.95) return null;
  const l = Math.hypot(d1x, d1z) || 1;
  return { x: a.x1 + d1x * t, z: a.z1 + d1z * t, nx: d1x / l, nz: d1z / l };
}

// 踏切: 道路の両側(線路手前)に警報ポール+赤灯+黄黒の遮断機バー
function addRailXing(pt) {
  if (!IS_REAL || xingCount >= 60) return;
  xingCount++;
  const pxp = -pt.nz, pzp = pt.nx;
  for (const sd of [-1, 1]) {
    const bx = pt.x + pt.nx * sd * 4.5, bz = pt.z + pt.nz * sd * 4.5;
    const ppx = bx + pxp * sd * 2.8, ppz = bz + pzp * sd * 2.8;
    const gy = getGroundY(ppx, ppz);
    poolAdd(poleP, ppx, gy + 1.6, ppz, 0, 0.6, 0.4, 0.6);
    poolAdd(lampP, ppx, gy + 3.1, ppz, 0, 0.8, 0.8, 0.8, 0xff3030);
    poolAdd(xingBarP, bx + pxp * sd * 0.8, gy + 1.1, bz + pzp * sd * 0.8,
            Math.atan2(-pzp, pxp), 4.4, 0.14, 0.14);
  }
}

// ======= 高速道路(東名など)の高架 =======
// 路面+防音壁+桁側面+桁裏を1つのBufferGeometry(=セグメントあたり1メッシュ)で作り、
// motorwayテクスチャのUV列(路面/壁/桁)を使い分ける。橋脚はInstancedMesh。
// 当たり判定: 桁の薄い水平スラブ(桁上に立てる)+橋脚の柱のみ → 高架下は自由に通れる
const MWY_H = 7, MWY_W = 16;
// 高架(高速道路)の桁ジオメトリだけを作る部分。resnap(rebuildMotorwayMesh)からも
// 同じ関数を使って再生成できるよう、addMotorwayから切り出した。
// 【重要】以前は桁の高さを6mおきに個別サンプリング(見た目)、当たり判定は22m区間の
// 端点のみ(=別のサンプリング密度)で決めていたため、両者が微妙にズレたり、区間ごとに
// 別タイミングでresnapされた際に隣接区間との段差が生まれ、それが「高速道路上の見えない
// 段差に動きをブロックされる」不具合の原因になっていた。桁は区間の両端点の高さだけを
// 使って直線的に結ぶ(=途中の地形起伏は追わない)ことで、見た目・当たり判定が常に同じ
// 1本の直線上に揃い、区間内・区間間のどちらでも段差が生じないようにする。
function makeMotorwayGeo(x1, z1, x2, z2) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  if (len < 2) return null;
  const nx = dx / len, nz = dz / len, px = -nz, pz = nx;
  const hw2 = MWY_W / 2;
  const steps = Math.max(1, Math.round(len / 6));
  const y1 = getGroundY(x1, z1) + MWY_H, y2 = getGroundY(x2, z2) + MWY_H;
  // 断面ストリップ: [横オフセットA, 高さA, uA, 横オフセットB, 高さB, uB]
  const strips = [
    [-hw2, 0,    0.02, +hw2, 0,    0.70], // 路面
    [-hw2, 1.4,  0.75, -hw2, 0,    0.86], // 左防音壁
    [+hw2, 0,    0.75, +hw2, 1.4,  0.86], // 右防音壁
    [-hw2, -1.1, 0.90, -hw2, 0,    0.99], // 左桁側面
    [+hw2, 0,    0.90, +hw2, -1.1, 0.99], // 右桁側面
    [+hw2, -1.1, 0.92, -hw2, -1.1, 0.97], // 桁裏(高架下から見える)
  ];
  const P = [], UV = [], I = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const cx = x1 + dx * t, cz = z1 + dz * t;
    const y = y1 + (y2 - y1) * t; // 端点間を直線的に結ぶ(区間内の地形起伏は追わない)
    const v = t * len;
    for (const s of strips) {
      P.push(cx + px * s[0], y + s[1], cz + pz * s[0], cx + px * s[3], y + s[4], cz + pz * s[3]);
      UV.push(s[2], v, s[5], v);
    }
    if (i < steps) {
      for (let k = 0; k < strips.length; k++) {
        const b = (i * strips.length + k) * 2;
        const n2 = ((i + 1) * strips.length + k) * 2;
        I.push(b, b + 1, n2, b + 1, n2 + 1, n2);
      }
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(P, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(UV, 2));
  geo.setIndex(I);
  return geo;
}

// 高架の桁メッシュを、現在の地形高さに合わせて作り直す(rebuildRoadMeshから呼ばれる)
// 高架の見た目(桁)だけでなく、床スラブ・橋脚の当たり判定も現在の地形高さへ合わせ直す。
// 【重要】以前はここで桁の見た目(mesh.geometry)だけ再構築し、当たり判定のBox3群は
// 生成時の高さのまま放置していた。NEAR地形が後から更新されて見た目の桁が正しい高さへ
// 動いても、当たり判定・橋脚の見た目は古い高さに取り残されたままになり、「見た目の
// 道路面には乗れず、桁の上の何もない空間(=古い当たり判定の位置)に乗れてしまう」上に
// 橋脚だけが空中に浮いて見えるバグの原因になっていた。
// 道路面と同じ考え方(位置は変えずジオメトリ/高さだけ作り直す)を、当たり判定・
// 橋脚インスタンス(poolSetYでY座標だけ書き換え、向き・スケールは維持)にも適用する。
// 高架の「乗れる床」は、Box3(水平の箱)の積み重ねだと登り坂で段差やガタつきが出るため、
// 見た目の桁と全く同じ「2端点を結ぶ斜面」を1つの数式として持ち、floorHeightAt側で
// その場のx,zに応じた高さをその都度計算する(=段差が原理的に発生しない、なめらかな斜面)。
// wouldCollide(横移動のブロック)には一切登録しない(floorHeightAtだけが参照する)。
const motorwaySlopes = [];
function rebuildMotorwayMesh(r) {
  if (!r.mesh) return;
  const geo = makeMotorwayGeo(r.x1, r.z1, r.x2, r.z2);
  if (!geo) return;
  r.mesh.geometry.dispose();
  r.mesh.geometry = geo;
  if (r.slope) {
    r.slope.y1 = getGroundY(r.x1, r.z1) + MWY_H;
    r.slope.y2 = getGroundY(r.x2, r.z2) + MWY_H;
  }
  // 橋脚(見た目・当たり判定とも)は挙動が不安定だったため廃止。高速道路は橋脚なしで空中に浮く形で表示する。
}

function addMotorway(x1, z1, x2, z2) {
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.hypot(dx, dz);
  if (len < 2) return;
  const nx = dx / len, nz = dz / len;
  const hw2 = MWY_W / 2;
  const geo = makeMotorwayGeo(x1, z1, x2, z2);
  if (!geo) return;
  const mesh = new THREE.Mesh(geo, realRoadMat('motorway', 24));
  mesh.renderOrder = 1;
  scene.add(mesh);

  // 橋脚は見た目・当たり判定とも挙動が不安定(見えない当たり判定が動きをブロックする不具合)だったため廃止。
  // 高速道路は橋脚なしで空中に浮く形で表示する。
  // 桁上の「乗れる床」は見た目(makeMotorwayGeo)と全く同じ2端点の直線補間の斜面として持つ
  // (Box3の積み重ねではないので、登り坂でも段差・ガタつきが原理的に発生しない)。
  const y1 = getGroundY(x1, z1) + MWY_H, y2 = getGroundY(x2, z2) + MWY_H;
  const slope = { x1, z1, y1, x2, z2, y2, nx, nz, len, hw: hw2 };
  motorwaySlopes.push(slope);
  // mesh・斜面の座標を記録し、NEAR地形更新時に桁と当たり判定を一緒に
  // 現在の地形高さへ作り直せるようにする(浮き/埋まり・判定ズレ対策)
  addRoadRecord({ x1, z1, x2, z2, type: 'motorway', rw: MWY_W, mesh, slope });
}

// Build a terrain-following road ribbon as a single BufferGeometry mesh
function makeRoadGeo(x1, z1, x2, z2, width, yOffset) {
  const dx = x2-x1, dz = z2-z1;
  const len = Math.sqrt(dx*dx+dz*dz);
  if (len < 0.1) return null;
  const nx = dx/len, nz = dz/len; // forward
  const px = -nz, pz = nx;        // left perpendicular
  const hw = width / 2;
  const segs = Math.max(1, Math.round(len)); // 1 vertex per meter
  // 横断方向の分割数。以前は左右端の2点だけで平面を張っていたため、幅広の道路
  // (峠道など)では中央が地形(バイリニア面)より低くなり、地形に埋まって見えることがあった。
  // 幅3mあたり1列を目安に中間点もサンプリングし、道の途中で地形に飲み込まれないようにする。
  const cols = Math.max(2, Math.min(5, Math.ceil(width / 3) + 1));

  const verts = [], idxs = [], uvs = [];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const cx = x1 + dx*t, cz = z1 + dz*t;
    // 各横断位置ごとに個別に地形高さをサンプリング。
    // (以前は中心線の高さを両端に使っていたため、道路を横切る斜面では
    //  山側の端が地形に埋まって途切れて見えた)
    for (let c = 0; c < cols; c++) {
      const u = c / (cols - 1); // 0=left .. 1=right
      const off = hw - u * width;
      const vx = cx + px*off, vz = cz + pz*off;
      verts.push(vx, getGroundY(vx, vz) + yOffset, vz);
      // u=横断方向0..1 / v=道なり距離[m](テクスチャ側のrepeatで車線・枕木の周期に変換)
      uvs.push(u, t * len);
    }
    if (i < segs) {
      const b0 = i * cols, b1 = (i + 1) * cols;
      for (let c = 0; c < cols - 1; c++) {
        const a = b0 + c, bIdx = b0 + c + 1, cc = b1 + c, d = b1 + c + 1;
        idxs.push(a, bIdx, cc, bIdx, d, cc);
      }
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idxs);
  return geo;
}

function addRoad(x1, z1, x2, z2, width, type='road') {
  const dx = x2-x1, dz = z2-z1;
  const totalLen = Math.sqrt(dx*dx+dz*dz);
  if (totalLen < 0.5) return;

  // 高速道路: 現実モードは高架化、他モードは従来どおり細い地上路として描く
  if (type === 'motorway') {
    if (IS_REAL) { addMotorway(x1, z1, x2, z2); return; }
    type = 'road';
  }

  let w = width, isRailway = false;
  switch(type) {
    case 'trunk':     w = Math.max(width, 10); break;
    case 'primary':   w = Math.max(width, 8);  break;
    case 'secondary': w = Math.max(width, 6);  break;
    case 'tertiary':  w = Math.max(width, 4);  break;
    case 'railway':   w = 5; isRailway = true; break;
    case 'water':     w = Math.max(width, 1.5); break; // 川・水路(実幅は waterwayWidth で決定済み)
    default:          w = Math.max(width, 3);  break;
  }
  // 現実モード: 実勢に近い幅員(歩道込み。テクスチャの歩道帯と整合する幅)
  if (IS_REAL) {
    if (type === 'trunk') w = 14;
    else if (type === 'primary') w = 12;
    else if (type === 'secondary') w = 9;
    else if (type === 'tertiary') w = 6.5;
    else if (type === 'road') w = Math.max(w, 4.2);
  }

  // 現実モード: アスファルト+車線+歩道 / バラスト+枕木+レール のテクスチャ路面
  const mat = (IS_REAL && type !== 'water')
    ? (isRailway ? realRoadMat('rail', 8)
       : type === 'trunk' ? realRoadMat('trunk', 24)
       : type === 'primary' ? realRoadMat('primary', 24)
       : type === 'secondary' ? realRoadMat('secondary', 24)
       : realRoadMat('minor', 24))
    : (ROAD_MAT[type] || ROAD_MAT.road);
  // 0.15→0.35: 幅広道路は左右端の間で地形(バイリニア面)が盛り上がることがあるため余裕を持たせる
  // 水面リボンは実形状の水面ポリゴン(+0.15)より低い+0.05に置き、
  // 実形状がある区間では推定幅リボンが完全に隠れるようにする
  const yOff = type === 'water' ? 0.05 : 0.35;

  if (isRailway && IS_REAL) {
    // レールはテクスチャで表現済み(白帯オーバーレイ廃止)。踏切検出+駅ホーム用に記録
    const seg = { x1, z1, x2, z2 };
    railSegs.push(seg);
    // 既存の道路との交差=踏切(道路側の方向で判定)
    for (const r of minimapRoads) {
      if (r.type !== 'road' && r.type !== 'tertiary' && r.type !== 'secondary') continue;
      const pt = segCross(r, seg);
      if (pt) addRailXing(pt);
    }
  }
  // 非現実モードの線路(白帯オーバーレイ)はrebuildRoadMeshが本体メッシュと同時に生成する

  // mesh/mat/yOff も記録しておく: NEAR高解像度地形が後から届いたとき、プレイヤー付近の
  // 道路だけ現在の地形高さに合わせて再構築できるようにする(rebuildRoadsNearChunk)。
  // railWhiteは距離アンロード(unloadFarRoads)/復元(rebuildRoadMesh)で本体と一緒に扱う。
  // 【重要】重いメッシュ生成はここでは行わず、レコード登録+フレーム分割キュー投入だけにする
  // (密集タイル到着時の数十秒フリーズ対策。isOnRoad・ミニマップはレコードだけで正しく動く)。
  const rec = {x1, z1, x2, z2, type, rw: w, mesh: null, mat, yOff, railWhite: null};
  addRoadRecord(rec);
  queueRoadMesh(rec);

  if (IS_REAL && !isRailway && type !== 'water') {
    // 踏切(線路が先に生成済みの場合はこちらで検出)
    if (railSegs.length && (type === 'road' || type === 'tertiary' || type === 'secondary')) {
      const me = { x1, z1, x2, z2 };
      for (const rs of railSegs) { const pt = segCross(me, rs); if (pt) { addRailXing(pt); break; } }
    }
    // 交差点検出 → 横断歩道。OSMの共有ノード=セグメント端点なので、
    // 同一端点(1m格子)を3本以上が使っていたら交差点とみなしゼブラを敷く
    if (totalLen > 12) {
      const nx = dx / totalLen, nz = dz / totalLen;
      for (const [ex, ez, ix, iz] of [[x1, z1, nx, nz], [x2, z2, -nx, -nz]]) {
        const k = Math.round(ex) + ',' + Math.round(ez);
        const n = (nodeUse.get(k) || 0) + 1;
        nodeUse.set(k, n);
        if (n === 3 && w >= 6) {
          const cx = ex + ix * 6, cz = ez + iz * 6;
          poolAdd(xwalkP, cx, getGroundY(cx, cz) + 0.45, cz,
                  Math.atan2(-iz, ix) + Math.PI / 2, w - 1.8, 1, 2.6);
        }
      }
    }
  }

  decorateRoad(x1, z1, x2, z2, type, w);
}

// ======= 道路沿いの小物自動配置 =======
// すべてインスタンスプールへの追記なのでメッシュ・マテリアルは増えない
function decorateRoad(x1, z1, x2, z2, type, w) {
  if (type === 'water' || type === 'railway') return;
  const dx = x2 - x1, dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);
  if (len < 18) return;
  const nx = dx / len, nz = dz / len, px = -nz, pz = nx;
  const ry = Math.atan2(-nz, nx); // boxのX軸を道路方向に向ける回転
  if (IS_MEIJI) {
    // 明治: 街道の並木と道祖神(石)のみ。電柱・自販機・信号・ガードレール・看板は存在しない
    for (let s = 20; s < len - 10; s += 45 + Math.random() * 20) {
      const side = Math.random() < 0.5 ? -1 : 1;
      const tx = x1 + nx * s + px * side * (w / 2 + 2.2);
      const tz = z1 + nz * s + pz * side * (w / 2 + 2.2);
      addTree(tx, tz, 1.0 + Math.random() * 0.6);
    }
    if (Math.random() < 0.08) {
      const t = Math.random();
      const sx = x1 + dx * t + px * (w / 2 + 1);
      const sz = z1 + dz * t + pz * (w / 2 + 1);
      poolAdd(signalP, sx, getGroundY(sx, sz) + 0.4, sz, Math.random() * 3, 0.5, 1.6, 0.9); // 道祖神
    }
    return;
  }
  const minor = (type === 'road' || type === 'tertiary');
  if (minor) {
    // 電柱(約35m間隔、道路の左側で統一)+ 電線(たるみ付き)
    const n = Math.floor(len / 35);
    let prevTop = null;
    for (let i = 0; i <= n; i++) {
      const t = (i + 0.5) / (n + 1);
      const cx = x1 + dx * t + px * (w / 2 + 0.9);
      const cz = z1 + dz * t + pz * (w / 2 + 0.9);
      const gy = getGroundY(cx, cz);
      // 江戸=木の行灯柱(短め) / その他=フルハイト
      poolAdd(poleP, cx, gy + (MODE === 'edo' ? 2.4 : 4), cz, 0, 1, MODE === 'edo' ? 0.6 : 1, 1);
      if (POLE_ORB) poolAdd(lampP, cx, gy + (MODE === 'edo' ? 4.9 : 7.9), cz, 0, 1.1, 1.1, 1.1, POLE_ORB);
      const top = { x: cx, y: gy + 7.6, z: cz };
      if (PROP_WIRES && prevTop) {
        const mx = (prevTop.x + top.x) / 2, mz = (prevTop.z + top.z) / 2;
        const my = (prevTop.y + top.y) / 2 - 0.6;
        addWireSeg(prevTop.x, prevTop.y, prevTop.z, mx, my, mz);
        addWireSeg(mx, my, mz, top.x, top.y, top.z);
      }
      prevTop = top;
    }
    // 自販機(江戸では樽/井戸)
    if (Math.random() < 0.13) {
      const t = 0.2 + Math.random() * 0.6;
      const vx = x1 + dx * t + px * (w / 2 + 1.2);
      const vz = z1 + dz * t + pz * (w / 2 + 1.2);
      poolAdd(vendP, vx, getGroundY(vx, vz) + PROP_VEND_Y, vz, ry + Math.PI / 2, 1, 1, 1,
              PROP_VEND_COLORS[(Math.random() * 3) | 0]);
    }
  } else {
    // 幹線(secondary以上): ガードレール(8m毎、両側)
    for (let s = 4; s < len - 4; s += 8) {
      for (const side of [-1, 1]) {
        const gx = x1 + nx * s + px * side * (w / 2 + 0.4);
        const gz = z1 + nz * s + pz * side * (w / 2 + 0.4);
        poolAdd(guardP, gx, getGroundY(gx, gz) + 0.7, gz, ry, 8, 1, 1, PROP_GUARD_C);
      }
    }
    // 信号機(長い区間にたまに。江戸モードでは出さない)
    if (PROP_SIGNALS && len > 60 && Math.random() < 0.1) {
      const sx = x1 + dx * 0.5 + px * (w / 2 + 0.8), sz = z1 + dz * 0.5 + pz * (w / 2 + 0.8);
      const gy = getGroundY(sx, sz);
      poolAdd(poleP, sx, gy + 3, sz, 0, 0.8, 0.72, 0.8);
      poolAdd(signalP, sx - px * 1.2, gy + 5.6, sz - pz * 1.2, ry);
      poolAdd(lampP, sx - px * 1.2, gy + 5.6, sz - pz * 1.2, ry, 0.9, 0.9, 0.9,
              Math.random() < 0.6 ? 0x33ff66 : 0xff4433);
    }
    // 青看板・標識
    if (Math.random() < 0.12) {
      const t = Math.random();
      const sx = x1 + dx * t + px * (w / 2 + 0.7), sz = z1 + dz * t + pz * (w / 2 + 0.7);
      const gy = getGroundY(sx, sz);
      poolAdd(poleP, sx, gy + 1.8, sz, 0, 0.5, 0.45, 0.5);
      poolAdd(signBoardP, sx, gy + 3.3, sz, ry);
    }
  }
}

// ======= STATION LANDMARKS =======
const stationLabels = []; // for billboard update each frame
// 駅を構成する全パーツ(駅舎・プラットホーム・看板等)をrecordにまとめておき、
// NEAR高解像度地形が後から届いた時にrebuildStationHeight()でY方向にまとめて
// 追従させる。以前は生成時のgy(=届いていればNEAR、届いていなければFAR基準)で
// 固定していたため、FAR基準で建った駅がNEAR到着後も浮いたまま取り残されていた
// (建物・道路と違って駅だけこの追従の仕組みが無かった)。
const stationRecords = [];

function addStation(x, z, name) {
  const gy = getGroundY(x, z); // 地表基準にしないと高地の駅ランドマークが埋まる
  const parts = []; // このパーツをまとめて後からY方向に平行移動する(rebuildStationHeight)
  const dm = (...a) => { const m = detailMesh(...a); parts.push(m); return m; };
  let refX = x, refZ = z; // rebuild時に地形高さを再サンプリングする基準点(駅舎があればその位置)

  // 最寄りの線路(現実モードの駅舎の向き・プラットホーム位置の両方に使うので先に1回だけ探す)
  let bestRail = null;
  if (railSegs.length) {
    let bd0 = 40 * 40;
    for (const rs of railSegs) {
      const mx = (rs.x1 + rs.x2) / 2, mz = (rs.z1 + rs.z2) / 2;
      const dd = (mx - x) * (mx - x) + (mz - z) * (mz - z);
      if (dd < bd0) { bd0 = dd; bestRail = rs; }
    }
  }

  let labelY = gy + 62; // ファンタジー版の高い掲示位置(既定)

  if (IS_REAL) {
    // ===== 現実モード: 立派な駅舎(ファンタジーの金塔・星・輪は使わない) =====
    let rx = 1, rz = 0; // 線路の向き(見つからなければ既定でx軸方向)
    if (bestRail) {
      const ddx = bestRail.x2 - bestRail.x1, ddz = bestRail.z2 - bestRail.z1;
      const dl = Math.hypot(ddx, ddz) || 1;
      rx = ddx / dl; rz = ddz / dl;
    }
    const px = -rz, pz = rx; // 線路に直交する向き(駅舎を線路の脇に配置する)
    const ry = Math.atan2(rx, rz); // 建物の長辺(ローカルZ)を線路と平行に揃える回転
    const off = 12; // 線路中心からのオフセット
    const sx = x + px * off, sz = z + pz * off;
    const sgy = getGroundY(sx, sz);
    refX = sx; refZ = sz; // 駅舎位置を基準にNEAR更新時の高さを再サンプリングする
    const bw = 30, bd = 15, bh = 8; // 線路沿いに長い、堂々とした駅舎

    const body = new THREE.Mesh(new THREE.BoxGeometry(bd, bh, bw), lambertMat(0xe8e0cc));
    body.position.set(sx, sgy + bh / 2, sz);
    body.rotation.y = ry;
    body.castShadow = true;
    scene.add(body);
    parts.push(body);

    // 屋上の帯(濃色パラペットで建物を引き締める)
    const band = new THREE.Mesh(new THREE.BoxGeometry(bd + 0.6, 1.1, bw + 0.6), lambertMat(0x2a4a6a));
    band.position.set(sx, sgy + bh + 0.55, sz);
    band.rotation.y = ry;
    scene.add(band);
    parts.push(band);

    // 線路側(改札口)のガラス張り玄関+庇
    const entX = sx - px * (bd / 2 + 2.0), entZ = sz - pz * (bd / 2 + 2.0);
    const glassMat = new THREE.MeshLambertMaterial({
      color: 0x88ccee, emissive: 0x224466, emissiveIntensity: 0.45, transparent: true, opacity: 0.85,
    });
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.0, bh * 0.7, bw * 0.55), glassMat);
    glass.position.set(entX, sgy + bh * 0.4, entZ);
    glass.rotation.y = ry;
    scene.add(glass);
    parts.push(glass);
    const canopy = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.4, bw * 0.65), lambertMat(0x445566));
    canopy.position.set(entX - px * 1.7, sgy + bh * 0.62, entZ - pz * 1.7);
    canopy.rotation.y = ry;
    scene.add(canopy);
    parts.push(canopy);
    for (const co of [-bw * 0.28, bw * 0.28]) { // 庇の支柱
      dm(UNIT_CYL, lambertMat(0x8a8d90),
        entX - px * 3.3 + rx * co, sgy + bh * 0.31, entZ - pz * 3.3 + rz * co, 0.22, bh * 0.62, 0.22);
    }

    // 駅舎の時計
    const clock = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.25, 16),
      new THREE.MeshLambertMaterial({ color: 0xfffbe8, emissive: 0xffee88, emissiveIntensity: 0.5 }));
    clock.rotation.x = Math.PI / 2;
    clock.rotation.z = ry;
    clock.position.set(entX - px * 2.4, sgy + bh * 0.88, entZ - pz * 2.4);
    scene.add(clock);
    parts.push(clock);

    // 駅前の温かい灯り
    const light = new THREE.PointLight(0xffddaa, 3, 100);
    light.position.set(entX - px * 3, sgy + bh * 0.6, entZ - pz * 3);
    scene.add(light);
    parts.push(light);

    labelY = sgy + 30; // 駅名看板は遠くからでも目立つよう駅舎の上空に浮かせる
  } else {
    // ===== 従来のファンタジー演出(江戸・メルヘン・宇宙モード) =====
    const stC = MODE === 'edo'     ? { c: 0x8a6a40, e: 0xcc6600 }
              : MODE === 'marchen' ? { c: 0xffb0d0, e: 0xff70a0 }
              : MODE === 'space'   ? { c: 0x66eeff, e: 0x00ccff }
              : { c: 0xffcc00, e: 0xff8800 };
    const pillarMat = new THREE.MeshLambertMaterial({ color: stC.c, emissive: stC.e, emissiveIntensity: 0.6 });
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2.5, 50, 8), pillarMat);
    pillar.position.set(x, gy + 25, z);
    pillar.castShadow = true;
    scene.add(pillar);
    parts.push(pillar);
